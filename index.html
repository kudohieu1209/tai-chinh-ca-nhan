// Transactions — 2-column: entry form (left sticky) + tabbed list (right)

const TX_WEEKDAYS = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
const TX_WEEKDAYS_EN = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const TX_AMOUNT_STEPS = [10000, 20000, 50000, 100000];

const txLocalIso = (d) =>
  `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

function txDayLabel(iso, t) {
  const tr = t || ((vi) => vi);
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  if (iso === txLocalIso(today)) return tr("Hôm nay", "Today");
  if (iso === txLocalIso(yesterday)) return tr("Hôm qua", "Yesterday");
  const d = new Date(iso + "T00:00:00");
  const weekdays = tr.lang === "en" ? TX_WEEKDAYS_EN : TX_WEEKDAYS;
  return `${weekdays[d.getDay()]}, ${fmtDate(iso)}`;
}

// ====== CategoryManagerModal — add / rename / recolor / delete categories ======
function CategoryManagerModal({ usageCounts, onSave, onClose }) {
  const t = useT();
  const [rows, setRows] = useState(() =>
    Object.values(CATEGORIES).map(c => ({ key: c.name, name: c.name, emoji: c.emoji, color: c.color }))
  );
  const [paletteIdx, setPaletteIdx] = useState(null);
  const [error, setError] = useState("");
  const pendingFocusIdx = useRef(null);
  const lockedSet = new Set(SYSTEM_CATEGORIES);

  useEffect(() => {
    if (pendingFocusIdx.current == null) return;
    const idx = pendingFocusIdx.current;
    requestAnimationFrame(() => {
      const row = document.querySelector(`[data-cat-row="${idx}"]`);
      const input = row?.querySelector(".cat-editor-name");
      if (input) {
        input.focus();
        input.scrollIntoView({ block: "nearest" });
      }
      pendingFocusIdx.current = null;
    });
  }, [rows.length]);

  const updateRow = (idx, patch) => {
    setError("");
    setRows(rs => rs.map((r, i) => (i === idx ? { ...r, ...patch } : r)));
  };
  const addRow = () => {
    setError("");
    pendingFocusIdx.current = rows.length;
    setRows(rs => [...rs, { key: null, name: "", emoji: "📦", color: CAT_PALETTE[rs.length % CAT_PALETTE.length] }]);
  };
  const removeRow = (idx) => {
    setError("");
    setPaletteIdx(null);
    setRows(rs => rs.filter((_, i) => i !== idx));
  };

  const keptKeys = new Set(rows.filter(r => r.key).map(r => r.key));
  const removedInUse = Object.keys(CATEGORIES)
    .filter(name => !keptKeys.has(name) && (usageCounts[name] || 0) > 0);
  const movedCount = removedInUse.reduce((s, name) => s + usageCounts[name], 0);

  const handleSave = () => {
    const cleaned = rows.map(r => ({ ...r, name: r.name.trim() }));
    if (cleaned.some(r => !r.name)) { setError(t("Tên danh mục không được để trống", "Category name can't be empty")); return; }
    const names = cleaned.map(r => r.name);
    if (new Set(names).size !== names.length) { setError(t("Tên danh mục bị trùng nhau", "Category names must be unique")); return; }
    if (names.includes("Thu nhập")) { setError(t("“Thu nhập” là tên dành riêng, không dùng cho danh mục chi", "“Thu nhập” (Income) is reserved and can't be used for an expense category")); return; }
    const renames = {};
    cleaned.forEach(r => { if (r.key && r.key !== r.name) renames[r.key] = r.name; });
    const removed = Object.keys(CATEGORIES).filter(name => !keptKeys.has(name));
    onSave(cleaned.map(({ name, emoji, color }) => ({ name, emoji: emoji || "📦", color })), renames, removed);
    onClose();
  };

  return (
    <Modal
      title={t("Sửa danh mục", "Edit categories")}
      subtitle={t("Đổi tên, biểu tượng, màu hoặc thêm danh mục mới", "Rename, change icon/color, or add a new category")}
      onClose={onClose}
      headerExtra={
        <button className="quick-template-tool" onClick={addRow}>
          <Icons.plus size={13} /> {t("Thêm", "Add")}
        </button>
      }
      footer={
        <>
          {error && <div className="modal-error">{error}</div>}
          <button className="btn btn-secondary modal-btn" onClick={onClose}>{t("Hủy", "Cancel")}</button>
          <button className="btn modal-btn" onClick={handleSave}><Icons.check size={14} /> {t("Lưu", "Save")}</button>
        </>
      }
    >
      <div className="cat-editor">
        {rows.map((r, idx) => {
          const locked = r.key && lockedSet.has(r.key);
          const usage = r.key ? usageCounts[r.key] || 0 : 0;
          return (
            <React.Fragment key={r.key || `new-${idx}`}>
              <div className="cat-editor-row" data-cat-row={idx}>
                <input
                  className="input cat-editor-emoji"
                  value={r.emoji}
                  maxLength={4}
                  aria-label={t("Biểu tượng", "Icon")}
                  onChange={e => updateRow(idx, { emoji: e.target.value })}
                />
                <input
                  className="input cat-editor-name"
                  value={r.name}
                  placeholder={t("Tên danh mục", "Category name")}
                  disabled={Boolean(locked)}
                  title={locked ? t("Danh mục hệ thống — không thể đổi tên", "System category — can't be renamed") : undefined}
                  onChange={e => updateRow(idx, { name: e.target.value })}
                />
                <button
                  className="cat-editor-color"
                  style={{ background: r.color }}
                  title={t("Đổi màu", "Change color")}
                  aria-label={t("Đổi màu", "Change color")}
                  onClick={() => setPaletteIdx(p => (p === idx ? null : idx))}
                />
                <span className="cat-editor-usage num" title={usage > 0 ? `${usage} ${t("giao dịch đang dùng", "transactions using this")}` : undefined}>
                  {usage > 0 ? usage : ""}
                </span>
                {locked ? (
                  <span className="cat-editor-lock" title={t("Danh mục hệ thống — không thể xóa", "System category — can't be deleted")} aria-label={t("Danh mục hệ thống", "System category")}>🔒</span>
                ) : (
                  <button className="cat-editor-delete" onClick={() => removeRow(idx)} title={t("Xóa danh mục", "Delete category")}>
                    <Icons.trash size={13} />
                  </button>
                )}
              </div>
              {paletteIdx === idx && (
                <div className="cat-editor-palette">
                  {CAT_PALETTE.map(c => (
                    <button
                      key={c}
                      className={"cat-swatch" + (r.color === c ? " active" : "")}
                      style={{ background: c }}
                      aria-label={t("Màu ", "Color ") + c}
                      onClick={() => { updateRow(idx, { color: c }); setPaletteIdx(null); }}
                    />
                  ))}
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>
      {removedInUse.length > 0 && (
        <div className="cat-editor-warning">
          <Icons.alertTri size={13} />
          <span>
            {t(<><b className="num">{movedCount}</b> giao dịch thuộc {removedInUse.map(n => `"${n}"`).join(", ")} sẽ chuyển sang "Khác" khi lưu</>, <><b className="num">{movedCount}</b> transactions in {removedInUse.map(n => `"${n}"`).join(", ")} will move to "Khác" (Other) on save</>)}
          </span>
        </div>
      )}
    </Modal>
  );
}

// ====== QuickTemplateModal — edit quick-entry templates in a dialog ======
function QuickTemplateModal({ templates, normalize, onSave, onClose }) {
  const t = useT();
  const [rows, setRows] = useState(() => templates.map(tpl => ({ ...tpl })));
  const pendingFocusId = useRef(null);

  useEffect(() => {
    if (!pendingFocusId.current) return;
    const id = pendingFocusId.current;
    requestAnimationFrame(() => {
      const row = document.querySelector(`[data-quick-template-id="${id}"]`);
      const input = row?.querySelector(".quick-template-name");
      if (input) {
        input.focus();
        input.select();
        input.scrollIntoView({ block: "nearest" });
      }
      pendingFocusId.current = null;
    });
  }, [rows.length]);

  const updateRow = (id, patch) => {
    setRows(rs => rs.map(r => {
      if (r.id !== id) return r;
      const next = { ...r, ...patch };
      if (patch.label != null && patch.desc == null) next.desc = patch.label;
      if (patch.type === "income") next.cat = "Thu nhập";
      if (patch.type === "expense" && r.type === "income") next.cat = Object.keys(CATEGORIES)[0] || "Khác";
      return next;
    }));
  };
  const addRow = () => {
    const id = `tpl-${Date.now()}`;
    pendingFocusId.current = id;
    setRows(rs => [...rs, { id, label: "", type: "expense", desc: "", amount: 10000, cat: Object.keys(CATEGORIES)[0] || "Khác" }]);
  };
  const removeRow = (id) => setRows(rs => rs.filter(r => r.id !== id));

  const handleSave = () => {
    onSave(rows.map((tpl, i) => normalize(tpl, i)));
    onClose();
  };

  return (
    <Modal
      title={t("Sửa mẫu nhanh", "Edit quick templates")}
      subtitle={t("Mẫu giúp điền sẵn form chỉ với một chạm", "Templates prefill the form with a single tap")}
      onClose={onClose}
      headerExtra={
        <button className="quick-template-tool" onClick={addRow}>
          <Icons.plus size={13} /> {t("Thêm", "Add")}
        </button>
      }
      footer={
        <>
          <button className="btn btn-secondary modal-btn" onClick={onClose}>{t("Hủy", "Cancel")}</button>
          <button className="btn modal-btn" onClick={handleSave}><Icons.check size={14} /> {t("Lưu", "Save")}</button>
        </>
      }
    >
      {rows.length === 0 ? (
        <Empty icon="inbox" title={t("Chưa có mẫu nào", "No templates yet")} text={t("Bấm Thêm để tạo mẫu đầu tiên", "Tap Add to create your first one")} />
      ) : (
        <div className="quick-template-editor">
          {rows.map(tpl => (
            <div
              className={"quick-template-edit-row " + tpl.type}
              key={tpl.id}
              data-quick-template-id={tpl.id}
            >
              <input
                className="input quick-template-name"
                value={tpl.label}
                placeholder={t("Tên mẫu", "Template name")}
                onChange={e => updateRow(tpl.id, { label: e.target.value })}
              />
              <select
                className="select quick-template-type"
                value={tpl.type}
                onChange={e => updateRow(tpl.id, { type: e.target.value })}
              >
                <option value="expense">{t("Chi", "Expense")}</option>
                <option value="income">{t("Thu", "Income")}</option>
              </select>
              <MoneyInput
                value={tpl.amount}
                onChange={value => updateRow(tpl.id, { amount: value })}
              />
              {tpl.type === "expense" && (
                <select
                  className="select quick-template-cat"
                  value={tpl.cat}
                  onChange={e => updateRow(tpl.id, { cat: e.target.value })}
                >
                  {Object.values(CATEGORIES).map(c => (
                    <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>
                  ))}
                </select>
              )}
              <button className="quick-template-delete" onClick={() => removeRow(tpl.id)} title={t("Xóa mẫu", "Delete template")}>
                <Icons.trash size={13} />
              </button>
            </div>
          ))}
        </div>
      )}
    </Modal>
  );
}

const SORT_OPTIONS = [
  { value: "date-desc", vi: "Mới nhất", en: "Newest" },
  { value: "date-asc",  vi: "Cũ nhất", en: "Oldest" },
  { value: "amount-desc", vi: "Tiền cao", en: "Highest" },
  { value: "amount-asc",  vi: "Tiền thấp", en: "Lowest" },
];

function SortDropdown({ value, onChange }) {
  const t = useT();
  const [open, setOpen] = useState(false);
  const [menuPos, setMenuPos] = useState({ top: 0, right: 0 });
  const btnRef = useRef(null);
  const selected = SORT_OPTIONS.find(o => o.value === value);
  const label = selected ? t(selected.vi, selected.en) : t("Sắp xếp", "Sort");

  const openMenu = () => {
    if (btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      setMenuPos({ top: r.bottom + 6, right: window.innerWidth - r.right });
    }
    setOpen(true);
  };

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (btnRef.current && !btnRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const menu = open && ReactDOM.createPortal(
    <div
      className="sort-dropdown-menu"
      style={{ top: menuPos.top, right: menuPos.right }}
      onMouseDown={e => e.stopPropagation()}
    >
      {SORT_OPTIONS.map(o => (
        <button
          key={o.value}
          className={"sort-dropdown-item" + (o.value === value ? " active" : "")}
          onClick={() => { onChange(o.value); setOpen(false); }}
        >
          {t(o.vi, o.en)}
        </button>
      ))}
    </div>,
    document.body
  );

  return (
    <>
      <button className="sort-dropdown-btn" ref={btnRef} onClick={openMenu}>
        {label} <Icons.chevDown size={11} />
      </button>
      {menu}
    </>
  );
}

function Transactions({ transactions, allTransactions = [], onAddTransaction, onUpdateTransaction, onDeleteTransaction, onSaveCategories, monthLabel }) {
  const t = useT();
  const [mode, setMode] = useState("expense");
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState(0);
  const [date, setDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [cat, setCat] = useState("Ăn uống");
  const [search, setSearch] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("all");
  const [sortMode, setSortMode] = useState("date-desc");
  const [justAdded, setJustAdded] = useState(false);
  const [btnSuccess, setBtnSuccess] = useState(false);
  const [editingTx, setEditingTx] = useState(null);
  const [showCatModal, setShowCatModal] = useState(false);
  const [showTemplateModal, setShowTemplateModal] = useState(false);
  const formRef = useRef(null);
  const firstExpenseCat = Object.keys(CATEGORIES)[0] || cat;
  const incomeCat = "Thu nhập";

  const incomeList = transactions.filter(t => t.type === "income");
  const expenseList = transactions.filter(t => t.type === "expense");
  const list = mode === "income" ? incomeList : expenseList;
  const categoryCounts = useMemo(() => {
    const counts = {};
    expenseList.forEach(t => {
      if (!t.cat) return;
      counts[t.cat] = (counts[t.cat] || 0) + 1;
    });
    return counts;
  }, [transactions]);
  const categoryOptions = useMemo(() =>
    Object.values(CATEGORIES).filter(c => categoryCounts[c.name]),
  [categoryCounts]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    const byDateDesc = (a, b) => (b.date || "").localeCompare(a.date || "") || String(b.id).localeCompare(String(a.id));
    const byDateAsc = (a, b) => (a.date || "").localeCompare(b.date || "") || String(a.id).localeCompare(String(b.id));
    const next = list.filter(t => {
      const matchesSearch = !q ||
        (t.desc || "").toLowerCase().includes(q) ||
        (t.cat && t.cat.toLowerCase().includes(q));
      const matchesCategory = mode !== "expense" ||
        categoryFilter === "all" ||
        t.cat === categoryFilter;
      return matchesSearch && matchesCategory;
    });

    return [...next].sort((a, b) => {
      if (sortMode === "date-asc") return byDateAsc(a, b);
      if (sortMode === "amount-desc") return (b.amount - a.amount) || byDateDesc(a, b);
      if (sortMode === "amount-asc") return (a.amount - b.amount) || byDateDesc(a, b);
      return byDateDesc(a, b);
    });
  }, [search, list, mode, categoryFilter, sortMode]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(t => {
      const k = t.date;
      g[k] = g[k] || [];
      g[k].push(t);
    });
    return Object.entries(g).sort(([a], [b]) => {
      if (sortMode === "date-asc") {
        if (a > b) return 1;
        if (a < b) return -1;
        return 0;
      }
      if (b > a) return 1;
      if (b < a) return -1;
      return 0;
    });
  }, [filtered, sortMode]);

  const filteredTotal = filtered.reduce((s, t) => s + t.amount, 0);
  const maxDayTotal = useMemo(() =>
    grouped.reduce((max, [, items]) => Math.max(max, items.reduce((s, t) => s + t.amount, 0)), 0),
  [grouped]);
  const hasListFilters = Boolean(search.trim()) ||
    (mode === "expense" && categoryFilter !== "all") ||
    sortMode !== "date-desc";
  const quickTemplateStorageKey = "fintrack-quick-templates-v1";

  const catUsageCounts = useMemo(() => {
    const counts = {};
    allTransactions.forEach(t => {
      if (!t.cat || t.cat === incomeCat) return;
      counts[t.cat] = (counts[t.cat] || 0) + 1;
    });
    return counts;
  }, [allTransactions]);

  // Keep form/filter selections valid after categories are renamed or deleted
  useEffect(() => {
    if (!CATEGORIES[cat]) setCat(Object.keys(CATEGORIES)[0] || "Khác");
    if (categoryFilter !== "all" && !CATEGORIES[categoryFilter]) setCategoryFilter("all");
  });

  const defaultQuickTemplates = useMemo(() => {
    const cats = Object.keys(CATEGORIES);
    return [
      { id: "lunch", label: "Ăn trưa", type: "expense", desc: "Ăn trưa", amount: 35000, cat: cats[0] || firstExpenseCat },
      { id: "water", label: "Nước", type: "expense", desc: "Nước uống", amount: 10000, cat: cats[0] || firstExpenseCat },
      { id: "grab", label: "Grab", type: "expense", desc: "Grab", amount: 25000, cat: cats[1] || firstExpenseCat },
      { id: "badminton", label: "Cầu lông", type: "expense", desc: "Cầu lông", amount: 80000, cat: cats[8] || firstExpenseCat },
      { id: "mom-transfer", label: "Mẹ chuyển", type: "income", desc: "Mẹ chuyển", amount: 1000000, cat: incomeCat },
    ];
  }, [firstExpenseCat, incomeCat]);
  const [savedQuickTemplates, setSavedQuickTemplates] = useState(null);
  const quickTemplates = savedQuickTemplates || defaultQuickTemplates;

  const normalizeQuickTemplate = (tpl, idx = 0, options = {}) => {
    const { allowEmptyLabel = false } = options;
    const type = tpl.type === "income" ? "income" : "expense";
    const rawLabel = String(tpl.label ?? tpl.desc ?? "");
    const label = allowEmptyLabel ? rawLabel : (rawLabel.trim() || "Mẫu mới");
    return {
      id: tpl.id || `${Date.now()}-${idx}`,
      label,
      type,
      desc: String(tpl.desc || label).trim() || label,
      amount: Number(tpl.amount) || 0,
      cat: type === "income" ? incomeCat : (tpl.cat || firstExpenseCat),
    };
  };

  useEffect(() => {
    try {
      const raw = localStorage.getItem(quickTemplateStorageKey);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed)) {
        setSavedQuickTemplates(parsed.map(normalizeQuickTemplate));
      }
    } catch (_) {
      setSavedQuickTemplates(null);
    }
  }, []);

  useEffect(() => {
    if (!savedQuickTemplates) return;
    try {
      localStorage.setItem(quickTemplateStorageKey, JSON.stringify(savedQuickTemplates));
    } catch (_) {}
  }, [savedQuickTemplates]);

  useEffect(() => {
    if (mode === "income" && categoryFilter !== "all") {
      setCategoryFilter("all");
    }
  }, [mode, categoryFilter]);

  const clearDraft = () => {
    setDesc("");
    setAmount(0);
    setDate(new Date().toISOString().slice(0, 10));
    setEditingTx(null);
  };

  const applyTemplate = (tpl) => {
    setEditingTx(null);
    setMode(tpl.type);
    setDesc(tpl.desc || tpl.label || "");
    setAmount(Number(tpl.amount) || 0);
    if (tpl.type === "expense") setCat(tpl.cat || firstExpenseCat);
    setDate(new Date().toISOString().slice(0, 10));
  };

  const startEdit = (tx) => {
    setEditingTx(tx);
    setMode(tx.type || "expense");
    setDesc(tx.desc || "");
    setAmount(tx.amount || 0);
    setCat(tx.type === "expense" ? (tx.cat || firstExpenseCat) : firstExpenseCat);
    setDate(tx.date || new Date().toISOString().slice(0, 10));
    formRef.current?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  };

  const cancelEdit = () => clearDraft();

  const handleSubmit = () => {
    if (!desc.trim() || amount <= 0) return;
    if (editingTx) {
      onUpdateTransaction && onUpdateTransaction(editingTx.id, {
        type: mode,
        desc: desc.trim(),
        amount,
        cat: mode === "expense" ? cat : incomeCat,
        date,
      });
      clearDraft();
      return;
    }
    onAddTransaction({
      type: mode,
      desc: desc.trim(),
      amount,
      cat: mode === "expense" ? cat : incomeCat,
      date,
    });
    setDesc("");
    setAmount(0);
    setJustAdded(true);
    setBtnSuccess(true);
    setTimeout(() => setJustAdded(false), 700);
    setTimeout(() => setBtnSuccess(false), 650);
  };

  const clearListFilters = () => {
    setSearch("");
    setCategoryFilter("all");
    setSortMode("date-desc");
  };

  return (
    <div className="page tx-page fade-in">
      <PageHeader greet={`${monthLabel} · ${transactions.length} ${t("giao dịch", "transactions")}`} />

      <div className="tx-layout">
        {/* ===== LEFT: form + summary ===== */}
        <aside className="tx-aside">
          <div ref={formRef} className="card tx-form-card stagger stagger-1" style={{ scrollMarginTop: 80 }}>
            <div className="card-header" style={{ marginBottom: 14 }}>
              <div>
                <div className="card-title">{editingTx ? t("Sửa giao dịch", "Edit transaction") : t("Thêm giao dịch", "Add transaction")}</div>
                <div className="card-subtitle">{editingTx ? t("Cập nhật lại thông tin giao dịch", "Update the transaction details") : t("Ghi lại ngay để không quên", "Log it now so you don't forget")}</div>
              </div>
              {editingTx && (
                <button className="btn btn-secondary tx-cancel-edit" onClick={cancelEdit}>
                  <Icons.x size={14} /> {t("Hủy", "Cancel")}
                </button>
              )}
            </div>

            <div className="tx-tabs" style={{ marginBottom: 14, width: "100%" }}>
              <button
                className={"tx-tab" + (mode === "income" ? " active income" : "")}
                onClick={() => setMode("income")}
                style={{ flex: 1, justifyContent: "center" }}
              >
                <Icons.arrowDownLeft size={13} /> {t("Thu nhập", "Income")}
              </button>
              <button
                className={"tx-tab" + (mode === "expense" ? " active expense" : "")}
                onClick={() => setMode("expense")}
                style={{ flex: 1, justifyContent: "center" }}
              >
                <Icons.arrowUpRight size={13} /> {t("Chi tiêu", "Expense")}

            </div>

            <div className="tx-form-vertical">
              <div className="quick-templates">

                  <div className="quick-template-label">{t("Mẫu nhanh", "Quick templates")}</div>

                    </button>
                  ))}
                </div>
              </div>
              <div className="field">
                <span className="field-label">{t("Mô tả", "Description")}</span>
                <input
                  className="input" type="text"
                  placeholder={mode === "income" ? t("VD: Lương, mẹ chuyển...", "e.g. Salary, transfer...") : t("VD: Cơm tấm, Grab, sách...", "e.g. Lunch, Grab, books...")}
                  value={desc}
                  onChange={e => setDesc(e.target.value)}

                <div className="amount-quick-row">
                  {TX_AMOUNT_STEPS.map(step => (
                    <button
                      key={step}
                      className="amount-quick-chip num"
                      onClick={() => setAmount(a => a + step)}
                    >
                      +{fmtShort(step)}
                    </button>
                  ))}
                </div>
              </div>
              {mode === "expense" && (
                <div className="field">
                  <div className="field-label-row">
                    <span className="field-label">{t("Danh mục", "Category")}</span>
                    <button className="quick-template-tool" onClick={() => setShowCatModal(true)}>
                      <Icons.pencil size={12} /> {t("Sửa", "Edit")}
                    </button>
                  </div>
                  <div className="cat-grid">
                    {Object.values(CATEGORIES).map(c => (
                      <button
                        key={c.name}
                        className={"cat-grid-chip" + (cat === c.name ? " active" : "")}
                        style={{ "--cat-color": c.color, "--cat-tint": c.color + "26" }}

                      >
                        <span aria-hidden="true">{c.emoji}</span>
                        {c.name}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <div className="field">
                <span className="field-label">{t("Ngày", "Date")}</span>
                <input type="date" className="input" value={date} onChange={e => setDate(e.target.value)} />
              </div>
              <button
                className={"btn tx-submit-btn" + (btnSuccess ? " btn-success" : "")}
                onClick={handleSubmit}
              >
                {btnSuccess || editingTx ? <Icons.check size={15} /> : <Icons.plus size={15} />}
                {editingTx ? t("Lưu thay đổi", "Save changes") : (btnSuccess ? t("Đã thêm!", "Added!") : t("Thêm giao dịch", "Add transaction"))}
              </button>
            </div>
          </div>

        </aside>

        {/* ===== RIGHT: list ===== */}
        <div className="tx-main">
          <div className="search-bar stagger stagger-2">
            <Icons.search size={15} style={{ color: "var(--text-3)" }} />
            <input
              placeholder={t(`Tìm ${mode === "income" ? "thu nhập" : "chi tiêu"}, danh mục...`, `Search ${mode === "income" ? "income" : "expenses"}, category...`)}
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <SortDropdown value={sortMode} onChange={setSortMode} />
            {hasListFilters && (
              <button className="tx-clear-filter" onClick={clearListFilters} title={t("Xóa lọc", "Clear filters")}>
                <Icons.x size={13} />
              </button>
            )}
            <span className="search-meta">{filtered.length} / {list.length}</span>
          </div>

          <div className="card tx-list-card stagger stagger-3">
            {list.length === 0 ? (
              <Empty icon="inbox" title={t("Chưa có giao dịch", "No transactions yet")}
                text={t(`Thêm ${mode === "income" ? "thu nhập" : "chi tiêu"} đầu tiên ở panel bên trái`, `Add your first ${mode === "income" ? "income" : "expense"} in the panel on the left`)} />
            ) : filtered.length === 0 ? (
              <Empty icon="search" title={t("Không tìm thấy", "No results")} text={t("Thử từ khóa khác hoặc xóa bộ lọc", "Try a different keyword or clear the filters")} />
            ) : (
              grouped.map(([day, items], groupIdx) => {
                const total = items.reduce((s, t) => s + t.amount, 0);
                const barPct = maxDayTotal > 0 ? (total / maxDayTotal) * 100 : 0;
                return (
                  <div key={day}>
                    <div className={"tx-day-head" + (mode === "income" ? " income" : "")}>
                      <div className="tx-day-label">
                        <span className="tx-day-name">{txDayLabel(day, t)}</span>
                        <span className={"num tx-day-total" + (mode === "income" ? " in" : "")}>
                          {mode === "income" ? "+" : ""}{fmt(total)}
                        </span>
                      </div>
                      <div className="tx-day-bar" aria-hidden="true">
                        <span style={{ width: barPct + "%" }} />
                      </div>
                    </div>
                    <div className="tx-list">
                      {items.map((tx, itemIdx) => {
                        const catInfo = tx.cat ? CATEGORIES[tx.cat] : null;
                        const bg = catInfo ? catInfo.color + "20" : "rgba(52,199,89,0.15)";
                        const fg = catInfo ? catInfo.color : "var(--c-green)";
                        const isNew = justAdded && groupIdx === 0 && itemIdx === 0;
                        const isEditing = editingTx && editingTx.id === tx.id;
                        return (
                          <div
                            className={"tx-row" + (isNew ? " tx-row-new" : "") + (isEditing ? " is-editing" : "")}
                            key={tx.id}
                            style={{ "--row-tint": catInfo ? catInfo.color + "14" : "rgba(52,199,89,0.10)" }}
                          >
                            <div className="tx-icon" style={{ background: bg, color: fg }}>
                              {catInfo ? catInfo.emoji : "💰"}
                            </div>
                            <div className="tx-info">
                              <span className="tx-desc">{tx.desc}</span>
                              <span className="tx-meta">{catInfo ? catInfo.name : t("Thu nhập", "Income")}</span>
                            </div>
                            <span className={"tx-amount " + (mode === "income" ? "in" : "out")}>
                              {mode === "income" ? "+" : "−"}{fmt(tx.amount)}
                            </span>
                            <div className="tx-actions">
                              <button className="tx-edit" title={t("Sửa", "Edit")}
                                onClick={() => startEdit(tx)}>
                                <Icons.pencil size={14} />
                              </button>
                              <button className="tx-delete" title={t("Xóa", "Delete")}
                                onClick={() => onDeleteTransaction && onDeleteTransaction(tx.id)}>
                                <Icons.trash size={14} />
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      </div>

      {showCatModal && (
        <CategoryManagerModal
          usageCounts={catUsageCounts}
          onSave={(list, renames, removed) => onSaveCategories && onSaveCategories(list, renames, removed)}
          onClose={() => setShowCatModal(false)}
        />
      )}
      {showTemplateModal && (
        <QuickTemplateModal
          templates={quickTemplates}
          normalize={normalizeQuickTemplate}
          onSave={setSavedQuickTemplates}
          onClose={() => setShowTemplateModal(false)}
        />
      )}
    </div>
  );
}

// Debts — friend/service ledger

function Debts({ debts, onAddDebt, onUpdateDebt, onDeleteDebt, onSettleDebt, onReopenDebt }) {
  const t = useT();
  const [filter, setFilter] = useState("all");
  const [name, setName] = useState("");
  const [amt, setAmt] = useState(0);
  const [type, setType] = useState("owe");
  const [note, setNote] = useState("");
  const [editingDebt, setEditingDebt] = useState(null);
  const [editName, setEditName] = useState("");
  const [editAmt, setEditAmt] = useState(0);
  const [editType, setEditType] = useState("owe");
  const [editNote, setEditNote] = useState("");

  const filtered = useMemo(() => {
    if (filter === "all")    return debts;
    if (filter === "paid")   return debts.filter(d => d.settled);
    if (filter === "owe")    return debts.filter(d => d.type === "owe"  && !d.settled);
    if (filter === "owed")   return debts.filter(d => d.type === "lend" && !d.settled);
    return debts;
  }, [filter, debts]);

  const openOwe  = debts.filter(d => d.type === "owe"  && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openOwed = debts.filter(d => d.type === "lend" && !d.settled).reduce((s, d) => s + d.amount, 0);
  const paidCount = debts.filter(d => d.settled).length;
  const oweCount  = debts.filter(d => d.type === "owe"  && !d.settled).length;
  const owedCount = debts.filter(d => d.type === "lend" && !d.settled).length;

  const handleAdd = () => {
    if (!name.trim() || amt <= 0) return;
    onAddDebt({ name: name.trim(), amount: amt, type, note: note.trim(), settled: false });
    setName(""); setAmt(0); setNote("");
  };

  const startEdit = (debt) => {
    setEditingDebt(debt);
    setEditName(debt.name || "");
    setEditAmt(debt.amount || 0);
    setEditType(debt.type || "owe");
    setEditNote(debt.note || "");
  };

  const cancelEdit = () => {
    setEditingDebt(null);
    setEditName("");
    setEditAmt(0);
    setEditType("owe");
    setEditNote("");
  };

  const saveEdit = () => {
    if (!editingDebt || !editName.trim() || editAmt <= 0) return;
    onUpdateDebt && onUpdateDebt(editingDebt.id, {
      name: editName.trim(),
      amount: editAmt,
      type: editType,
      note: editNote.trim(),
    });
    cancelEdit();
  };

  return (
    <div className="page fade-in">
      <PageHeader greet={t("Sổ nợ vay với bạn bè & dịch vụ", "Debt ledger with friends & services")} />

      {/* === Hero stats === */}
      <div className="stat-grid">
        <div className="stat">
          <div className="stat-label">
            <Icons.arrowUpRight size={13} /> {t("Bạn đang nợ", "You owe")}
          </div>
          <div className="stat-value num">{fmt(openOwe)}</div>
          <div className="stat-sub">{oweCount} {t("khoản cần trả", "to pay")}</div>
        </div>

        <div className="stat">
          <div className="stat-label">
            <Icons.arrowDownLeft size={13} /> {t("Người khác nợ bạn", "Owed to you")}
          </div>
          <div className="stat-value num">{fmt(openOwed)}</div>
          <div className="stat-sub">{owedCount} {t("khoản chờ thu", "to collect")}</div>
        </div>

        <div className="stat">
          <div className="stat-label">
            <Icons.check size={13} /> {t("Đã xong", "Settled")}
          </div>
          <div className="stat-value num">{paidCount}</div>
          <div className="stat-sub">{t("khoản trong tháng", "this month")}</div>
        </div>
      </div>

      {/* === Add form === */}
      <div className="card" style={{ marginBottom: 18 }}>
        <div className="card-header">
          <div>
            <div className="card-title">{t("Ghi nhận khoản nợ mới", "Record a new debt")}</div>
            <div className="card-subtitle">{t("Theo dõi ai nợ ai để không quên", "Track who owes whom so you don't forget")}</div>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", gap: 10, alignItems: "end" }}>
          <div className="field">
            <span className="field-label">{t("Tên người", "Person")}</span>
            <input className="input" type="text" placeholder={t("VD: Nam, Hân, Shopee...", "e.g. Nam, Han, Shopee...")}
              value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div className="field">
            <span className="field-label">{t("Số tiền", "Amount")}</span>
            <MoneyInput value={amt} onChange={setAmt} />
          </div>
          <div className="field">
            <span className="field-label">{t("Loại", "Type")}</span>
            <select className="select" value={type} onChange={e => setType(e.target.value)}>
              <option value="owe">{t("Mình nợ họ", "I owe them")}</option>
              <option value="lend">{t("Họ nợ mình", "They owe me")}</option>
            </select>
          </div>
          <div className="field">
            <span className="field-label">{t("Ghi chú", "Note")}</span>
            <input className="input" type="text" placeholder={t("VD: Tiền ăn hôm qua", "e.g. Yesterday's meal")}
              value={note} onChange={e => setNote(e.target.value)} />
          </div>
          <button className="btn" style={{ height: 41 }} onClick={handleAdd}>
            <Icons.plus size={15} /> {t("Thêm", "Add")}
          </button>
        </div>
      </div>

      {/* === Filter tabs === */}
      <div className="tx-tabs" style={{ marginBottom: 14 }}>
        <button className={"tx-tab" + (filter === "all"  ? " active" : "")} onClick={() => setFilter("all")}>
          {t("Tất cả", "All")} ({debts.length})
        </button>
        <button className={"tx-tab" + (filter === "owe"  ? " active" : "")} onClick={() => setFilter("owe")}>
          {t("Mình nợ", "I owe")} ({oweCount})
        </button>
        <button className={"tx-tab" + (filter === "owed" ? " active" : "")} onClick={() => setFilter("owed")}>
          {t("Họ nợ mình", "Owed to me")} ({owedCount})
        </button>
        <button className={"tx-tab" + (filter === "paid" ? " active" : "")} onClick={() => setFilter("paid")}>
          {t("Đã xong", "Settled")} ({paidCount})
        </button>
      </div>

      {/* === List === */}
      <div className="card" style={{ padding: 14 }}>
        {filtered.length === 0 ? (
          <Empty icon="inbox" title={t("Không có khoản nợ", "No debts")} text={t("Tuyệt! Bạn đang sạch nợ.", "Nice! You're debt-free.")} />
        ) : (
          <div className="debt-list">
            {filtered.map(d => {
              const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
              const color = debtColor(d.name);
              const isPaid = !!d.settled;
              const isEditing = editingDebt?.id === d.id;
              if (isEditing) {
                return (
                  <div className="debt-edit-item" key={d.id}>
                    <div className="debt-edit-grid">
                      <input className="input" type="text" value={editName} onChange={e => setEditName(e.target.value)} />
                      <MoneyInput value={editAmt} onChange={setEditAmt} />
                      <select className="select" value={editType} onChange={e => setEditType(e.target.value)}>
                        <option value="owe">{t("Mình nợ họ", "I owe them")}</option>
                        <option value="lend">{t("Họ nợ mình", "They owe me")}</option>
                      </select>
                      <input className="input" type="text" value={editNote} onChange={e => setEditNote(e.target.value)} placeholder={t("Ghi chú", "Note")} />
                      <div className="debt-actions">
                        <button className="btn" style={{ padding: "8px 12px", fontSize: 12 }} onClick={saveEdit}>{t("Lưu", "Save")}</button>
                        <button className="btn-secondary btn" style={{ padding: "8px 12px", fontSize: 12 }} onClick={cancelEdit}>{t("Hủy", "Cancel")}</button>
                      </div>
                    </div>
                  </div>
                );
              }
              return (
                <div className={"debt-row" + (isPaid ? " paid" : "")} key={d.id}>
                  <div className="debt-avatar" style={{ background: color, opacity: isPaid ? 0.5 : 1 }}>
                    {initials}
                  </div>
                  <div className="debt-info">
                    <span className="debt-name">{d.name}</span>
                    <span className="debt-note">{d.note}</span>
                  </div>
                  <span className={"debt-amount num " + (d.type === "owe" ? "owe" : "owed")}>
                    {isPaid ? null : (d.type === "owe" ? "−" : "+")}{fmt(d.amount)}
                  </span>
                  {isPaid ? (
                    <div className="debt-actions">
                      <span className="debt-status-pill paid">
                        <Icons.check size={10} style={{ verticalAlign: "middle" }} /> {t("Xong", "Done")}
                      </span>
                      <button className="btn-secondary btn debt-small-btn" onClick={() => onReopenDebt && onReopenDebt(d.id)}>
                        {t("Mở lại", "Reopen")}
                      </button>
                      <button className="debt-icon-btn" title={t("Sửa", "Edit")} onClick={() => startEdit(d)}>
                        <Icons.pencil size={13} />
                      </button>
                    </div>
                  ) : (
                    <div className="debt-actions">
                      <button className="btn-secondary btn debt-small-btn" onClick={() => onSettleDebt && onSettleDebt(d.id)}>
                        {d.type === "owe" ? t("Trả", "Pay") : t("Thu", "Collect")}
                      </button>
                      <button className="debt-icon-btn" title={t("Sửa", "Edit")} onClick={() => startEdit(d)}>
                        <Icons.pencil size={13} />
                      </button>
                      <button className="tx-delete" title={t("Xóa", "Delete")}
                        onClick={() => onDeleteDebt && onDeleteDebt(d.id)}
                        style={{ opacity: 1, width: 28, height: 28 }}>
                        <Icons.trash size={13} />
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Insight */}
      {openOwe > openOwed && openOwe > 0 && (
        <div style={{ marginTop: 18 }}>
          <Insight tone="orange" icon="alertTri" title={t("Bạn đang nợ nhiều hơn người khác nợ bạn", "You owe more than others owe you")}>
            {t(<>Khoản nợ ròng <b>{fmt(openOwe - openOwed)}</b>. Cân nhắc dành dụm để trả sớm nhé.</>, <>Net debt <b>{fmt(openOwe - openOwed)}</b>. Consider setting money aside to pay it off soon.</>)}
          </Insight>
        </div>
      )}
    </div>
  );
}

window.Debts = Debts;

// Budget — caps per category with peer benchmark + over-limit warnings + edit/delete

function Budget({ budgets, transactions, onSaveBudget, onDeleteBudget, viewMonth, viewYear }) {
  const t = useT();
  const [editingCat, setEditingCat] = useState(null);
  const [editCat, setEditCat] = useState(Object.keys(CATEGORIES)[0]);
  const [editAmt, setEditAmt] = useState(800000);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const formRef = useRef(null);
  const today = new Date();
  const safeViewMonth = Number.isInteger(viewMonth) ? viewMonth : today.getMonth();
  const safeViewYear = Number.isInteger(viewYear) ? viewYear : today.getFullYear();
  const daysInViewedMonth = new Date(safeViewYear, safeViewMonth + 1, 0).getDate();
  const isCurrentView = today.getMonth() === safeViewMonth && today.getFullYear() === safeViewYear;
  const averageDayCount = Math.max(1, isCurrentView ? today.getDate() : daysInViewedMonth);

  const rows = budgets.map(b => {
    const actual = transactions
      .filter(t => t.type === "expense" && t.cat === b.cat)
      .reduce((s, t) => s + t.amount, 0);
    const pct = b.cap > 0 ? (actual / b.cap) * 100 : 0;
    const benchmark = CAT_BENCHMARKS[b.cat] || Math.round(b.cap * 0.9);
    const benchPct = b.cap > 0 ? (benchmark / b.cap) * 100 : 0;
    let level = "ok";
    if (pct >= 100) level = "danger";
    else if (pct >= 80) level = "warn";
    return {
      ...b,
      ...(CATEGORIES[b.cat] || { name: b.cat, emoji: "📦", color: "#8E8E93" }),
      actual,
      remaining: b.cap - actual,
      pct,
      benchPct,
      level,
      averageDaily: Math.round(actual / averageDayCount),
      averageWeekly: Math.round(actual / (averageDayCount / 7)),
      vsBench: actual - benchmark,
      benchmark,
    };
  });

  const totalCap   = rows.reduce((s, r) => s + r.cap, 0);
  const totalSpent = rows.reduce((s, r) => s + r.actual, 0);

  const handleStartEdit = (b) => {
    setEditingCat(b.cat);
    setEditCat(b.cat);
    setEditAmt(b.cap);
    formRef.current?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  };

  const handleCancel = () => {
    setEditingCat(null);
    setEditCat(Object.keys(CATEGORIES)[0]);
    setEditAmt(800000);
  };

  const handleSave = () => {
    if (editAmt <= 0) return;
    onSaveBudget(editCat, editAmt);
    handleCancel();
  };

  const handleDelete = (cat) => {
    onDeleteBudget(cat);
    setConfirmDelete(null);
    if (editingCat === cat) handleCancel();
  };

  return (
    <div className="page fade-in">
      <PageHeader greet={t("Đặt giới hạn — sống trong khả năng", "Set limits — live within your means")}>
        <button className="btn" onClick={() => { handleCancel(); formRef.current?.scrollIntoView({ behavior: "smooth" }); }}>
          <Icons.plus size={15} /> {t("Tạo ngân sách", "Create budget")}
        </button>
      </PageHeader>

      {/* === Summary stats === */}
      <div className="budget-stats">
        <div className="stat">
          <div className="stat-label"><Icons.wallet size={13} /> {t("Tổng ngân sách", "Total budget")}</div>
          <div className="stat-value num">{fmt(totalCap)}</div>
          <div className="stat-sub">{rows.length} {t("danh mục", "categories")}</div>
        </div>
        <div className="stat">
          <div className="stat-label" style={{ color: "var(--c-red)" }}>
            <Icons.arrowUpRight size={13} /> {t("Đã chi", "Spent")}
          </div>
          <div className="stat-value num">{fmt(totalSpent)}</div>
          <div className="stat-sub">
            <span className="num">{totalCap > 0 ? ((totalSpent / totalCap) * 100).toFixed(0) : 0}%</span> {t("ngân sách", "of budget")}
          </div>
        </div>
        <div className="stat">
          <div className="stat-label" style={{ color: totalCap - totalSpent >= 0 ? "var(--c-green)" : "var(--c-red)" }}>
            <Icons.flag size={13} /> {t("Còn lại", "Remaining")}
          </div>
          <div className="stat-value num" style={{ color: totalCap - totalSpent >= 0 ? "inherit" : "var(--c-red)" }}>
            {fmt(Math.abs(totalCap - totalSpent))}
          </div>
          <div className="stat-sub">{totalCap - totalSpent >= 0 ? t("chưa chi", "unspent") : t("vượt mức", "over budget")}</div>
        </div>
      </div>

      {/* === Add/Edit form === */}
      <div ref={formRef} className="card" style={{ marginBottom: 18, scrollMarginTop: 80 }}>

function Notes({ notes = "", onSaveNotes }) {
  const t = useT();
  const [draft, setDraft] = useState(notes || "");
  const [savedAt, setSavedAt] = useState(null);

  useEffect(() => {
    setDraft(notes || "");
  }, [notes]);

  useEffect(() => {
    const next = draft || "";
    if (next === (notes || "")) return;

    const timer = setTimeout(() => {
      onSaveNotes(next);
      setSavedAt(new Date());
    }, 650);

    return () => clearTimeout(timer);
  }, [draft, notes, onSaveNotes]);

  const noteLength = draft.trim().length;
  const savedTime = savedAt
    ? savedAt.toLocaleTimeString(t.lang === "en" ? "en-US" : "vi-VN", { hour: "2-digit", minute: "2-digit" })
    : null;
  const savedLabel = savedTime
    ? t(`Đã lưu ${savedTime}`, `Saved ${savedTime}`)
    : t("Tự lưu khi bạn nhập", "Auto-saves as you type");

  return (
    <div className="page fade-in notes-page">
      <PageHeader greet="Note" title={t("Ghi chú tài chính", "Financial notes")}>
        <span className="note-save-status">{savedLabel}</span>
      </PageHeader>

      <section className="note-editor card">
        <textarea
          className="note-textarea"
          value={draft}
          onChange={e => setDraft(e.target.value)}
          placeholder={t("Ghi lại những việc cần nhớ: tiền trọ, khoản sắp phải trả, quyết định chi tiêu, mục tiêu tiết kiệm...", "Jot down what to remember: rent, upcoming payments, spending decisions, savings goals...")}
          spellCheck={false}
        />
        <div className="note-footer">
          <span>{noteLength} {t("ký tự", "characters")}</span>
          <span>{t("Được lưu cùng dữ liệu tài chính của bạn", "Saved alongside your financial data")}</span>
        </div>
      </section>
    </div>
  );
}

function authErrorMessage(err, tr = (vi) => vi) {
  const code = err?.code || "";
  if (code.includes("invalid-email")) return tr("Email chưa đúng định dạng.", "That email address looks invalid.");
  if (code.includes("user-not-found") || code.includes("wrong-password") || code.includes("invalid-credential")) {
    return tr("Email hoặc mật khẩu chưa đúng.", "Wrong email or password.");
  }
  if (code.includes("email-already-in-use")) return tr("Email này đã có tài khoản rồi.", "This email already has an account.");
  if (code.includes("weak-password")) return tr("Mật khẩu nên có ít nhất 6 ký tự.", "Password should be at least 6 characters.");
  if (code.includes("popup-closed")) return tr("Bạn đã đóng cửa sổ đăng nhập.", "You closed the sign-in window.");
  if (code.includes("operation-not-allowed")) return tr("Provider đăng nhập này chưa được bật trong Firebase.", "This sign-in provider isn't enabled in Firebase.");
  return err?.message || tr("Không đăng nhập được, thử lại giúp mình.", "Couldn't sign in, please try again.");
}

    e.preventDefault();

      } else {

function readLocalData(user, { allowLegacy = false } = {}) {
  try {
    const raw = localStorage.getItem(localDataKey(user));
    if (raw) return JSON.parse(raw);

    if (allowLegacy) {
      const legacyRaw = localStorage.getItem(LOCAL_DATA_KEY);
      return legacyRaw ? JSON.parse(legacyRaw) : null;
    }
    return null;
  } catch (err) {
    console.warn("Local data unavailable:", err);
    return null;
  }
}

function saveLocalData(data, user) {
  try {
    localStorage.setItem(localDataKey(user), JSON.stringify(data));
    if (isOwnerUser(user)) {
      localStorage.setItem(LOCAL_DATA_KEY, JSON.stringify(data));
    }
  } catch (err) {
    console.warn("Local data save failed:", err);
  }
}

function localDateKey(dateLike = new Date()) {
  const d = dateLike instanceof Date ? dateLike : new Date(dateLike);
  if (Number.isNaN(d.getTime())) return localDateKey(new Date());
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function debtSettlementTransaction(debt, paidDate = new Date(), idPrefix = "settle") {
  return {
    id: `${idPrefix}-${debt.id}`,
    debtId: debt.id,
    type: debt.type === "owe" ? "expense" : "income",
    desc: debt.type === "owe" ? `Trả nợ ${debt.name}` : `Thu nợ ${debt.name}`,
    amount: debt.amount,
    cat: debt.type === "owe" ? "Trả nợ" : "Thu nhập",
    date: localDateKey(paidDate),
  };
}

function isDebtSettlementTransactionForDebt(t, debt) {
  if (!t || !debt) return false;

  const debtId = String(debt.id);
  if (t.debtId != null && String(t.debtId) === debtId) return true;

  const txId = String(t.id ?? "");
  if (txId === `settle-${debtId}` || txId === `settle-backfill-${debtId}`) return true;

  const expectedType = debt.type === "owe" ? "expense" : "income";
  const expectedCat = debt.type === "owe" ? "Trả nợ" : "Thu nhập";
  const expectedDesc = debt.type === "owe" ? `Trả nợ ${debt.name}` : `Thu nợ ${debt.name}`;
  return (
    t.type === expectedType &&
    t.cat === expectedCat &&
    String(t.desc || "").trim() === expectedDesc &&
    (Number(t.amount) || 0) === (Number(debt.amount) || 0)
  );
}

function getMonthlyBalance(transactions, viewYear, viewMonth) {
  const monthStart = new Date(viewYear, viewMonth, 1);
  const nextMonthStart = new Date(viewYear, viewMonth + 1, 1);
  let openingBalance = 0;
  let income = 0;
  let expense = 0;

  transactions.forEach(t => {
    const d = new Date((t.date || "") + "T00:00:00");
    if (Number.isNaN(d.getTime())) return;

    const amount = Number(t.amount) || 0;
    const signedAmount = t.type === "income" ? amount : t.type === "expense" ? -amount : 0;

    if (d < monthStart) {
      openingBalance += signedAmount;
      return;
    }

    if (d >= monthStart && d < nextMonthStart) {
      if (t.type === "income") income += amount;
      if (t.type === "expense") expense += amount;
    }
  });

  const periodBalance = income - expense;
  return {
    openingBalance,
    periodBalance,
    closingBalance: openingBalance + periodBalance,
  };
}

function App() {
  const [allTransactions, setAllTransactions] = useState([]);
  const [debts, setDebts]       = useState([]);
  const [budgets, setBudgets]   = useState([]);
  const [goals, setGoals]       = useState([]);
  const [notes, setNotes]       = useState("");
  const [loaded, setLoaded]     = useState(false);
  const [authReady, setAuthReady] = useState(false);
  const [authUser, setAuthUser] = useState(null);
  // Where the currently shown data came from: "remote" (live Firestore),
  // "local" (cached backup), or "seed" (built-in sample — DB unreachable).
  const [dataSource, setDataSource] = useState("remote");
  const [page, setPage]         = useState("overview");
  const [theme, setTheme]       = useState(() => localStorage.getItem("hieu-theme") || "light");
  const [lang, setLang]         = useState(() => localStorage.getItem("hieu-lang") || "vi");
  const [monthOffset, setMonthOffset] = useState(0); // 0 = current month
  const [accountMenuOpen, setAccountMenuOpen] = useState(false);
  const accountMenuRef = useRef(null);
  // Bumped whenever the shared CATEGORIES map is rebuilt so all pages re-render
  const [, setCatsVersion] = useState(0);

  // Compute viewed month
  const now = new Date();
  const viewDate  = new Date(now.getFullYear(), now.getMonth() - monthOffset, 1);
  const viewMonth = viewDate.getMonth();
  const viewYear  = viewDate.getFullYear();
  const monthLabel = lang === "en"
    ? `${MONTHS_EN[viewMonth]} ${viewYear}`
    : `Tháng ${viewMonth + 1}, ${viewYear}`;

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem("hieu-theme", theme);
  }, [theme]);

  useEffect(() => {
    localStorage.setItem("hieu-lang", lang);
  }, [lang]);

  useEffect(() => {
    if (!accountMenuOpen) return;
    const handler = (e) => {
      if (accountMenuRef.current && !accountMenuRef.current.contains(e.target)) {
        setAccountMenuOpen(false);
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [accountMenuOpen]);

  useEffect(() => {
    getFirebaseApp();
    const auth = firebase.auth();
    auth.languageCode = lang === "vi" ? "vi" : "en";
    return auth.onAuthStateChanged(user => {
      setAuthUser(user);
      setAuthReady(true);
      if (!user) {
        window._fsDoc = null;
        setLoaded(false);
      }
    });
  }, [lang]);

  useEffect(() => {
    if (!authReady || !authUser) return undefined;
    setLoaded(false);
    // persistLocal: only cache to localStorage when the data is trustworthy
    // (live remote data, or the user's own local backup). Never overwrite the
    // local backup with built-in seed data — that would destroy the only
    // surviving copy if the database is temporarily unreachable.
    const hydrate = (data = {}, { persistLocal = true } = {}) => {
      setCategories(data.categories);
      setCatsVersion(v => v + 1);
      const { result, changed } = migrateCats(data.transactions || []);
      const dbts = data.debts   || [];
      const bdgs = data.budgets || [];
      const gls  = data.goals   || DEFAULT_GOALS;
      const nts  = data.notes   || "";
      const openDebtSettlements = result.filter(t =>
        dbts.some(debt => !debt.settled && isDebtSettlementTransactionForDebt(t, debt))
      );
      const cleanedResult = openDebtSettlements.length
        ? result.filter(t => !dbts.some(debt => !debt.settled && isDebtSettlementTransactionForDebt(t, debt)))
        : result;
      const missingSettlementTxs = dbts
        .filter(debt => debt.settled && debt.paidDate && !cleanedResult.some(t => isDebtSettlementTransactionForDebt(t, debt)))
        .map(debt => debtSettlementTransaction(debt, debt.paidDate, "settle-backfill"));
      const txns = missingSettlementTxs.length ? [...missingSettlementTxs, ...cleanedResult] : cleanedResult;
      setAllTransactions(txns);
      setDebts(dbts);
      setBudgets(bdgs);
      setGoals(gls);
      setNotes(nts);
      setLoaded(true);
      if (persistLocal) {
        saveLocalData({ categories: Object.values(CATEGORIES), transactions: txns, debts: dbts, budgets: bdgs, goals: gls, notes: nts }, authUser);
      }
      return { txns, dbts, bdgs, gls, nts, changed, missingSettlementTxs, openDebtSettlements };
    };

    getFirebaseApp();
    const db = firebase.firestore();
    window._fsDoc = db.collection("fintrackUsers").doc(authUser.uid);

    const unsub = window._fsDoc.onSnapshot(async snap => {
      if (snap.exists) {
        setDataSource("remote");
        const { txns, dbts, bdgs, gls, nts, changed, missingSettlementTxs, openDebtSettlements } = hydrate(snap.data());
        if (changed || missingSettlementTxs.length || openDebtSettlements.length) {
          window._fsDoc.set({ transactions: txns, debts: dbts, budgets: bdgs, goals: gls, notes: nts }, { merge: true });
        }
      } else {
        // Only the owner account may migrate the old shared document or old
        // browser cache. Other accounts start with a private blank document.
        const canMigrateLegacy = isOwnerUser(authUser);
        const legacySnap = canMigrateLegacy
          ? await db.collection("fintrack").doc("hiewu").get().catch(err => {
              console.warn("Legacy data migration skipped:", err);
              return null;
            })
          : null;
        const local = readLocalData(authUser, { allowLegacy: canMigrateLegacy });
        const fallback = legacySnap?.exists ? legacySnap.data() : local || blankData();
        setDataSource(legacySnap?.exists ? "remote" : local ? "local" : "remote");
        const { txns, dbts, bdgs, gls, nts } = hydrate(fallback, { persistLocal: legacySnap?.exists || !!local });
        window._fsDoc.set({
          categories: Object.values(CATEGORIES),
          transactions: txns,
          debts: dbts,
          budgets: bdgs,
          goals: gls,
          notes: nts,
          ownerUid: authUser.uid,
          ownerEmail: authUser.email || "",
          migratedFrom: legacySnap?.exists ? "fintrack/hiewu" : local ? "localStorage" : "blank",
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
      }
    }, err => {
      // Database unreachable (often: Firestore security rules expired/blocked).
      // Show the last good local copy if we have one, otherwise the sample —
      // but NEVER write seed over the local backup or to Firestore here.
      console.error("Firebase error:", err);
      const local = readLocalData(authUser, { allowLegacy: isOwnerUser(authUser) });
      const fallback = local || (isOwnerUser(authUser) ? seedData() : blankData());
      setDataSource(local ? "local" : "seed");
      hydrate(fallback, { persistLocal: false });
    });

    return () => unsub();
  }, [authReady, authUser?.uid, authUser?.email]);

  const persist = useCallback((txns, dbts, bdgs, gls) => {
    // While showing built-in sample data (database unreachable), do not write
    // anything: persisting here would overwrite the real local backup — and
    // the real remote data once the connection returns — with sample data.
    if (dataSource === "seed") return;
    saveLocalData({ categories: Object.values(CATEGORIES), transactions: txns, debts: dbts, budgets: bdgs, goals: gls, notes }, authUser);
    if (window._fsDoc) {
      window._fsDoc.set({ transactions: txns, debts: dbts, budgets: bdgs, goals: gls }, { merge: true }).catch(console.error);
    }
  }, [notes, dataSource, authUser?.uid]);

  // ── Transaction CRUD ──
  const addTransaction = useCallback((tx) => {
    const next = [{ ...tx, id: Date.now() }, ...allTransactions];
    setAllTransactions(next);
    persist(next, debts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const updateTransaction = useCallback((id, patch) => {
    const next = allTransactions.map(t => (
      t.id === id ? { ...t, ...patch, amount: Number(patch.amount) || t.amount } : t
    ));
    setAllTransactions(next);
    persist(next, debts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteTransaction = useCallback((id) => {
    const next = allTransactions.filter(t => t.id !== id);
    setAllTransactions(next);
    persist(next, debts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  // ── Debt CRUD ──
  const addDebt = useCallback((debt) => {
    const next = [...debts, { ...debt, id: Date.now() }];
    setDebts(next);
    persist(allTransactions, next, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteDebt = useCallback((id) => {
    const debt = debts.find(d => d.id === id);
    const next = debts.filter(d => d.id !== id);
    const nextTransactions = debt
      ? allTransactions.filter(t => !isDebtSettlementTransactionForDebt(t, debt))
      : allTransactions.filter(t => t.debtId !== id);
    setDebts(next);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, next, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const updateDebt = useCallback((id, patch) => {
    const current = debts.find(d => d.id === id);
    if (!current) return;

    const updated = { ...current, ...patch, amount: Number(patch.amount) || current.amount };
    const nextDebts = debts.map(d => d.id === id ? updated : d);
    const nextTransactions = allTransactions.map(t => (
      t.debtId === id
        ? {
            ...t,
            type: updated.type === "owe" ? "expense" : "income",
            desc: updated.type === "owe" ? `Trả nợ ${updated.name}` : `Thu nợ ${updated.name}`,
            amount: updated.amount,
            cat: updated.type === "owe" ? "Trả nợ" : "Thu nhập",
          }
        : t
    ));

    setDebts(nextDebts);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, nextDebts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const reopenDebt = useCallback((id) => {
    const debt = debts.find(d => d.id === id);
    if (!debt) return;

    const nextDebts = debts.map(d => (
      d.id === id ? { ...d, settled: false, paidDate: null } : d
    ));
    const nextTransactions = allTransactions.filter(t => !isDebtSettlementTransactionForDebt(t, debt));

    setDebts(nextDebts);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, nextDebts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const settleDebt = useCallback((id) => {
    const debt = debts.find(d => d.id === id);
    if (!debt || debt.settled) return;

    const now = new Date();
    const settlementTx = debtSettlementTransaction(debt, now);
    const nextDebts = debts.map(d => d.id === id ? { ...d, settled: true, paidDate: now.toISOString() } : d);
    const nextTransactions = allTransactions.some(t => isDebtSettlementTransactionForDebt(t, debt))
      ? allTransactions
      : [settlementTx, ...allTransactions];

    setDebts(nextDebts);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, nextDebts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  // ── Budget CRUD ──
  const saveBudget = useCallback((cat, cap) => {
    const exists = budgets.some(b => b.cat === cat);
    const next = exists
      ? budgets.map(b => b.cat === cat ? { ...b, cap } : b)
      : [...budgets, { cat, cap }];
    setBudgets(next);
    persist(allTransactions, debts, next, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteBudget = useCallback((cat) => {
    const next = budgets.filter(b => b.cat !== cat);
    setBudgets(next);
    persist(allTransactions, debts, next, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  // ── Goal CRUD ──
  const saveGoal = useCallback((goal) => {
    const exists = goals.some(g => g.id === goal.id);
    const next = exists
      ? goals.map(g => g.id === goal.id ? goal : g)
      : [...goals, goal];
    setGoals(next);
    persist(allTransactions, debts, budgets, next);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteGoal = useCallback((id) => {
    const next = goals.filter(g => g.id !== id);
    setGoals(next);
    persist(allTransactions, debts, budgets, next);
  }, [allTransactions, debts, budgets, goals, persist]);

  // ── Category management ──
  // Applies the new list, renames categories on existing transactions/budgets,
  // and reassigns transactions of deleted categories to "Khác".
  const saveCategories = useCallback((nextList, renames = {}, removed = []) => {
    if (dataSource === "seed") return;
    const removedSet = new Set(removed);
    const mapCat = (catName) => {
      if (renames[catName]) return renames[catName];
      if (removedSet.has(catName)) return "Khác";
      return catName;
    };

    const needsMigration = Object.keys(renames).length > 0 || removedSet.size > 0;
    const nextTransactions = needsMigration
      ? allTransactions.map(t => {
          if (!t.cat || t.cat === "Thu nhập") return t;
          const mapped = mapCat(t.cat);
          return mapped === t.cat ? t : { ...t, cat: mapped };
        })
      : allTransactions;

    const nextBudgets = [];
    budgets.forEach(b => {
      if (removedSet.has(b.cat)) return;
      const cat = renames[b.cat] || b.cat;
      if (!nextBudgets.some(x => x.cat === cat)) nextBudgets.push({ ...b, cat });
    });

    setCategories(nextList);
    setCatsVersion(v => v + 1);
    setAllTransactions(nextTransactions);
    setBudgets(nextBudgets);
    saveLocalData({ categories: Object.values(CATEGORIES), transactions: nextTransactions, debts, budgets: nextBudgets, goals, notes }, authUser);
    if (window._fsDoc) {
      window._fsDoc.set({
        categories: Object.values(CATEGORIES),
        transactions: nextTransactions,
        budgets: nextBudgets,
      }, { merge: true }).catch(console.error);
    }
  }, [allTransactions, budgets, debts, goals, notes, dataSource, authUser?.uid]);

  const saveNotes = useCallback((nextNotes) => {
    setNotes(nextNotes);
    if (dataSource === "seed") return;
    saveLocalData({ categories: Object.values(CATEGORIES), transactions: allTransactions, debts, budgets, goals, notes: nextNotes }, authUser);
    if (window._fsDoc) {
      window._fsDoc.set({ notes: nextNotes }, { merge: true }).catch(console.error);
    }
  }, [allTransactions, debts, budgets, goals, dataSource, authUser?.uid]);

  // Filter transactions for viewed month
  const monthTransactions = useMemo(() => {
    return allTransactions.filter(t => {
      const d = new Date(t.date + "T00:00:00");
      return d.getMonth() === viewMonth && d.getFullYear() === viewYear;
    });
  }, [allTransactions, viewMonth, viewYear]);

  const monthlyBalance = useMemo(() => (
    getMonthlyBalance(allTransactions, viewYear, viewMonth)
  ), [allTransactions, viewYear, viewMonth]);

  if (!authReady) return <AppSkeleton />;
  if (!authUser) return (
    <LangContext.Provider value={lang}>
      <AuthGate theme={theme} onTheme={setTheme} lang={lang} onLang={setLang} />
    </LangContext.Provider>
  );
  if (!loaded) return <AppSkeleton />;

  const t = (vi, en) => (lang === "en" ? en : vi);
  const userLabel = authUser.displayName || authUser.email || t("Tài khoản", "Account");
  const userInitial = (userLabel.trim()[0] || "U").toUpperCase();

  const PageComponents = { overview: Overview, transactions: Transactions, debts: Debts, budget: Budget, notes: Notes };
  const PageEl = PageComponents[page];
  const pageProps = {
    transactions:     monthTransactions,
    allTransactions,
    debts,
    budgets,
    goals,
    notes,
    viewMonth,
    viewYear,
    monthLabel,
    onMonthChange:       (d) => setMonthOffset(m => Math.max(0, m + d)),
    openingBalance:      monthlyBalance.openingBalance,
    periodBalance:       monthlyBalance.periodBalance,
    closingBalance:      monthlyBalance.closingBalance,
    onAddTransaction:    addTransaction,
    onUpdateTransaction: updateTransaction,
    onDeleteTransaction: deleteTransaction,
    onAddDebt:           addDebt,
    onUpdateDebt:        updateDebt,
    onDeleteDebt:        deleteDebt,
    onSettleDebt:        settleDebt,
    onReopenDebt:        reopenDebt,
    onSaveBudget:        saveBudget,
    onDeleteBudget:      deleteBudget,
    onSaveGoal:          saveGoal,
    onDeleteGoal:        deleteGoal,
    onSaveNotes:         saveNotes,
    onSaveCategories:    saveCategories,
    onNavigate:          setPage,
    theme,
    onTheme:             setTheme,
    lang,
    onLang:              setLang,
  };

  return (
    <LangContext.Provider value={lang}>
    <div className="app">
      <main className="main">
        <div className="auth-session" ref={accountMenuRef}>
          <div className="auth-session-user" title={authUser.email || userLabel}>
            {authUser.photoURL
              ? <img src={authUser.photoURL} alt="" />
              : <span>{userInitial}</span>}
            <strong>{userLabel}</strong>
          </div>
          <div className="account-settings-wrap">
            <button
              type="button"
              className={"account-settings-btn" + (accountMenuOpen ? " active" : "")}
              onClick={() => setAccountMenuOpen(o => !o)}
              aria-label={t("Cài đặt tài khoản", "Account settings")}
              title={t("Cài đặt", "Settings")}
            >
              <Icons.gear size={16} />
            </button>
            {accountMenuOpen && (
              <div className="account-settings-menu">
                <div className="settings-section-label">{t("Giao diện", "Appearance")}</div>
                <div className="settings-row">
                  <button
                    className={"settings-opt-btn" + (theme === "light" ? " active" : "")}
                    onClick={() => setTheme("light")}
                  >
                    <Icons.sun size={13} /> {t("Sáng", "Light")}
                  </button>
                  <button
                    className={"settings-opt-btn" + (theme === "dark" ? " active" : "")}
                    onClick={() => setTheme("dark")}
                  >
                    <Icons.moon size={13} /> {t("Tối", "Dark")}
                  </button>
                  <button
                    className={"settings-opt-btn" + (theme === "glass" ? " active" : "")}
                    onClick={() => setTheme("glass")}
                  >
                    <Icons.sparkle size={13} /> Liquid
                  </button>
                </div>
                <div className="settings-divider" />
                <div className="settings-section-label">{t("Ngôn ngữ", "Language")}</div>
                <div className="settings-row">
                  <button
                    className={"settings-opt-btn" + (lang === "vi" ? " active" : "")}
                    onClick={() => setLang("vi")}
                  >
                    VN Tiếng Việt
                  </button>
                  <button
                    className={"settings-opt-btn" + (lang === "en" ? " active" : "")}
                    onClick={() => setLang("en")}
                  >
                    US English
                  </button>
                </div>
                <div className="settings-divider" />
                <div className="settings-section-label">{t("Tài khoản", "Account")}</div>
                <div className="account-settings-user">
                  <strong>{userLabel}</strong>
                  <span>{authUser.email || ""}</span>
                </div>
                <div className="settings-divider" />
                <button
                  type="button"
                  className="account-logout-btn"
                  onClick={() => firebase.auth().signOut()}
                >
                  {t("Đăng xuất", "Log out")}
                </button>
              </div>
            )}
          </div>
        </div>
        {dataSource !== "remote" && (
          <div className="data-warning" role="alert">
            <Icons.bell size={15} />
            <span>
              {dataSource === "seed"
                ? t(
                    "Chưa kết nối được cơ sở dữ liệu — đang hiển thị dữ liệu mẫu. ĐỪNG thêm/sửa giao dịch lúc này. Dữ liệu thật của bạn vẫn an toàn trên server; kiểm tra kết nối/Firestore rồi tải lại.",
                    "Couldn't connect to the database — showing sample data. DON'T add/edit transactions right now. Your real data is still safe on the server; check the connection/Firestore and reload."
                  )
                : t(
                    "Chưa kết nối được cơ sở dữ liệu — đang hiển thị bản sao lưu cục bộ. Thay đổi sẽ không được đồng bộ cho tới khi kết nối lại.",
                    "Couldn't connect to the database — showing a local backup. Changes won't sync until the connection is restored."
                  )}
            </span>
          </div>
        )}
        <Toolbar
          activePage={page}
          month={monthLabel}
          onMonthChange={(d) => setMonthOffset(m => Math.max(0, m + d))}
          closingBalance={monthlyBalance.closingBalance}
          viewMonth={viewMonth}
          viewYear={viewYear}
          theme={theme}
          onTheme={setTheme}
          lang={lang}
          onLang={setLang}
        />
        <PageEl key={page} {...pageProps} />
      </main>
      <BottomNav activePage={page} onChange={setPage} debts={debts} lang={lang} />
    </div>
    </LangContext.Provider>
  );
}

function BottomNav({ activePage, onChange, debts = [], lang = "vi" }) {
  const openDebtCount = debts.filter(d => !d.settled).length;
  const items = [
    { id: "overview",     label: lang === "en" ? "Overview"     : "Tổng quan", icon: "squareGrid" },
    { id: "transactions", label: lang === "en" ? "Transactions" : "Giao dịch", icon: "arrowLeftRight" },
    { id: "debts",        label: lang === "en" ? "Debts"        : "Nợ vay",    icon: "creditCard", badge: openDebtCount > 0 ? openDebtCount : null },
    { id: "budget",       label: lang === "en" ? "Budget"       : "Ngân sách", icon: "wallet" },
    { id: "notes",        label: "Note",                                        icon: "pencil" },
  ];
  return (
    <nav className="bottom-nav" aria-label="Page navigation">
      {items.map(item => {
        const Icon = Icons[item.icon];
        const active = activePage === item.id;
        return (
          <button
            key={item.id}
            className={"bottom-nav-item" + (active ? " active" : "")}
            onClick={() => onChange(item.id)}
            aria-current={active ? "page" : undefined}
          >
            <span className="bottom-nav-icon-wrap">
              <Icon size={20} />
              {item.badge != null && <span className="bottom-nav-badge">{item.badge}</span>}
            </span>
            <span className="bottom-nav-label">{item.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
