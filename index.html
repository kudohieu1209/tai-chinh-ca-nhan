const { useMemo: useMemoC } = React;

function FlowChart({ data, daysInMonth = 31 }) {
  const W = 600, H = 220, PAD_L = 40, PAD_R = 12, PAD_T = 14, PAD_B = 28;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;

  const series = useMemoC(() => {
    const arr = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const m = data.find(x => x.d === d);
      arr.push({ d, inc: m?.inc || 0, exp: m?.exp || 0 });
    }
    return arr;
  }, [data, daysInMonth]);

  const maxV = Math.max(...series.flatMap(s => [s.inc, s.exp]), 100);
  const niceMax = Math.ceil(maxV / 500000) * 500000;

  const xOf = (i) => PAD_L + innerW * i / (daysInMonth - 1);
  const yOf = (v) => PAD_T + innerH - innerH * v / niceMax;

  const smooth = (pts) => {
    if (!pts.length) return '';
    let path = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) {
      const p0 = pts[i - 1], p1 = pts[i];
      const cx = (p0.x + p1.x) / 2;
      path += ` C ${cx} ${p0.y}, ${cx} ${p1.y}, ${p1.x} ${p1.y}`;
    }
    return path;
  };

  const incPts = series.map((s, i) => ({ x: xOf(i), y: yOf(s.inc) }));
  const expPts = series.map((s, i) => ({ x: xOf(i), y: yOf(s.exp) }));
  const incArea = smooth(incPts) + ` L ${xOf(daysInMonth - 1)} ${yOf(0)} L ${xOf(0)} ${yOf(0)} Z`;
  const expArea = smooth(expPts) + ` L ${xOf(daysInMonth - 1)} ${yOf(0)} L ${xOf(0)} ${yOf(0)} Z`;
  const xTicks = [1, 7, 14, 21, 28, daysInMonth];

  return (
    <>
      <div className="flow-chart-wrap">
        <div className="flow-y-labels" aria-hidden="true">
          {Array.from({ length: 5 }, (_, i) => {
            const y = PAD_T + innerH * i / 4;
            const v = niceMax * (1 - i / 4);
            return <span key={i} style={{ top: `${y / H * 100}%` }}>{formatAxisValue(v)}</span>;
          })}
        </div>
        <svg viewBox={`0 0 ${W} ${H}`} className="flow-chart" preserveAspectRatio="none">
          <defs>
            <linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--c-green)" stopOpacity="0.5" />
              <stop offset="100%" stopColor="var(--c-green)" stopOpacity="0" />
            </linearGradient>
            <linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--c-red)" stopOpacity="0.5" />
              <stop offset="100%" stopColor="var(--c-red)" stopOpacity="0" />
            </linearGradient>
          </defs>
          <g className="flow-grid">
            {Array.from({ length: 5 }, (_, i) => {
              const y = PAD_T + innerH * i / 4;
              return (
                <g key={i}>
                  <line x1={PAD_L} y1={y} x2={W - PAD_R} y2={y} />
                </g>
              );
            })}
          </g>
          <path d={expArea} className="flow-area-expense" />
          <path d={incArea} className="flow-area-income" />
          <path d={smooth(expPts)} className="flow-line-expense" />
          <path d={smooth(incPts)} className="flow-line-income" />
          {series.map((s, i) => s.inc > 0 && (
            <circle key={"i" + i} cx={xOf(i)} cy={yOf(s.inc)} r="3" className="flow-dot-income" />
          ))}
          {series.map((s, i) => s.exp > 0 && (
            <circle key={"e" + i} cx={xOf(i)} cy={yOf(s.exp)} r="3" className="flow-dot-expense" />
          ))}
        </svg>
        <div className="flow-x-labels" aria-hidden="true">
          {xTicks.map(d => (
            <span key={d} style={{ left: `${xOf(d - 1) / W * 100}%` }}>{d}</span>
          ))}
        </div>
      </div>
      <div className="legend">
        <div className="legend-item">
          <span className="legend-dot" style={{ background: "var(--c-green)" }} /> Thu nhập
        </div>
        <div className="legend-item">
          <span className="legend-dot" style={{ background: "var(--c-red)" }} /> Chi tiêu
        </div>
      </div>
    </>
  );
}

function formatCurrency(value) {
  const n = Number.isFinite(value) ? value : 0;
  return new Intl.NumberFormat('vi-VN').format(Math.round(n)) + 'đ';
}

function formatPercent(value) {
  const n = Number.isFinite(value) ? value : 0;
  return n.toLocaleString('vi-VN', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '%';
}

function formatAxisValue(value) {
  const n = Number.isFinite(value) ? value : 0;
  if (n === 0) return '0';
  if (n >= 1e6) {
    const m = n / 1e6;
    return (Number.isInteger(m) ? String(m) : m.toFixed(1).replace(/\.0$/, '')) + 'M';
  }
  if (n >= 1e3) return Math.round(n / 1e3) + 'K';
  return String(Math.round(n));
}

function calculateChangePercent(current, previous) {
  if (!Number.isFinite(current) || !Number.isFinite(previous) || previous === 0) return null;
  return ((current - previous) / previous) * 100;
}

function formatChangeText(label, current, previous) {
  const change = calculateChangePercent(current, previous);
  if (change == null) return null;
  if (Math.abs(change) < 0.05) return `${label} không đổi so với tháng trước`;
  return `${label} ${change > 0 ? 'tăng' : 'giảm'} ${formatPercent(Math.abs(change))} so với tháng trước`;
}

function getSpendingRatioMessage(ratio, income, expense) {
  if (income <= 0 && expense > 0) return 'Chi tiêu đã vượt thu nhập tháng này.';
  if (ratio <= 50) return 'Bạn đang sử dụng dưới một nửa thu nhập trong tháng này.';
  if (ratio <= 70) return 'Chi tiêu đang ở mức ổn so với thu nhập tháng này.';
  if (ratio <= 90) return 'Chi tiêu chiếm phần lớn thu nhập tháng này.';
  if (ratio <= 100) return 'Chi tiêu gần bằng thu nhập tháng này.';
  return 'Chi tiêu đã vượt thu nhập tháng này.';
}

function getSpendingRatioTone(ratio) {
  if (ratio <= 50) return "low";
  if (ratio <= 70) return "medium";
  if (ratio <= 90) return "high";
  if (ratio <= 100) return "near";
  return "over";
}

function SixMonthBars({ data, currentLabel }) {
  const values = data.flatMap(m => [m.inc || 0, m.exp || 0]);
  const maxV = Math.max(...values, 0);
  const step = maxV > 0 ? Math.max(1000000, Math.ceil(maxV / 4 / 1000000) * 1000000) : 1000000;
  const niceMax = step * 4;
  const ticks = Array.from({ length: 5 }, (_, i) => niceMax - step * i);

  return (
    <div className="month-chart">
      <div className="month-y-axis" aria-hidden="true">
        {ticks.map((tick, i) => (
          <span key={tick} style={{ top: `${i / (ticks.length - 1) * 100}%` }}>{formatAxisValue(tick)}</span>
        ))}
      </div>
      <div className="month-plot">
        <div className="month-grid" aria-hidden="true">
          {ticks.map((tick, i) => (
            <span key={tick} style={{ top: `${i / (ticks.length - 1) * 100}%` }} />
          ))}
        </div>
        <div className="month-bars">
          {data.map(m => {
            const isCurrent = m.label === currentLabel;
            const inc = m.inc || 0;
            const exp = m.exp || 0;
            const incH = niceMax > 0 ? inc / niceMax * 100 : 0;
            const expH = niceMax > 0 ? exp / niceMax * 100 : 0;
            const hasData = inc > 0 || exp > 0;
            return (
              <div
                className={"mb-col" + (hasData ? " has-data" : " is-empty")}
                key={m.label}
                data-tooltip={`${m.label} · Thu ${formatCurrency(inc)} · Chi ${formatCurrency(exp)}`}
              >
                <div className="mb-bars-inner">
                  {inc > 0 && (
                    <div className={"mb-bar income" + (isCurrent ? " current" : "")}
                      style={{ height: incH + "%" }} title={`${m.label} · Thu ${formatCurrency(inc)} · Chi ${formatCurrency(exp)}`} />
                  )}
                  {exp > 0 && (
                    <div className={"mb-bar expense" + (isCurrent ? " current" : "")}
                      style={{ height: expH + "%" }} title={`${m.label} · Thu ${formatCurrency(inc)} · Chi ${formatCurrency(exp)}`} />
                  )}
                </div>
                <span className={"mb-label" + (isCurrent ? " current" : "")}>{m.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BenchmarkBar({ value, benchmark, max }) {
  const mePct = Math.min(100, value / max * 100);
  const avgPct = Math.min(100, benchmark / max * 100);
  return (
    <div className="benchmark-bar">
      <div className="me" style={{ width: mePct + "%" }} />
      <div className="avg" style={{ left: `calc(${avgPct}% - 1px)` }}
        title={"TB sinh viên: " + fmt(benchmark)} />
    </div>
  );
}

const { useState, useEffect, useMemo, useRef, useCallback } = React;

function useCountup(target, duration = 850) {
  const [value, setValue] = useState(0);
  const rafRef  = useRef(null);
  const fromRef = useRef(0);

  useEffect(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    const from  = fromRef.current;
    const start = performance.now();
    const tick  = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const cur = Math.round(from + (target - from) * eased);
      setValue(cur);
      if (t < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        fromRef.current = target;
      }
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [target, duration]);

  return value;
}

function MoneyInput({ value, onChange, placeholder = "0" }) {
  const [focused, setFocused] = useState(false);
  const [raw, setRaw]         = useState("");

  const handleFocus = () => {
    setFocused(true);
    setRaw(value ? String(value) : "");
  };
  const handleChange = (e) => {
    const digits = e.target.value.replace(/[^\d]/g, "");
    setRaw(digits);
    onChange(digits ? parseInt(digits, 10) : 0);
  };
  const handleBlur = () => setFocused(false);

  const display = focused
    ? raw
    : value ? new Intl.NumberFormat('vi-VN').format(value) : "";

  return (
    <div className="input-money">
      <input
        className="input"
        type="text"
        inputMode="numeric"
        value={display}
        placeholder={placeholder}
        onFocus={handleFocus}
        onChange={handleChange}
        onBlur={handleBlur}
      />
    </div>
  );
}

// ====== DonutChart — SVG donut with animated segments ======
function DonutChart({ segments, total }) {
  const [tooltip, setTooltip] = React.useState(null);
  const R   = 86;
  const SW  = 24;
  const C   = 2 * Math.PI * R;
  const GAP = 2.5;

  let accumulated = 0;
  const arcs = segments.map(s => {
    const len    = total > 0 ? (s.amount / total) * C - GAP : 0;
    const offset = C * 0.25 - accumulated;
    accumulated += len + GAP;
    return { ...s, len: Math.max(len, 0), offset };
  });

  const cx = R + SW / 2 + 4;
  const size = cx * 2;
  const updateTooltip = (event, segment) => {
    const svg = event.currentTarget.ownerSVGElement;
    const bounds = svg.getBoundingClientRect();
    setTooltip({
      segment,
      x: event.clientX - bounds.left,
      y: event.clientY - bounds.top,
    });
  };
  const tooltipPct = tooltip && total > 0 ? Math.round(tooltip.segment.amount / total * 100) : 0;

  return (
    <div className="cat-donut-chart">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
        <circle cx={cx} cy={cx} r={R} fill="none"
          stroke="var(--surface-2)" strokeWidth={SW} />
        {arcs.map((s, i) => (
          <circle key={s.id}
            className="cat-donut-segment"
            cx={cx} cy={cx} r={R}
            fill="none"
            stroke={s.color}
            strokeWidth={SW}
            strokeLinecap="butt"
            strokeDasharray={`${s.len} ${C - s.len}`}
            strokeDashoffset={s.offset}
            tabIndex="0"
            role="img"
            aria-label={`${s.name}: ${total > 0 ? Math.round(s.amount / total * 100) : 0}%, ${fmt(s.amount)}`}
            onMouseEnter={e => updateTooltip(e, s)}
            onMouseMove={e => updateTooltip(e, s)}
            onMouseLeave={() => setTooltip(null)}
            onFocus={() => setTooltip({ segment: s, x: size / 2, y: size / 2 })}
            onBlur={() => setTooltip(null)}
            style={{
              transition: `stroke-dasharray var(--dur-reveal) var(--spring-snappy), stroke-dashoffset var(--dur-reveal) var(--spring-snappy), opacity var(--dur-quick) var(--spring-crisp), filter var(--dur-quick) var(--spring-crisp)`,
              animationDelay: `${i * 40}ms`,
            }}
          />
        ))}
      </svg>
      {tooltip && (
        <div className="cat-donut-tooltip" style={{ left: tooltip.x, top: tooltip.y }}>
          <div className="cat-donut-tooltip-name">
            <span style={{ background: tooltip.segment.color }} />
            {tooltip.segment.name}
          </div>
          <div className="cat-donut-tooltip-meta">
            <b>{tooltipPct}%</b>
            <span>{fmt(tooltip.segment.amount)}</span>
          </div>
        </div>
      )}
    </div>
  );
}

function Overview({ transactions, allTransactions, debts, budgets = [], goals, viewMonth, viewYear, monthLabel, openingBalance = 0, periodBalance, closingBalance, onNavigate, onSaveGoal, onDeleteGoal }) {
  const [editingGoal, setEditingGoal] = useState(null);

  const income = useMemo(() =>
    transactions.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0),
    [transactions]
  );
  const expense = useMemo(() =>
    transactions.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0),
    [transactions]
  );
  const remaining = periodBalance ?? (income - expense);
  const finalBalance = closingBalance ?? (openingBalance + remaining);
  const savingsRate = income > 0 ? Math.round((remaining / income) * 100) : 0;
  const incomeCount = transactions.filter(t => t.type === "income").length;
  const expenseCount = transactions.filter(t => t.type === "expense").length;

  const openingBalanceAnim = useCountup(openingBalance);
  const incomeAnim    = useCountup(income);
  const expenseAnim   = useCountup(expense);
  const closingBalanceAnim = useCountup(finalBalance);

  const catRows = useMemo(() => {
    const spend = {};
    transactions.filter(t => t.type === "expense").forEach(t => {
      spend[t.cat] = (spend[t.cat] || 0) + t.amount;
    });
    return Object.entries(spend)
      .map(([cat, amount]) => ({
        id: cat, name: cat,
        color: CATEGORIES[cat]?.color || "#8E8E93",
        amount,
        pct: expense > 0 ? (amount / expense) * 100 : 0,
      }))
      .sort((a, b) => b.amount - a.amount);
  }, [transactions, expense]);

  const dailyFlow = useMemo(() => {
    const flow = {};
    transactions.forEach(t => {
      const day = new Date(t.date + 'T00:00:00').getDate();
      if (!flow[day]) flow[day] = { d: day, inc: 0, exp: 0 };
      if (t.type === "income") flow[day].inc += t.amount;
      else flow[day].exp += t.amount;
    });
    return Object.values(flow).sort((a, b) => a.d - b.d);
  }, [transactions]);

  const sixMonths = useMemo(() => {
    return Array.from({ length: 6 }, (_, i) => {
      const d = new Date(viewYear, viewMonth - (5 - i), 1);
      const m = d.getMonth();
      const y = d.getFullYear();
      const label = `T${m + 1}/${String(y).slice(2)}`;
      const txns = allTransactions.filter(t => {
        const td = new Date(t.date + 'T00:00:00');
        return td.getMonth() === m && td.getFullYear() === y;
      });
      return {
        label,
        inc: txns.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0),
        exp: txns.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0),
      };
    });
  }, [allTransactions, viewMonth, viewYear]);

  const currentLabel = `T${viewMonth + 1}/${String(viewYear).slice(2)}`;
  const currentMonthIndex = sixMonths.findIndex(m => m.label === currentLabel);
  const currentMonthSummary = sixMonths.find(m => m.label === currentLabel) || { inc: 0, exp: 0 };
  const previousMonthSummary = currentMonthIndex > 0 ? sixMonths[currentMonthIndex - 1] : null;
  const spendingRatio = currentMonthSummary.inc > 0
    ? (currentMonthSummary.exp / currentMonthSummary.inc) * 100
    : (currentMonthSummary.exp > 0 ? 101 : 0);
  const spendingRatioLabel = currentMonthSummary.inc > 0
    ? formatPercent(spendingRatio)
    : (currentMonthSummary.exp > 0 ? ">100%" : "0,0%");
  const spendingProgress = Math.min(100, Math.max(0, spendingRatio));
  const spendingRatioTone = getSpendingRatioTone(spendingRatio);
  const spendingRatioMessage = getSpendingRatioMessage(spendingRatio, currentMonthSummary.inc, currentMonthSummary.exp);
  const incomeChangeText = previousMonthSummary ? formatChangeText("Thu", currentMonthSummary.inc, previousMonthSummary.inc) : null;
  const expenseChangeText = previousMonthSummary ? formatChangeText("Chi", currentMonthSummary.exp, previousMonthSummary.exp) : null;
  const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();

  const openOwe   = debts.filter(d => d.type === "owe"  && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openOwed  = debts.filter(d => d.type === "lend" && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openDebts = debts.filter(d => !d.settled);
  const today = new Date();
  const isCurrentView = today.getMonth() === viewMonth && today.getFullYear() === viewYear;
  const balanceLabel = isCurrentView ? "Số dư hiện tại" : "Số dư cuối tháng";
  const daysElapsed = isCurrentView ? Math.max(1, Math.min(today.getDate(), daysInMonth)) : daysInMonth;
  const dailyPace = expense > 0 ? expense / daysElapsed : 0;
  const projectedExpense = expense > 0 ? dailyPace * daysInMonth : 0;
  const budgetWatch = budgets
    .map(b => {
      const actual = transactions
        .filter(t => t.type === "expense" && t.cat === b.cat)
        .reduce((s, t) => s + t.amount, 0);
      return { ...b, actual, pct: b.cap > 0 ? (actual / b.cap) * 100 : 0 };
    })
    .filter(b => b.pct >= 80)
    .sort((a, b) => b.pct - a.pct)[0];
  const insightTone = remaining < 0 ? "red" : savingsRate >= 20 ? "green" : savingsRate >= 5 ? "blue" : "orange";
  const paceTone = projectedExpense > income && income > 0 ? "orange" : "indigo";
  const budgetTone = budgetWatch?.pct >= 100 ? "red" : budgetWatch ? "orange" : "green";

  const handleSaveGoal = (g) => {
    onSaveGoal(g);
    setEditingGoal(null);
  };

  return (
    <div className="page overview-page">
      <div className="stat-grid overview-stat-grid">
        <div className="stat stagger stagger-1">
          <div className="stat-label"><Icons.wallet size={13} /> Dư đầu tháng</div>
          <div className="stat-value num">{fmt(openingBalanceAnim)}</div>
          <div className="stat-sub">
            Chuyển từ các tháng trước
          </div>
        </div>
        <div className="stat stagger stagger-2">
          <div className="stat-label" style={{ color: "var(--c-green)" }}>
            <Icons.arrowDownLeft size={13} /> Thu tháng này
          </div>
          <div className="stat-value num">{fmt(incomeAnim)}</div>
          <div className="stat-sub">
            <span style={{ color: "var(--c-green)" }}>{incomeCount}</span> giao dịch ·
            TB <span className="num">{" "}{incomeCount > 0 ? fmtShort(income / incomeCount) : "0"}</span>/lần
          </div>
        </div>
        <div className="stat stagger stagger-3">
          <div className="stat-label" style={{ color: "var(--c-red)" }}>
            <Icons.arrowUpRight size={13} /> Chi tháng này
          </div>
          <div className="stat-value num">{fmt(expenseAnim)}</div>
          <div className="stat-sub">
            <span style={{ color: "var(--c-red)" }}>{expenseCount}</span> giao dịch ·
            TB <span className="num">{" "}{expenseCount > 0 ? fmtShort(expense / expenseCount) : "0"}</span>/lần
          </div>
        </div>
        <div className="stat stagger stagger-4">
          <div className="stat-label"><Icons.wallet size={13} /> {balanceLabel}</div>
          <div className="stat-value num">{fmt(closingBalanceAnim)}</div>
          <div className="stat-sub">
            {finalBalance >= 0 ? "Còn lại sau chi tiêu" : "Đang âm sau chi tiêu"}
          </div>

      <div className="insights overview-insights">

                {catRows.map(c => (
                  <div className="cat-row" key={c.id} style={{ "--cat-color": c.color, "--cat-pct": c.pct + "%" }}>
                    <div className="cat-row-main">
                      <div className="cat-dot" style={{ background: c.color }} />
                      <div className="cat-name-text">{c.name}</div>
                      <div className="cat-pct">{c.pct.toFixed(0)}%</div>

                    <div className="cat-bar" aria-hidden="true">

              <div className="cat-donut-wrap" aria-label="Biểu đồ donut chi tiêu theo danh mục">
                <DonutChart segments={catRows} total={expense} />
                <div className="cat-donut-center">
                  <div className="cat-donut-total num">{fmt(expense)}</div>
                  <div className="cat-donut-sub">{expenseCount} giao dịch</div>
                </div>
              </div>
            </div>
          )}
        </div>

        <div className="card flow-card overview-area-flow stagger stagger-5">
            <div className="card-header">
              <div>
                <div className="card-title">Dòng tiền theo ngày</div>
                <div className="card-subtitle">{monthLabel} · {incomeCount + expenseCount} giao dịch</div>
              </div>
            </div>
            {dailyFlow.length === 0 ? (
              <Empty icon="trendUp" title="Chưa có dữ liệu" text="Thêm giao dịch để xem dòng tiền" />
            ) : (
              <FlowChart data={dailyFlow} daysInMonth={daysInMonth} />

          </div>

        <div className="card trend-card overview-area-trend stagger stagger-6">
          <div className="card-header trend-header">
            <div className="card-title">So sánh thu chi 6 tháng gần nhất</div>
            <div className="trend-legend">
              <span><i className="income" /> Thu</span>
              <span><i className="expense" /> Chi</span>
            </div>

          <div className="trend-body">
            <div className="trend-chart-panel">
              <SixMonthBars data={sixMonths} currentLabel={currentLabel} />
            </div>
            <aside className="trend-insight">
              <div className="trend-insight-label">Tỷ lệ chi tiêu</div>
              <div className="trend-ratio num">{spendingRatioLabel}</div>
              <div className="trend-ratio-caption">Chi / Thu tháng này</div>
              <div className={"trend-progress " + spendingRatioTone} aria-hidden="true">
                <span style={{ width: spendingProgress + "%" }} />
              </div>
              <div className="trend-message">{spendingRatioMessage}</div>
              {(incomeChangeText || expenseChangeText) && (
                <div className="trend-compare">
                  <div className="trend-compare-title">So với tháng trước</div>
                  {incomeChangeText && <div>{incomeChangeText}</div>}
                  {expenseChangeText && <div>{expenseChangeText}</div>}

        <div className="card overview-debt-card overview-area-debt stagger stagger-7">

            <div className="card-title">Nợ &amp; Cho Vay</div>

            <div className="debt-card owe">

              <div className="debt-card-value num">{fmt(openOwe)}</div>

            </div>
            <div className="debt-card owed">
              <div className="debt-card-label"><Icons.arrowDownLeft size={11} /> Người khác nợ bạn</div>
              <div className="debt-card-value num">{fmt(openOwed)}</div>
              <div className="debt-card-sub">{debts.filter(d => d.type === "lend" && !d.settled).length} khoản chưa thu</div>
            </div>
          </div>
          <div className="debt-list overview-debt-list">
            {openDebts.length === 0 ? (
              <Empty icon="check" title="Sạch nợ!" text="Không có khoản nợ nào đang mở" />
            ) : (
              openDebts.map(d => {
                const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
                const color = debtColor(d.id);
                return (
                  <div className="debt-row" key={d.id}>
                    <div className="debt-avatar" style={{ background: color }}>{initials}</div>
                    <div className="debt-info">
                      <span className="debt-name">{d.name}</span>
                      <span className="debt-note">{d.note}</span>

                    <span className={"debt-amount num " + (d.type === "owe" ? "owe" : "owed")}>{fmt(d.amount)}</span>

                );
              })
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function Transactions({ transactions, onAddTransaction, onUpdateTransaction, onDeleteTransaction, monthLabel, viewMonth, viewYear, openingBalance = 0, periodBalance, closingBalance }) {
  const [mode, setMode] = useState("expense");
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState(0);
  const [date, setDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [cat, setCat] = useState("Ăn uống");
  const [search, setSearch] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("all");
  const [sortMode, setSortMode] = useState("date-desc");
  const [justAdded, setJustAdded] = useState(false);
  const [btnSuccess, setBtnSuccess] = useState(false);
  const [editingTx, setEditingTx] = useState(null);
  const formRef = useRef(null);
  const firstExpenseCat = Object.keys(CATEGORIES)[0] || cat;
  const incomeCat = "Thu nhập";

  const incomeList = transactions.filter(t => t.type === "income");
  const expenseList = transactions.filter(t => t.type === "expense");
  const list = mode === "income" ? incomeList : expenseList;
  const categoryCounts = useMemo(() => {
    const counts = {};
    expenseList.forEach(t => {
      if (!t.cat) return;
      counts[t.cat] = (counts[t.cat] || 0) + 1;
    });
    return counts;
  }, [transactions]);
  const categoryOptions = useMemo(() =>
    Object.values(CATEGORIES).filter(c => categoryCounts[c.name]),
  [categoryCounts]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    const byDateDesc = (a, b) => (b.date || "").localeCompare(a.date || "") || String(b.id).localeCompare(String(a.id));
    const byDateAsc = (a, b) => (a.date || "").localeCompare(b.date || "") || String(a.id).localeCompare(String(b.id));
    const next = list.filter(t => {
      const matchesSearch = !q ||
        (t.desc || "").toLowerCase().includes(q) ||
        (t.cat && t.cat.toLowerCase().includes(q));
      const matchesCategory = mode !== "expense" ||
        categoryFilter === "all" ||
        t.cat === categoryFilter;
      return matchesSearch && matchesCategory;
    });

    return [...next].sort((a, b) => {
      if (sortMode === "date-asc") return byDateAsc(a, b);
      if (sortMode === "amount-desc") return (b.amount - a.amount) || byDateDesc(a, b);
      if (sortMode === "amount-asc") return (a.amount - b.amount) || byDateDesc(a, b);
      return byDateDesc(a, b);
    });
  }, [search, list, mode, categoryFilter, sortMode]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(t => {
      const k = t.date;
      g[k] = g[k] || [];
      g[k].push(t);
    });
    return Object.entries(g).sort(([a], [b]) => {
      if (sortMode === "date-asc") {
        if (a > b) return 1;
        if (a < b) return -1;
        return 0;
      }
      if (b > a) return 1;
      if (b < a) return -1;
      return 0;
    });
  }, [filtered, sortMode]);

  const totalIn  = incomeList.reduce((s, t) => s + t.amount, 0);
  const totalOut = expenseList.reduce((s, t) => s + t.amount, 0);
  const monthlyBalance = periodBalance ?? (totalIn - totalOut);
  const finalBalance = closingBalance ?? (openingBalance + monthlyBalance);
  const today = new Date();
  const isCurrentView = today.getMonth() === viewMonth && today.getFullYear() === viewYear;
  const balanceLabel = isCurrentView ? "Hiện tại" : "Cuối tháng";
  const savingsRate = totalIn === 0 ? 0 : Math.round((monthlyBalance / totalIn) * 100);
  const savingsProgress = Math.max(0, Math.min(100, savingsRate));
  const savingsTone = monthlyBalance >= 0 ? "var(--c-green)" : "var(--c-red)";
  const filteredTotal = filtered.reduce((s, t) => s + t.amount, 0);
  const hasListFilters = Boolean(search.trim()) ||
    (mode === "expense" && categoryFilter !== "all") ||
    sortMode !== "date-desc";
  const quickTemplateStorageKey = "fintrack-quick-templates-v1";

  const defaultQuickTemplates = useMemo(() => {
    const cats = Object.keys(CATEGORIES);
    return [
      { id: "lunch", label: "Ăn trưa", type: "expense", desc: "Ăn trưa", amount: 35000, cat: cats[0] || firstExpenseCat },
      { id: "water", label: "Nước", type: "expense", desc: "Nước uống", amount: 10000, cat: cats[0] || firstExpenseCat },
      { id: "grab", label: "Grab", type: "expense", desc: "Grab", amount: 25000, cat: cats[1] || firstExpenseCat },
      { id: "badminton", label: "Cầu lông", type: "expense", desc: "Cầu lông", amount: 80000, cat: cats[8] || firstExpenseCat },
      { id: "mom-transfer", label: "Mẹ chuyển", type: "income", desc: "Mẹ chuyển", amount: 1000000, cat: incomeCat },
    ];
  }, [firstExpenseCat, incomeCat]);
  const [savedQuickTemplates, setSavedQuickTemplates] = useState(null);
  const [editingQuickTemplates, setEditingQuickTemplates] = useState(false);
  const quickTemplates = savedQuickTemplates || defaultQuickTemplates;

  const normalizeQuickTemplate = (tpl, idx = 0) => {
    const type = tpl.type === "income" ? "income" : "expense";
    const label = String(tpl.label || tpl.desc || "Mẫu mới").trim() || "Mẫu mới";
    return {
      id: tpl.id || `${Date.now()}-${idx}`,
      label,
      type,
      desc: String(tpl.desc || label).trim() || label,
      amount: Number(tpl.amount) || 0,
      cat: type === "income" ? incomeCat : (tpl.cat || firstExpenseCat),
    };
  };

  useEffect(() => {
    try {
      const raw = localStorage.getItem(quickTemplateStorageKey);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed)) {
        setSavedQuickTemplates(parsed.map(normalizeQuickTemplate));
      }
    } catch (_) {
      setSavedQuickTemplates(null);
    }
  }, []);

  useEffect(() => {
    if (!savedQuickTemplates) return;
    try {
      localStorage.setItem(quickTemplateStorageKey, JSON.stringify(savedQuickTemplates));
    } catch (_) {}
  }, [savedQuickTemplates]);

  useEffect(() => {
    if (mode === "income" && categoryFilter !== "all") {
      setCategoryFilter("all");
    }
  }, [mode, categoryFilter]);

  const updateQuickTemplate = (id, patch) => {
    setSavedQuickTemplates((current) => {
      const base = current || defaultQuickTemplates;
      return base.map((tpl, idx) => {
        if (tpl.id !== id) return normalizeQuickTemplate(tpl, idx);
        const next = { ...tpl, ...patch };
        if (patch.label != null && patch.desc == null) next.desc = patch.label;
        if (patch.type === "income") next.cat = incomeCat;
        if (patch.type === "expense" && tpl.type === "income") next.cat = firstExpenseCat;
        return normalizeQuickTemplate(next, idx);
      });
    });
  };

  const addQuickTemplate = () => {
    setSavedQuickTemplates((current) => [
      ...(current || defaultQuickTemplates).map(normalizeQuickTemplate),
      normalizeQuickTemplate({
        id: `tpl-${Date.now()}`,
        label: "Mẫu mới",
        type: mode,
        desc: "Mẫu mới",
        amount: 10000,
        cat: mode === "expense" ? cat : incomeCat,
      }),
    ]);
    setEditingQuickTemplates(true);
  };

  const deleteQuickTemplate = (id) => {
    setSavedQuickTemplates((current) => (current || defaultQuickTemplates)
      .filter(tpl => tpl.id !== id)
      .map(normalizeQuickTemplate));
  };

  const clearDraft = () => {
    setDesc("");
    setAmount(0);
    setEditingTx(null);
  };

  const applyTemplate = (tpl) => {
    setEditingTx(null);
    setMode(tpl.type);
    setDesc(tpl.desc || tpl.label || "");
    setAmount(Number(tpl.amount) || 0);
    if (tpl.type === "expense") setCat(tpl.cat || firstExpenseCat);
    setDate(new Date().toISOString().slice(0, 10));
  };

  const startEdit = (tx) => {
    setEditingTx(tx);
    setMode(tx.type || "expense");
    setDesc(tx.desc || "");
    setAmount(tx.amount || 0);
    setCat(tx.type === "expense" ? (tx.cat || firstExpenseCat) : firstExpenseCat);
    setDate(tx.date || new Date().toISOString().slice(0, 10));
    formRef.current?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  };

  const cancelEdit = () => clearDraft();

  const handleSubmit = () => {
    if (!desc.trim() || amount <= 0) return;
    if (editingTx) {
      onUpdateTransaction && onUpdateTransaction(editingTx.id, {
        type: mode,
        desc: desc.trim(),
        amount,
        cat: mode === "expense" ? cat : incomeCat,
        date,
      });
      clearDraft();
      return;
    }
    onAddTransaction({
      type: mode,
      desc: desc.trim(),
      amount,
      cat: mode === "expense" ? cat : incomeCat,
      date,
    });
    clearDraft();
    setJustAdded(true);
    setBtnSuccess(true);
    setTimeout(() => setJustAdded(false), 700);
    setTimeout(() => setBtnSuccess(false), 650);
  };

  const clearListFilters = () => {
    setSearch("");
    setCategoryFilter("all");
    setSortMode("date-desc");
  };

  return (
    <div className="page tx-page">
      <PageHeader greet={`${monthLabel} · ${transactions.length} giao dịch`} />

      <div className="tx-layout">
        <aside className="tx-aside">
          <div ref={formRef} className="card tx-form-card" style={{ scrollMarginTop: 80 }}>
            <div className="card-header" style={{ marginBottom: 14 }}>
              <div>
                <div className="card-title">{editingTx ? "Sửa giao dịch" : "Thêm giao dịch"}</div>
                <div className="card-subtitle">{editingTx ? "Cập nhật lại thông tin giao dịch" : "Ghi lại ngay để không quên"}</div>
              </div>
              {editingTx && (
                <button className="btn btn-secondary tx-cancel-edit" onClick={cancelEdit}>
                  <Icons.x size={14} /> Hủy
                </button>
              )}
            </div>

            <TabBar
              style={{ marginBottom: 14, width: "100%" }}
              active={mode}
              onChange={setMode}
              tabs={[
                { id: "income",  label: "Thu nhập", icon: Icons.arrowDownLeft, cls: "income",  btnStyle: { flex: 1, justifyContent: "center" } },
                { id: "expense", label: "Chi tiêu",  icon: Icons.arrowUpRight,  cls: "expense", btnStyle: { flex: 1, justifyContent: "center" } },
              ]}
            />

            <div className="tx-form-vertical">
              <div className="quick-templates">
                <div className="quick-template-head">
                  <div className="quick-template-label">Mẫu nhanh</div>
                  <div className="quick-template-tools">
                    {editingQuickTemplates && (
                      <button className="quick-template-tool" onClick={addQuickTemplate}>
                        <Icons.plus size={13} /> Thêm
                      </button>
                    )}
                    <button
                      className="quick-template-tool"
                      onClick={() => setEditingQuickTemplates(v => !v)}
                    >
                      {editingQuickTemplates ? <Icons.check size={13} /> : <Icons.pencil size={13} />}
                      {editingQuickTemplates ? "Xong" : "Sửa"}
                    </button>
                  </div>
                </div>
                {editingQuickTemplates ? (
                  <div className="quick-template-editor">
                    {quickTemplates.map(tpl => (
                      <div className={"quick-template-edit-row " + tpl.type} key={tpl.id}>
                        <input
                          className="input quick-template-name"
                          value={tpl.label}
                          onChange={e => updateQuickTemplate(tpl.id, { label: e.target.value })}
                        />
                        <select
                          className="select quick-template-type"
                          value={tpl.type}
                          onChange={e => updateQuickTemplate(tpl.id, { type: e.target.value })}
                        >
                          <option value="expense">Chi</option>
                          <option value="income">Thu</option>
                        </select>
                        <MoneyInput
                          value={tpl.amount}
                          onChange={value => updateQuickTemplate(tpl.id, { amount: value })}
                        />
                        {tpl.type === "expense" && (
                          <select
                            className="select quick-template-cat"
                            value={tpl.cat}
                            onChange={e => updateQuickTemplate(tpl.id, { cat: e.target.value })}
                          >
                            {Object.values(CATEGORIES).map(c => (
                              <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>
                            ))}
                          </select>
                        )}
                        <button className="quick-template-delete" onClick={() => deleteQuickTemplate(tpl.id)} title="Xóa mẫu">
                          <Icons.trash size={13} />
                        </button>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="quick-template-list">
                    {quickTemplates.map(tpl => (
                      <button
                        key={tpl.id}
                        className={"quick-template-btn " + tpl.type}
                        onClick={() => applyTemplate(tpl)}
                      >
                        <span>{tpl.label}</span>
                        <span className="num">{fmtShort(tpl.amount)}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <div className="field">
                <span className="field-label">Mô tả</span>
                <input
                  className="input" type="text"
                  placeholder={mode === "income" ? "VD: Lương, mẹ chuyển..." : "VD: Cơm tấm, Grab, sách..."}
                  value={desc}
                  onChange={e => setDesc(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleSubmit()}
                />
              </div>
              <div className="tx-row-fields">
                <div className="field">
                  <span className="field-label">Số tiền</span>
                  <MoneyInput value={amount} onChange={setAmount} />
                </div>
                {mode === "expense" && (
                  <div className="field">
                    <span className="field-label">Danh mục</span>
                    <select className="select" value={cat} onChange={e => setCat(e.target.value)}>
                      {Object.values(CATEGORIES).map(c => (
                        <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>
                      ))}
                    </select>
                  </div>
                )}
              </div>
              <div className="field">
                <span className="field-label">Ngày</span>
                <input type="date" className="input" value={date} onChange={e => setDate(e.target.value)} />
              </div>
              <button
                className={"btn tx-submit-btn" + (btnSuccess ? " btn-success" : "")}
                onClick={handleSubmit}
              >
                {btnSuccess || editingTx ? <Icons.check size={15} /> : <Icons.plus size={15} />}
                {editingTx ? "Lưu thay đổi" : (btnSuccess ? "Đã thêm!" : "Thêm giao dịch")}
              </button>
            </div>
          </div>

          <div className="card tx-summary-card">
            <div className="card-header tx-summary-header">
              <div>
                <div className="card-title">Tóm tắt tháng</div>
                <div className="card-subtitle">{monthLabel}</div>
              </div>
            </div>
            <div className="mini-summary mini-summary-list tx-summary-grid">
              <div className="tx-summary-item">
                <div className="mini-label">
                  <Icons.arrowDownLeft size={12} style={{ color: "var(--c-green)" }} /> Thu
                </div>
                <div className="mini-value num">{fmt(totalIn)}</div>
              </div>
              <div className="tx-summary-item">
                <div className="mini-label">
                  <Icons.arrowUpRight size={12} style={{ color: "var(--c-red)" }} /> Chi
                </div>
                <div className="mini-value num">{fmt(totalOut)}</div>
              </div>
              <div className="tx-summary-item">
                <div className="mini-label">
                  <Icons.wallet size={12} /> Đầu tháng
                </div>
                <div className="mini-value num">
                  {fmt(openingBalance)}
                </div>
              </div>
              <div className="tx-summary-item">
                <div className="mini-label">
                  <Icons.wallet size={12} /> {balanceLabel}
                </div>
                <div className="mini-value num" style={{ color: finalBalance >= 0 ? "var(--c-green)" : "var(--c-red)" }}>
                  {fmt(finalBalance)}
                </div>
              </div>
            </div>
            <div className="tx-savings">
              <div className="tx-savings-head">
                <span>Tỉ lệ tiết kiệm</span>
                <span className="num" style={{ color: savingsTone }}>{savingsRate}%</span>
              </div>
              <div className="tx-savings-bar">
                <div
                  className="tx-savings-fill"
                  style={{
                    width: savingsProgress + "%",
                    background: monthlyBalance >= 0
                      ? "linear-gradient(90deg, var(--c-green), #2ABF52)"
                      : "linear-gradient(90deg, var(--c-red), #FF8A80)",
                  }}
                />
              </div>
            </div>
          </div>
        </aside>

        <div className="tx-main">
          <div className="search-bar">
            <Icons.search size={15} style={{ color: "var(--text-3)" }} />
            <input
              placeholder={`Tìm ${mode === "income" ? "thu nhập" : "chi tiêu"}, danh mục...`}
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <span className="search-meta">{filtered.length} / {list.length}</span>
          </div>

          <div className="tx-filter-panel">
            <div className="tx-filter-top">
              <div className="tx-filter-summary">
                <Icons.filter size={13} />
                <span>Tổng đang xem</span>
                <b className="num">{fmt(filteredTotal)}</b>
              </div>
              <div className="tx-filter-actions">
                <select className="select tx-sort-select" value={sortMode} onChange={e => setSortMode(e.target.value)}>
                  <option value="date-desc">Mới nhất</option>
                  <option value="date-asc">Cũ nhất</option>
                  <option value="amount-desc">Tiền cao</option>
                  <option value="amount-asc">Tiền thấp</option>
                </select>
                {hasListFilters && (
                  <button className="tx-clear-filter" onClick={clearListFilters}>
                    <Icons.x size={13} /> Xóa lọc
                  </button>
                )}
              </div>
            </div>
            {mode === "expense" && categoryOptions.length > 0 && (
              <div className="tx-category-chips">
                <button
                  className={"tx-filter-chip" + (categoryFilter === "all" ? " active" : "")}
                  onClick={() => setCategoryFilter("all")}
                >
                  Tất cả <span>{expenseList.length}</span>
                </button>
                {categoryOptions.map(c => (
                  <button
                    key={c.name}
                    className={"tx-filter-chip" + (categoryFilter === c.name ? " active" : "")}
                    onClick={() => setCategoryFilter(c.name)}
                  >
                    <span className="tx-filter-emoji">{c.emoji}</span>
                    {c.name}
                    <span>{categoryCounts[c.name]}</span>
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="card" style={{ padding: 18 }}>
            {list.length === 0 ? (
              <Empty icon="inbox" title="Chưa có giao dịch"
                text={`Thêm ${mode === "income" ? "thu nhập" : "chi tiêu"} đầu tiên ở panel bên trái`} />
            ) : filtered.length === 0 ? (
              <Empty icon="search" title="Không tìm thấy" text="Thử từ khóa khác hoặc xóa bộ lọc" />
            ) : (
              grouped.map(([day, items], groupIdx) => {
                const total = items.reduce((s, t) => s + t.amount, 0);
                return (
                  <div key={day}>
                    <div className="tx-day-label">
                      <span>Ngày {fmtDate(day)}</span>
                      <span className="num" style={{ color: mode === "income" ? "var(--c-green)" : "var(--text-3)" }}>
                        {mode === "income" ? "+" : ""}{fmt(total)}
                      </span>
                    </div>
                    <div className="tx-list">
                      {items.map((t, itemIdx) => {
                        const catInfo = t.cat ? CATEGORIES[t.cat] : null;
                        const bg = catInfo ? catInfo.color + "20" : "rgba(52,199,89,0.15)";
                        const fg = catInfo ? catInfo.color : "var(--c-green)";
                        const isNew = justAdded && groupIdx === 0 && itemIdx === 0;
                        return (
                          <div className={"tx-row" + (isNew ? " tx-row-new" : "")} key={t.id}>
                            <div className="tx-icon" style={{ background: bg, color: fg }}>
                              {catInfo ? catInfo.emoji : "💰"}
                            </div>
                            <div className="tx-info">
                              <span className="tx-desc">{t.desc}</span>
                              <span className="tx-meta">
                                {catInfo ? catInfo.name : "Thu nhập"} · {fmtDate(t.date)}
                              </span>
                            </div>
                            <span className={"tx-amount " + (mode === "income" ? "in" : "out")}>
                              {mode === "income" ? "+" : "−"}{fmt(t.amount)}
                            </span>
                            <div className="tx-actions">
                              <button className="tx-edit" title="Sửa"
                                onClick={() => startEdit(t)}>
                                <Icons.pencil size={14} />
                              </button>
                              <button className="tx-delete" title="Xóa"
                                onClick={() => onDeleteTransaction && onDeleteTransaction(t.id)}>
                                <Icons.trash size={14} />
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function Debts({ debts, onAddDebt, onUpdateDebt, onDeleteDebt, onSettleDebt, onReopenDebt }) {
  const [filter, setFilter] = useState("all");
  const [name, setName] = useState("");
  const [amt, setAmt] = useState(0);
  const [type, setType] = useState("owe");
  const [note, setNote] = useState("");
  const [editingDebt, setEditingDebt] = useState(null);
  const [editName, setEditName] = useState("");
  const [editAmt, setEditAmt] = useState(0);
  const [editType, setEditType] = useState("owe");
  const [editNote, setEditNote] = useState("");

  const filtered = useMemo(() => {
    if (filter === "all")    return debts;
    if (filter === "paid")   return debts.filter(d => d.settled);
    if (filter === "owe")    return debts.filter(d => d.type === "owe"  && !d.settled);
    if (filter === "owed")   return debts.filter(d => d.type === "lend" && !d.settled);
    return debts;
  }, [filter, debts]);

  const openOwe  = debts.filter(d => d.type === "owe"  && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openOwed = debts.filter(d => d.type === "lend" && !d.settled).reduce((s, d) => s + d.amount, 0);
  const paidCount = debts.filter(d => d.settled).length;
  const oweCount  = debts.filter(d => d.type === "owe"  && !d.settled).length;
  const owedCount = debts.filter(d => d.type === "lend" && !d.settled).length;

  const handleAdd = () => {
    if (!name.trim() || amt <= 0) return;
    onAddDebt({ name: name.trim(), amount: amt, type, note: note.trim(), settled: false });
    setName(""); setAmt(0); setNote("");
  };

  const startEdit = (debt) => {
    setEditingDebt(debt);
    setEditName(debt.name || "");
    setEditAmt(debt.amount || 0);
    setEditType(debt.type || "owe");
    setEditNote(debt.note || "");
  };

  const cancelEdit = () => {
    setEditingDebt(null);
    setEditName("");
    setEditAmt(0);
    setEditType("owe");
    setEditNote("");
  };

  const saveEdit = () => {
    if (!editingDebt || !editName.trim() || editAmt <= 0) return;
    onUpdateDebt && onUpdateDebt(editingDebt.id, {
      name: editName.trim(),
      amount: editAmt,
      type: editType,
      note: editNote.trim(),
    });
    cancelEdit();
  };

  return (
    <div className="page">
      <PageHeader greet="Sổ nợ vay với bạn bè & dịch vụ" />

      <div className="stat-grid">
        <div className="stat" style={{ background: "linear-gradient(135deg, #FF3B30, #FF2D55)", color: "#fff", borderColor: "transparent" }}>
          <div className="hero-bg" />
          <div className="stat-label" style={{ color: "rgba(255,255,255,0.85)" }}>
            <Icons.arrowUpRight size={13} /> Bạn đang nợ
          </div>
          <div className="stat-value num">{fmt(openOwe)}</div>
          <div className="stat-sub" style={{ color: "rgba(255,255,255,0.8)" }}>
            {oweCount} khoản cần trả
          </div>
        </div>

        <div className="stat">
          <div className="stat-label" style={{ color: "var(--c-green)" }}>
            <Icons.arrowDownLeft size={13} /> Người khác nợ bạn
          </div>
          <div className="stat-value num">{fmt(openOwed)}</div>
          <div className="stat-sub">{owedCount} khoản chờ thu</div>
        </div>

        <div className="stat">
          <div className="stat-label">
            <Icons.check size={13} /> Đã xong
          </div>
          <div className="stat-value num">{paidCount}</div>
          <div className="stat-sub">khoản trong tháng</div>
        </div>
      </div>

      <div className="card" style={{ marginBottom: 18 }}>
        <div className="card-header">
          <div>
            <div className="card-title">Ghi nhận khoản nợ mới</div>
            <div className="card-subtitle">Theo dõi ai nợ ai để không quên</div>
          </div>
        </div>
        <div className="debt-form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", gap: 10, alignItems: "end" }}>
          <div className="field">
            <span className="field-label">Tên người</span>
            <input className="input" type="text" placeholder="VD: Nam, Hân, Shopee..."
              value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div className="field">
            <span className="field-label">Số tiền</span>
            <MoneyInput value={amt} onChange={setAmt} />
          </div>
          <div className="field">
            <span className="field-label">Loại</span>
            <select className="select" value={type} onChange={e => setType(e.target.value)}>
              <option value="owe">Mình nợ họ</option>
              <option value="lend">Họ nợ mình</option>
            </select>
          </div>
          <div className="field">
            <span className="field-label">Ghi chú</span>
            <input className="input" type="text" placeholder="VD: Tiền ăn hôm qua"
              value={note} onChange={e => setNote(e.target.value)} />
          </div>
          <button className="btn" style={{ height: 41 }} onClick={handleAdd}>
            <Icons.plus size={15} /> Thêm
          </button>
        </div>
      </div>

      <TabBar
        style={{ marginBottom: 14 }}
        active={filter}
        onChange={setFilter}
        tabs={[
          { id: "all",  label: `Tất cả (${debts.length})` },
          { id: "owe",  label: `Mình nợ (${oweCount})` },
          { id: "owed", label: `Họ nợ mình (${owedCount})` },
          { id: "paid", label: `Đã xong (${paidCount})` },
        ]}
      />

      <div className="card" style={{ padding: 14 }}>
        {filtered.length === 0 ? (
          <Empty icon="inbox" title="Không có khoản nợ" text="Tuyệt! Bạn đang sạch nợ." />
        ) : (
          <div className="debt-list">
            {filtered.map(d => {
              const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
              const color = debtColor(d.id);
              const isPaid = !!d.settled;
              const isEditing = editingDebt?.id === d.id;
              if (isEditing) {
                return (
                  <div className="debt-edit-item" key={d.id}>
                    <div className="debt-edit-grid">
                      <input className="input" type="text" value={editName} onChange={e => setEditName(e.target.value)} />
                      <MoneyInput value={editAmt} onChange={setEditAmt} />
                      <select className="select" value={editType} onChange={e => setEditType(e.target.value)}>
                        <option value="owe">Mình nợ họ</option>
                        <option value="lend">Họ nợ mình</option>
                      </select>
                      <input className="input" type="text" value={editNote} onChange={e => setEditNote(e.target.value)} placeholder="Ghi chú" />
                      <div className="debt-actions">
                        <button className="btn" style={{ padding: "8px 12px", fontSize: 12 }} onClick={saveEdit}>Lưu</button>
                        <button className="btn-secondary btn" style={{ padding: "8px 12px", fontSize: 12 }} onClick={cancelEdit}>Hủy</button>
                      </div>
                    </div>
                  </div>
                );
              }
              return (
                <div className={"debt-row" + (isPaid ? " paid" : "")} key={d.id}>
                  <div className="debt-avatar" style={{ background: color, opacity: isPaid ? 0.5 : 1 }}>
                    {initials}
                  </div>
                  <div className="debt-info">
                    <span className="debt-name">{d.name}</span>
                    <span className="debt-note">{d.note}</span>
                  </div>
                  <span className={"debt-amount num " + (d.type === "owe" ? "owe" : "owed")}>
                    {isPaid ? null : (d.type === "owe" ? "−" : "+")}{fmt(d.amount)}
                  </span>
                  {isPaid ? (
                    <div className="debt-actions">
                      <span className="debt-status-pill paid">
                        <Icons.check size={10} style={{ verticalAlign: "middle" }} /> Xong
                      </span>
                      <button className="btn-secondary btn debt-small-btn" onClick={() => onReopenDebt && onReopenDebt(d.id)}>
                        Mở lại
                      </button>
                      <button className="debt-icon-btn" title="Sửa" onClick={() => startEdit(d)}>
                        <Icons.pencil size={13} />
                      </button>
                    </div>
                  ) : (
                    <div className="debt-actions">
                      <button className="btn-secondary btn debt-small-btn" onClick={() => onSettleDebt && onSettleDebt(d.id)}>
                        {d.type === "owe" ? "Trả" : "Thu"}
                      </button>
                      <button className="debt-icon-btn" title="Sửa" onClick={() => startEdit(d)}>
                        <Icons.pencil size={13} />
                      </button>
                      <button className="tx-delete" title="Xóa"
                        onClick={() => onDeleteDebt && onDeleteDebt(d.id)}
                        style={{ opacity: 1, width: 28, height: 28 }}>
                        <Icons.trash size={13} />
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {openOwe > openOwed && openOwe > 0 && (
        <div style={{ marginTop: 18 }}>
          <Insight tone="orange" icon="alertTri" title="Bạn đang nợ nhiều hơn người khác nợ bạn">
            Khoản nợ ròng <b>{fmt(openOwe - openOwed)}</b>. Cân nhắc dành dụm để trả sớm nhé.
          </Insight>
        </div>
      )}
    </div>
  );
}

function Budget({ budgets, transactions, onSaveBudget, onDeleteBudget, viewMonth, viewYear }) {
  const [editingCat, setEditingCat] = useState(null);
  const [editCat, setEditCat] = useState(Object.keys(CATEGORIES)[0]);
  const [editAmt, setEditAmt] = useState(800000);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const formRef = useRef(null);
  const today = new Date();
  const safeViewMonth = Number.isInteger(viewMonth) ? viewMonth : today.getMonth();
  const safeViewYear = Number.isInteger(viewYear) ? viewYear : today.getFullYear();
  const daysInViewedMonth = new Date(safeViewYear, safeViewMonth + 1, 0).getDate();
  const isCurrentView = today.getMonth() === safeViewMonth && today.getFullYear() === safeViewYear;
  const averageDayCount = Math.max(1, isCurrentView ? today.getDate() : daysInViewedMonth);

  const rows = budgets.map(b => {
    const actual = transactions
      .filter(t => t.type === "expense" && t.cat === b.cat)
      .reduce((s, t) => s + t.amount, 0);
    const pct = b.cap > 0 ? (actual / b.cap) * 100 : 0;
    const benchmark = CAT_BENCHMARKS[b.cat] || Math.round(b.cap * 0.9);
    const benchPct = b.cap > 0 ? (benchmark / b.cap) * 100 : 0;
    let level = "ok";
    if (pct >= 100) level = "danger";
    else if (pct >= 80) level = "warn";
    return {
      ...b,
      ...(CATEGORIES[b.cat] || { name: b.cat, emoji: "📦", color: "#8E8E93" }),
      actual,
      remaining: b.cap - actual,
      pct,
      benchPct,
      level,
      averageDaily: Math.round(actual / averageDayCount),
      averageWeekly: Math.round(actual / (averageDayCount / 7)),
      vsBench: actual - benchmark,
      benchmark,
    };
  });

  const totalCap   = rows.reduce((s, r) => s + r.cap, 0);
  const totalSpent = rows.reduce((s, r) => s + r.actual, 0);

  const handleStartEdit = (b) => {
    setEditingCat(b.cat);
    setEditCat(b.cat);
    setEditAmt(b.cap);
    formRef.current?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  };

  const handleCancel = () => {
    setEditingCat(null);
    setEditCat(Object.keys(CATEGORIES)[0]);
    setEditAmt(800000);
  };

  const handleSave = () => {
    if (editAmt <= 0) return;
    onSaveBudget(editCat, editAmt);
    handleCancel();
  };

  const handleDelete = (cat) => {
    onDeleteBudget(cat);
    setConfirmDelete(null);
    if (editingCat === cat) handleCancel();
  };

  return (
    <div className="page">
      <PageHeader greet="Đặt giới hạn — sống trong khả năng">
        <button className="btn" onClick={() => { handleCancel(); formRef.current?.scrollIntoView({ behavior: "smooth" }); }}>
          <Icons.plus size={15} /> Tạo ngân sách
        </button>
      </PageHeader>

      <div className="budget-stats">
        <div className="stat">
          <div className="stat-label"><Icons.wallet size={13} /> Tổng ngân sách</div>
          <div className="stat-value num">{fmt(totalCap)}</div>
          <div className="stat-sub">{rows.length} danh mục</div>
        </div>
        <div className="stat">
          <div className="stat-label" style={{ color: "var(--c-red)" }}>
            <Icons.arrowUpRight size={13} /> Đã chi
          </div>
          <div className="stat-value num">{fmt(totalSpent)}</div>
          <div className="stat-sub">
            <span className="num">{totalCap > 0 ? ((totalSpent / totalCap) * 100).toFixed(0) : 0}%</span> ngân sách
          </div>
        </div>
        <div className="stat">
          <div className="stat-label" style={{ color: totalCap - totalSpent >= 0 ? "var(--c-green)" : "var(--c-red)" }}>
            <Icons.flag size={13} /> Còn lại
          </div>
          <div className="stat-value num" style={{ color: totalCap - totalSpent >= 0 ? "inherit" : "var(--c-red)" }}>
            {fmt(Math.abs(totalCap - totalSpent))}
          </div>
          <div className="stat-sub">{totalCap - totalSpent >= 0 ? "chưa chi" : "vượt mức"}</div>
        </div>
      </div>

      <div ref={formRef} className="card" style={{ marginBottom: 18, scrollMarginTop: 80 }}>
        <div className="card-header">
          <div>
            <div className="card-title">
              {editingCat ? "Sửa hạn mức" : "Thêm / Cập nhật hạn mức"}
            </div>
            <div className="card-subtitle">
              {editingCat
                ? `Đang sửa: ${CATEGORIES[editingCat]?.emoji} ${editingCat}`
                : "Đặt mức chi tối đa hàng tháng cho từng danh mục"}
            </div>
          </div>
          {editingCat && (
            <button className="btn btn-secondary" onClick={handleCancel}>
              <Icons.x size={14} /> Hủy
            </button>
          )}
        </div>
        <div className="budget-form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 10, alignItems: "end" }}>
          <div className="field">
            <span className="field-label">Danh mục</span>
            <select className="select" value={editCat} onChange={e => setEditCat(e.target.value)}>
              {Object.values(CATEGORIES).map(c => (
                <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <span className="field-label">Hạn mức / tháng</span>
            <MoneyInput value={editAmt} onChange={setEditAmt} />
          </div>
          <button className="btn" style={{ height: 41 }} onClick={handleSave}>
            <Icons.check size={15} /> {editingCat ? "Lưu thay đổi" : "Lưu ngân sách"}
          </button>
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <h2 style={{ fontSize: 18, fontWeight: 600 }}>Ngân sách tháng này</h2>
        <span style={{ fontSize: 12, color: "var(--text-3)", display: "inline-flex", alignItems: "center", gap: 6 }}>
          <Icons.users size={12} /> Có so sánh với SV cùng nhóm
        </span>
      </div>

      {rows.length === 0 ? (
        <div className="card">
          <Empty icon="wallet" title="Chưa có ngân sách nào"
            text="Thêm danh mục đầu tiên ở phía trên để bắt đầu kiểm soát chi tiêu" />
        </div>
      ) : (
        <div className="budget-list">
          {rows.map(r => (
            <div className={"budget-row" + (editingCat === r.cat ? " editing" : "")} key={r.cat}>
              <div className="budget-head">
                <div className="budget-cat">
                  <div className="budget-emoji" style={{ background: r.color + "20", color: r.color }}>
                    {r.emoji}
                  </div>
                  <div>
                    <div className="budget-name">{r.name}</div>
                    <div className="budget-sub">
                      {r.level === "danger" ? (
                        <span style={{ color: "var(--c-red)" }}>
                          <Icons.alertTri size={11} style={{ verticalAlign: "middle" }} /> Vượt {fmt(r.actual - r.cap)}
                        </span>
                      ) : r.level === "warn" ? (
                        <span style={{ color: "var(--c-orange)" }}>Còn lại {fmt(r.remaining)}</span>
                      ) : (
                        <span>Còn lại {fmt(r.remaining)}</span>
                      )}
                    </div>
                  </div>
                </div>
                <div className="budget-right">
                  <div className="budget-amount" style={{ textAlign: "right" }}>
                    <span className="num">{fmt(r.actual)}</span>{" "}
                    <span className="total num">/ {fmt(r.cap)}</span>
                  </div>
                  <div className="budget-actions">
                    <button className="budget-action-btn" title="Sửa" onClick={() => handleStartEdit(r)}>
                      <Icons.pencil size={14} />
                    </button>
                    <button className="budget-action-btn danger" title="Xóa"
                      onClick={() => setConfirmDelete(r.cat)}>
                      <Icons.trash size={14} />
                    </button>
                  </div>
                </div>
              </div>

              <div className="budget-track">
                <div className={"budget-fill " + r.level} style={{ width: Math.min(100, r.pct) + "%" }} />
                <div style={{
                  position: "absolute", top: -4, bottom: -4,
                  left: `calc(${Math.min(100, r.benchPct)}% - 1px)`,
                  width: 2, background: "var(--text-2)", borderRadius: 2, pointerEvents: "none",
                }} title={`Trung bình SV cùng nhóm: ${fmt(r.benchmark)}`} />
              </div>

              <div className="budget-foot">
                <span><span className="num">{r.pct.toFixed(0)}%</span> đã dùng</span>
                <span className="budget-benchmark lower"
                  title={`Trung bình đã chi: ${fmt(r.averageDaily)}/ngày, ${fmt(r.averageWeekly)}/tuần`}>
                  <Icons.calendar size={11} />
                  TB{" "}
                  <span className="num">{fmt(r.averageDaily)}</span>/ngày
                  <span aria-hidden="true">·</span>
                  <span className="num">{fmt(r.averageWeekly)}</span>/tuần
                </span>
              </div>

              {confirmDelete === r.cat && (
                <div className="budget-confirm">
                  <span>Xóa ngân sách <b>{r.name}</b>?</span>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="btn btn-secondary" style={{ padding: "6px 12px", fontSize: 12 }}
                      onClick={() => setConfirmDelete(null)}>Hủy</button>
                    <button className="btn" style={{ padding: "6px 12px", fontSize: 12, background: "var(--c-red)" }}
                      onClick={() => handleDelete(r.cat)}>Xóa</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function localDateKey(dateLike = new Date()) {
  const d = dateLike instanceof Date ? dateLike : new Date(dateLike);
  if (Number.isNaN(d.getTime())) return localDateKey(new Date());
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function debtSettlementTransaction(debt, paidDate = new Date(), idPrefix = "settle") {
  return {
    id: `${idPrefix}-${debt.id}`,
    debtId: debt.id,
    type: debt.type === "owe" ? "expense" : "income",
    desc: debt.type === "owe" ? `Trả nợ ${debt.name}` : `Thu nợ ${debt.name}`,
    amount: debt.amount,
    cat: debt.type === "owe" ? "Trả nợ" : "Thu nhập",
    date: localDateKey(paidDate),
  };
}

function getMonthlyBalance(transactions, viewYear, viewMonth) {
  const monthStart = new Date(viewYear, viewMonth, 1);
  const nextMonthStart = new Date(viewYear, viewMonth + 1, 1);
  let openingBalance = 0;
  let income = 0;
  let expense = 0;

  transactions.forEach(t => {
    const d = new Date((t.date || "") + "T00:00:00");
    if (Number.isNaN(d.getTime())) return;

    const amount = Number(t.amount) || 0;
    const signedAmount = t.type === "income" ? amount : t.type === "expense" ? -amount : 0;

    if (d < monthStart) {
      openingBalance += signedAmount;
      return;
    }

    if (d >= monthStart && d < nextMonthStart) {
      if (t.type === "income") income += amount;
      if (t.type === "expense") expense += amount;
    }
  });

  const periodBalance = income - expense;
  return {
    openingBalance,
    periodBalance,
    closingBalance: openingBalance + periodBalance,
  };
}

function App() {
  const [allTransactions, setAllTransactions] = useState([]);
  const [debts, setDebts]       = useState([]);
  const [budgets, setBudgets]   = useState([]);
  const [goals, setGoals]       = useState([]);
  const [loaded, setLoaded]     = useState(false);
  const [page, setPage]         = useState("overview");
  const [slideDir, setSlideDir] = useState("right");
  const [theme, setTheme]       = useState(() => localStorage.getItem("hieu-theme") || "light");
  const [monthOffset, setMonthOffset] = useState(0);

  const PAGE_ORDER = ['overview', 'transactions', 'debts', 'budget'];
  const navigateTo = useCallback((newPage) => {
    const pi = PAGE_ORDER.indexOf(page);
    const ni = PAGE_ORDER.indexOf(newPage);
    setSlideDir(ni >= pi ? 'right' : 'left');
    setPage(newPage);
  }, [page]);

  const now = new Date();
  const viewDate  = new Date(now.getFullYear(), now.getMonth() - monthOffset, 1);
  const viewMonth = viewDate.getMonth();
  const viewYear  = viewDate.getFullYear();
  const monthLabel = `Tháng ${viewMonth + 1}, ${viewYear}`;

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem("hieu-theme", theme);
  }, [theme]);

  useEffect(() => {
    try { firebase.initializeApp(firebaseConfig); } catch (_) {}
    const db = firebase.firestore();
    window._fsDoc = db.collection("fintrack").doc("hiewu");

    const unsub = window._fsDoc.onSnapshot(snap => {
      if (snap.exists) {
        const d = snap.data();
        const { result, changed } = migrateCats(d.transactions || []);
        const dbts = d.debts   || [];
        const bdgs = d.budgets || [];
        const gls  = d.goals   || DEFAULT_GOALS;
        const missingSettlementTxs = dbts
          .filter(debt => debt.settled && debt.paidDate && !result.some(t => t.debtId === debt.id))
          .map(debt => debtSettlementTransaction(debt, debt.paidDate, "settle-backfill"));
        const txns = missingSettlementTxs.length ? [...missingSettlementTxs, ...result] : result;
        setAllTransactions(txns);
        setDebts(dbts);
        setBudgets(bdgs);
        setGoals(gls);
        setLoaded(true);
        if (changed || missingSettlementTxs.length) {
          window._fsDoc.set({ transactions: txns, debts: dbts, budgets: bdgs, goals: gls });
        }
      } else {
        setAllTransactions(_SEED.transactions);
        setDebts(_SEED.debts);
        setBudgets([]);
        setGoals(DEFAULT_GOALS);
        setLoaded(true);
        window._fsDoc.set({ transactions: _SEED.transactions, debts: _SEED.debts, budgets: [], goals: DEFAULT_GOALS });
      }
    }, err => console.error("Firebase error:", err));

    return () => unsub();
  }, []);

  const persist = useCallback((txns, dbts, bdgs, gls) => {
    if (window._fsDoc) {
      window._fsDoc.set({ transactions: txns, debts: dbts, budgets: bdgs, goals: gls }).catch(console.error);
    }
  }, []);

  const addTransaction = useCallback((tx) => {
    const next = [{ ...tx, id: Date.now() }, ...allTransactions];
    setAllTransactions(next);
    persist(next, debts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const updateTransaction = useCallback((id, patch) => {
    const next = allTransactions.map(t => (
      t.id === id ? { ...t, ...patch, amount: Number(patch.amount) || t.amount } : t
    ));
    setAllTransactions(next);
    persist(next, debts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteTransaction = useCallback((id) => {
    const next = allTransactions.filter(t => t.id !== id);
    setAllTransactions(next);
    persist(next, debts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const addDebt = useCallback((debt) => {
    const next = [...debts, { ...debt, id: Date.now() }];
    setDebts(next);
    persist(allTransactions, next, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteDebt = useCallback((id) => {
    const next = debts.filter(d => d.id !== id);
    const nextTransactions = allTransactions.filter(t => t.debtId !== id);
    setDebts(next);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, next, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const updateDebt = useCallback((id, patch) => {
    const current = debts.find(d => d.id === id);
    if (!current) return;

    const updated = { ...current, ...patch, amount: Number(patch.amount) || current.amount };
    const nextDebts = debts.map(d => d.id === id ? updated : d);
    const nextTransactions = allTransactions.map(t => (
      t.debtId === id
        ? {
            ...t,
            type: updated.type === "owe" ? "expense" : "income",
            desc: updated.type === "owe" ? `Trả nợ ${updated.name}` : `Thu nợ ${updated.name}`,
            amount: updated.amount,
            cat: updated.type === "owe" ? "Trả nợ" : "Thu nhập",
          }
        : t
    ));

    setDebts(nextDebts);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, nextDebts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const reopenDebt = useCallback((id) => {
    const debt = debts.find(d => d.id === id);
    if (!debt) return;

    const nextDebts = debts.map(d => (
      d.id === id ? { ...d, settled: false, paidDate: null } : d
    ));
    const nextTransactions = allTransactions.filter(t => t.debtId !== id);

    setDebts(nextDebts);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, nextDebts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const settleDebt = useCallback((id) => {
    const debt = debts.find(d => d.id === id);
    if (!debt || debt.settled) return;

    const now = new Date();
    const settlementTx = debtSettlementTransaction(debt, now);
    const nextDebts = debts.map(d => d.id === id ? { ...d, settled: true, paidDate: now.toISOString() } : d);
    const nextTransactions = allTransactions.some(t => t.debtId === id)
      ? allTransactions
      : [settlementTx, ...allTransactions];

    setDebts(nextDebts);
    setAllTransactions(nextTransactions);
    persist(nextTransactions, nextDebts, budgets, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const saveBudget = useCallback((cat, cap) => {
    const exists = budgets.some(b => b.cat === cat);
    const next = exists
      ? budgets.map(b => b.cat === cat ? { ...b, cap } : b)
      : [...budgets, { cat, cap }];
    setBudgets(next);
    persist(allTransactions, debts, next, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteBudget = useCallback((cat) => {
    const next = budgets.filter(b => b.cat !== cat);
    setBudgets(next);
    persist(allTransactions, debts, next, goals);
  }, [allTransactions, debts, budgets, goals, persist]);

  const saveGoal = useCallback((goal) => {
    const exists = goals.some(g => g.id === goal.id);
    const next = exists
      ? goals.map(g => g.id === goal.id ? goal : g)
      : [...goals, goal];
    setGoals(next);
    persist(allTransactions, debts, budgets, next);
  }, [allTransactions, debts, budgets, goals, persist]);

  const deleteGoal = useCallback((id) => {
    const next = goals.filter(g => g.id !== id);
    setGoals(next);
    persist(allTransactions, debts, budgets, next);
  }, [allTransactions, debts, budgets, goals, persist]);

  const monthTransactions = useMemo(() => {
    return allTransactions.filter(t => {
      const d = new Date(t.date + "T00:00:00");
      return d.getMonth() === viewMonth && d.getFullYear() === viewYear;
    });
  }, [allTransactions, viewMonth, viewYear]);

  const monthlyBalance = useMemo(() => (
    getMonthlyBalance(allTransactions, viewYear, viewMonth)
  ), [allTransactions, viewYear, viewMonth]);

  if (!loaded) return <AppSkeleton />;

  const PageComponents = { overview: Overview, transactions: Transactions, debts: Debts, budget: Budget };
  const PageEl = PageComponents[page];
  const pageProps = {
    transactions:     monthTransactions,
    allTransactions,
    debts,
    budgets,
    goals,
    viewMonth,
    viewYear,
    monthLabel,
    openingBalance:      monthlyBalance.openingBalance,
    periodBalance:       monthlyBalance.periodBalance,
    closingBalance:      monthlyBalance.closingBalance,
    onAddTransaction:    addTransaction,
    onUpdateTransaction: updateTransaction,
    onDeleteTransaction: deleteTransaction,
    onAddDebt:           addDebt,
    onUpdateDebt:        updateDebt,
    onDeleteDebt:        deleteDebt,
    onSettleDebt:        settleDebt,
    onReopenDebt:        reopenDebt,
    onSaveBudget:        saveBudget,
    onDeleteBudget:      deleteBudget,
    onSaveGoal:          saveGoal,
    onDeleteGoal:        deleteGoal,
    onNavigate:          navigateTo,
  };

  return (
    <div className="app">
      <Sidebar active={page} onChange={navigateTo} theme={theme} onTheme={setTheme} debts={debts} />
      <main className="main">
        <Toolbar
          activePage={page}
          month={monthLabel}
          onMonthChange={(d) => setMonthOffset(m => Math.max(0, m + d))}
        />
        <div key={page} className={"page-slide-" + slideDir}>
          <PageEl {...pageProps} />
        </div>
      </main>
    </div>
  );
}
