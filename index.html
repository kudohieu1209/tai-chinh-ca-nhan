// charts.jsx — Custom SVG charts

const { useMemo: useMemoC } = React;

function FlowChart({ data, daysInMonth = 31 }) {
  // Y-axis labels live in a fixed CSS gutter outside this viewBox, so the
  // horizontal padding stays small and never collides with them when the
  // SVG stretches (preserveAspectRatio="none").
  const W = 600, H = 220, PAD_L = 8, PAD_R = 10, PAD_T = 14, PAD_B = 28;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;
  const [hoverDay, setHoverDay] = React.useState(null);

  const series = useMemoC(() => {
    const arr = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const m = data.find(x => x.d === d);
      arr.push({ d, inc: m?.inc || 0, exp: m?.exp || 0 });
    }
    return arr;
  }, [data, daysInMonth]);

  const maxV = Math.max(...series.flatMap(s => [s.inc, s.exp]), 100);
  const niceMax = Math.ceil(maxV / 500000) * 500000;

  const xOf = (i) => PAD_L + innerW * i / (daysInMonth - 1);
  const yOf = (v) => PAD_T + innerH - innerH * v / niceMax;

  const smooth = (pts) => {
    if (!pts.length) return '';
    let path = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) {
      const p0 = pts[i - 1], p1 = pts[i];
      const cx = (p0.x + p1.x) / 2;
      path += ` C ${cx} ${p0.y}, ${cx} ${p1.y}, ${p1.x} ${p1.y}`;
    }
    return path;
  };

  const incPts = series.map((s, i) => ({ x: xOf(i), y: yOf(s.inc) }));
  const expPts = series.map((s, i) => ({ x: xOf(i), y: yOf(s.exp) }));
  const incArea = smooth(incPts) + ` L ${xOf(daysInMonth - 1)} ${yOf(0)} L ${xOf(0)} ${yOf(0)} Z`;
  const expArea = smooth(expPts) + ` L ${xOf(daysInMonth - 1)} ${yOf(0)} L ${xOf(0)} ${yOf(0)} Z`;
  const xTicks = [1, 7, 14, 21, 28, daysInMonth];

  const handleHoverMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width * W;
    const idx = Math.round((px - PAD_L) / innerW * (daysInMonth - 1));
    setHoverDay(Math.max(0, Math.min(daysInMonth - 1, idx)));
  };
  const hovered = hoverDay != null ? series[hoverDay] : null;

  return (
    <>
      <div className="flow-chart-wrap">
        <div className="flow-y-labels" aria-hidden="true">
          {Array.from({ length: 5 }, (_, i) => {
            const y = PAD_T + innerH * i / 4;
            const v = niceMax * (1 - i / 4);
            return <span key={i} style={{ top: `${y / H * 100}%` }}>{formatAxisValue(v)}</span>;
          })}
        </div>
        <div className="flow-plot">
        <svg viewBox={`0 0 ${W} ${H}`} className="flow-chart" preserveAspectRatio="none"
          onMouseMove={handleHoverMove} onMouseLeave={() => setHoverDay(null)}>
          <defs>
            <linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--c-green)" stopOpacity="0.5" />
              <stop offset="100%" stopColor="var(--c-green)" stopOpacity="0" />
            </linearGradient>
            <linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--c-red)" stopOpacity="0.5" />
              <stop offset="100%" stopColor="var(--c-red)" stopOpacity="0" />
            </linearGradient>
          </defs>
          <g className="flow-grid">
            {Array.from({ length: 5 }, (_, i) => {
              const y = PAD_T + innerH * i / 4;
              return (
                <g key={i}>
                  <line x1={PAD_L} y1={y} x2={W - PAD_R} y2={y} />
                </g>
              );
            })}
          </g>
          <path d={expArea} className="flow-area-expense" />
          <path d={incArea} className="flow-area-income" />
          <path d={smooth(expPts)} className="flow-line-expense" />
          <path d={smooth(incPts)} className="flow-line-income" />
          {hovered && (
            <g className="flow-hover" aria-hidden="true">
              <line className="flow-hover-line" x1={xOf(hoverDay)} y1={PAD_T} x2={xOf(hoverDay)} y2={PAD_T + innerH} />
              <circle cx={xOf(hoverDay)} cy={yOf(hovered.inc)} r="4.5" className="flow-dot-income" />
              <circle cx={xOf(hoverDay)} cy={yOf(hovered.exp)} r="4.5" className="flow-dot-expense" />
            </g>
          )}
        </svg>
        <div className="flow-x-labels" aria-hidden="true">
          {xTicks.map(d => (
            <span key={d} style={{ left: `${xOf(d - 1) / W * 100}%` }}>{d}</span>
          ))}
        </div>
        {hovered && (
          <div
            className={"flow-tooltip" + (hoverDay > (daysInMonth - 1) * 0.62 ? " flip" : "")}
            style={{ left: `${xOf(hoverDay) / W * 100}%` }}
          >
            <div className="flow-tooltip-day">Ngày {hovered.d}</div>
            <div className="flow-tooltip-row income"><span />Thu <b className="num">{fmt(hovered.inc)}</b></div>
            <div className="flow-tooltip-row expense"><span />Chi <b className="num">{fmt(hovered.exp)}</b></div>
          </div>
        )}
        </div>
      </div>
      <div className="legend">
        <div className="legend-item">
          <span className="legend-dot" style={{ background: "var(--c-green)" }} /> Thu nhập
        </div>
        <div className="legend-item">
          <span className="legend-dot" style={{ background: "var(--c-red)" }} /> Chi tiêu
        </div>
      </div>
    </>
  );
}

function formatCurrency(value) {
  const n = Number.isFinite(value) ? value : 0;
  return new Intl.NumberFormat('vi-VN').format(Math.round(n)) + 'đ';
}

function formatPercent(value) {
  const n = Number.isFinite(value) ? value : 0;
  return n.toLocaleString('vi-VN', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '%';
}

function formatAxisValue(value) {
  const n = Number.isFinite(value) ? value : 0;
  if (n === 0) return '0';
  if (n >= 1e6) {
    const m = n / 1e6;
    return (Number.isInteger(m) ? String(m) : m.toFixed(1).replace(/\.0$/, '')) + 'M';
  }
  if (n >= 1e3) return Math.round(n / 1e3) + 'K';
  return String(Math.round(n));
}

function calculateChangePercent(current, previous) {
  if (!Number.isFinite(current) || !Number.isFinite(previous) || previous === 0) return null;
  return ((current - previous) / previous) * 100;
}

function formatChangeText(label, current, previous) {
  const change = calculateChangePercent(current, previous);
  if (change == null) return null;
  if (Math.abs(change) < 0.05) return `${label} không đổi so với tháng trước`;
  return `${label} ${change > 0 ? 'tăng' : 'giảm'} ${formatPercent(Math.abs(change))} so với tháng trước`;
}

function getSpendingRatioMessage(ratio, income, expense) {
  if (income <= 0 && expense > 0) return 'Chi tiêu đã vượt thu nhập tháng này.';
  if (ratio <= 50) return 'Bạn đang sử dụng dưới một nửa thu nhập trong tháng này.';
  if (ratio <= 70) return 'Chi tiêu đang ở mức ổn so với thu nhập tháng này.';
  if (ratio <= 90) return 'Chi tiêu chiếm phần lớn thu nhập tháng này.';
  if (ratio <= 100) return 'Chi tiêu gần bằng thu nhập tháng này.';
  return 'Chi tiêu đã vượt thu nhập tháng này.';
}

function getSpendingRatioTone(ratio) {
  if (ratio <= 50) return "low";
  if (ratio <= 70) return "medium";
  if (ratio <= 90) return "high";
  if (ratio <= 100) return "near";
  return "over";
}

function SixMonthBars({ data, currentLabel }) {
  const values = data.flatMap(m => [m.inc || 0, m.exp || 0]);
  const maxV = Math.max(...values, 0);
  const step = maxV > 0 ? Math.max(1000000, Math.ceil(maxV / 4 / 1000000) * 1000000) : 1000000;
  const niceMax = step * 4;
  const ticks = Array.from({ length: 5 }, (_, i) => niceMax - step * i);

  return (
    <div className="month-chart">
      <div className="month-y-axis" aria-hidden="true">
        {ticks.map((tick, i) => (
          <span key={tick} style={{ top: `${i / (ticks.length - 1) * 100}%` }}>{formatAxisValue(tick)}</span>
        ))}
      </div>
      <div className="month-plot">
        <div className="month-grid" aria-hidden="true">
          {ticks.map((tick, i) => (
            <span key={tick} style={{ top: `${i / (ticks.length - 1) * 100}%` }} />
          ))}
        </div>
        <div className="month-bars">
          {data.map(m => {
            const isCurrent = m.label === currentLabel;
            const inc = m.inc || 0;
            const exp = m.exp || 0;
            const incH = niceMax > 0 ? inc / niceMax * 100 : 0;
            const expH = niceMax > 0 ? exp / niceMax * 100 : 0;
            const hasData = inc > 0 || exp > 0;
            return (
              <div
                className={"mb-col" + (hasData ? " has-data" : " is-empty")}
                key={m.label}
                data-tooltip={`${m.label} · Thu ${formatCurrency(inc)} · Chi ${formatCurrency(exp)}`}
              >
                <div className="mb-bars-inner">
                  {inc > 0 && (
                    <div className={"mb-bar income" + (isCurrent ? " current" : "")}
                      style={{ height: incH + "%" }} title={`${m.label} · Thu ${formatCurrency(inc)} · Chi ${formatCurrency(exp)}`} />
                  )}
                  {exp > 0 && (
                    <div className={"mb-bar expense" + (isCurrent ? " current" : "")}
                      style={{ height: expH + "%" }} title={`${m.label} · Thu ${formatCurrency(inc)} · Chi ${formatCurrency(exp)}`} />
                  )}
                </div>
                <span className={"mb-label" + (isCurrent ? " current" : "")}>{m.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BenchmarkBar({ value, benchmark, max }) {
  const mePct = Math.min(100, value / max * 100);
  const avgPct = Math.min(100, benchmark / max * 100);
  return (
    <div className="benchmark-bar">
      <div className="me" style={{ width: mePct + "%" }} />
      <div className="avg" style={{ left: `calc(${avgPct}% - 1px)` }}
        title={"TB sinh viên: " + fmt(benchmark)} />
    </div>
  );
}

// ====== BalanceSparkline — cumulative balance line inside the hero card ======
function BalanceSparkline({ points, totalDays = 31 }) {
  if (!points || points.length < 2) return null;
  const W = 600, H = 150, PAD = 12;
  const vals = points.map(p => p.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const flat = max === min;
  const xOf = (p) => W * p.d / totalDays;
  const yOf = (v) => flat ? H * 0.55 : PAD + (H - PAD * 2) * (1 - (v - min) / (max - min));
  const pts = points.map(p => ({ x: xOf(p), y: yOf(p.v) }));
  let line = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[i - 1], p1 = pts[i];
    const cx = (p0.x + p1.x) / 2;
    line += ` C ${cx} ${p0.y}, ${cx} ${p1.y}, ${p1.x} ${p1.y}`;
  }
  const last = pts[pts.length - 1];
  const area = line + ` L ${last.x} ${H} L ${pts[0].x} ${H} Z`;
  return (
    <svg className="hero-sparkline" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="heroSparkFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.14" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#heroSparkFill)" />
      <path d={line} fill="none" stroke="var(--accent)" strokeOpacity="0.55" strokeWidth="2"
        vectorEffect="non-scaling-stroke" strokeLinecap="round" />
    </svg>
  );
}

// ====== CategoryDonut — spending share ring for the overview category card ======
function CategoryDonut({ data, total, activeId, onHover, onSelect }) {
  const SIZE = 200, R = 78, STROKE = 24, STROKE_ACTIVE = 30;
  const C = 2 * Math.PI * R;
  const GAP = data.length > 1 ? 5 : 0;

  // Clamp tiny slices to a visible/hoverable arc, then rescale the rest
  const segments = useMemoC(() => {
    if (!data.length || total <= 0) return [];
    const MIN_LEN = 7;
    const usable = C - GAP * data.length;
    const raw = data.map(c => Math.max(MIN_LEN, usable * c.amount / total));
    const scale = usable / raw.reduce((s, v) => s + v, 0);
    let start = 0;
    return data.map((c, i) => {
      const len = raw[i] * scale;
      const seg = { ...c, len, start };
      start += len + GAP;
      return seg;
    });
  }, [data, total]);

  const active = activeId != null ? data.find(c => c.id === activeId) : null;

  return (
    <div className="cat-donut">
      <svg viewBox={`0 0 ${SIZE} ${SIZE}`} role="img" aria-label="Tỷ trọng chi tiêu theo danh mục">
        <g transform={`rotate(-90 ${SIZE / 2} ${SIZE / 2})`}>
          {segments.map(s => (
            <circle
              key={s.id}
              className={"cat-donut-seg" + (activeId == null ? "" : activeId === s.id ? " is-active" : " is-dimmed")}
              cx={SIZE / 2} cy={SIZE / 2} r={R}
              fill="none"
              stroke={s.color}
              strokeWidth={activeId === s.id ? STROKE_ACTIVE : STROKE}
              strokeDasharray={`${s.len} ${C - s.len}`}
              strokeDashoffset={-s.start}
              tabIndex={0}
              aria-label={`${s.name} · ${s.pct.toFixed(0)}%`}
              onMouseEnter={() => onHover && onHover(s.id)}
              onMouseLeave={() => onHover && onHover(null)}
              onFocus={() => onHover && onHover(s.id)}
              onBlur={() => onHover && onHover(null)}
              onClick={() => onSelect && onSelect(s.id)}
              onKeyDown={e => {
                if (e.key === "Enter" || e.key === " ") {
                  e.preventDefault();
                  onSelect && onSelect(s.id);
                }
              }}
            >
              <title>{`${s.name} · ${s.pct.toFixed(0)}%`}</title>
            </circle>
          ))}
        </g>
      </svg>
      <div className="cat-donut-center" aria-hidden="true">
        {active ? (
          <>
            <span className="cat-donut-center-label">{active.emoji} {active.name}</span>
            <span className="cat-donut-center-value num" style={{ color: active.color }}>{fmtShort(active.amount)}</span>
            <span className="cat-donut-center-sub">{active.pct.toFixed(0)}% tổng chi</span>
          </>
        ) : (
          <>
            <span className="cat-donut-center-label">Tổng chi</span>
            <span className="cat-donut-center-value num">{fmtShort(total)}</span>
            <span className="cat-donut-center-sub">{data.length} danh mục</span>
          </>
        )}
      </div>
    </div>
  );
}

const { useState, useEffect, useMemo, useRef, useCallback } = React;

function useCountup(target, duration = 850) {
  const [value, setValue] = useState(0);
  const rafRef  = useRef(null);
  const fromRef = useRef(0);

  useEffect(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    const from  = fromRef.current;
    const start = performance.now();
    const tick  = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const cur = Math.round(from + (target - from) * eased);
      setValue(cur);
      if (t < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        fromRef.current = target;
      }
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [target, duration]);

  return value;
}

    setRaw(digits);

  const handleBlur = () => setFocused(false);

    ? raw

// ====== Modal — centered dialog with overlay, Escape/backdrop close ======
// Rendered through a portal: page-level entrance animations keep a transform
// (fill-mode: forwards), which would otherwise trap position:fixed inside the page.
function Modal({ title, subtitle, onClose, children, footer, headerExtra, width = 560 }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);

  return ReactDOM.createPortal(
    <div className="modal-overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ maxWidth: width }} role="dialog" aria-modal="true" aria-label={title}>
        <div className="modal-head">
          <div className="modal-head-text">
            <div className="modal-title">{title}</div>
            {subtitle && <div className="modal-subtitle">{subtitle}</div>}
          </div>
          <div className="modal-head-tools">
            {headerExtra}
            <button className="modal-close" onClick={onClose} aria-label="Đóng" title="Đóng">
              <Icons.x size={15} />
            </button>
          </div>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>,
    document.body
  );
}

// ====== TabBar — segmented control with sliding indicator ======
function TabBar({ tabs, active, onChange, style, className }) {
  const indicRef = useRef(null);
  const barRef   = useRef(null);

  useEffect(() => {
    const indic = indicRef.current;
    const bar   = barRef.current;
    if (!indic || !bar) return;
    const el = bar.querySelector(`[data-tab="${active}"]`);
    if (!el) return;
    indic.style.left    = el.offsetLeft + 'px';
    indic.style.width   = el.offsetWidth + 'px';
    indic.style.opacity = '1';
  }, [active]);

  return (
    <div className={"tx-tabs " + (className || "")} ref={barRef} style={style}>
      <div className="tab-indicator" ref={indicRef} style={{ opacity: 0 }} />
      {tabs.map(t => (
        <button
          key={t.id}
          data-tab={t.id}
          className={"tx-tab" + (active === t.id ? " active" : "") + (t.cls ? " " + t.cls : "")}
          onClick={() => onChange(t.id)}
          style={t.btnStyle}
        >
          {t.icon && <t.icon size={13} />}
          {t.label}
          {t.count != null && <span className="tx-tab-count">{t.count}</span>}
        </button>
      ))}
    </div>
  );
}

        color: CATEGORIES[cat]?.color || "#8E8E93",
        emoji: CATEGORIES[cat]?.emoji || "📦",
        amount,
        pct: expense > 0 ? (amount / expense) * 100 : 0,
      }))
      .sort((a, b) => b.amount - a.amount);
  }, [transactions, expense]);

  const dailyFlow = useMemo(() => {
    const flow = {};
    transactions.forEach(t => {
      const day = new Date(t.date + 'T00:00:00').getDate();
      if (!flow[day]) flow[day] = { d: day, inc: 0, exp: 0 };
      if (t.type === "income") flow[day].inc += t.amount;
      else flow[day].exp += t.amount;
    });
    return Object.values(flow).sort((a, b) => a.d - b.d);
  }, [transactions]);

  const sixMonths = useMemo(() => {
    return Array.from({ length: 6 }, (_, i) => {
      const d = new Date(viewYear, viewMonth - (5 - i), 1);
      const m = d.getMonth();
      const y = d.getFullYear();
      const label = `T${m + 1}/${String(y).slice(2)}`;
      const txns = allTransactions.filter(t => {
        const td = new Date(t.date + 'T00:00:00');
        return td.getMonth() === m && td.getFullYear() === y;
      });
      return {
        label,
        inc: txns.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0),
        exp: txns.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0),
      };
    });
  }, [allTransactions, viewMonth, viewYear]);

  const currentLabel = `T${viewMonth + 1}/${String(viewYear).slice(2)}`;
  const currentMonthIndex = sixMonths.findIndex(m => m.label === currentLabel);
  const currentMonthSummary = sixMonths.find(m => m.label === currentLabel) || { inc: 0, exp: 0 };
  const previousMonthSummary = currentMonthIndex > 0 ? sixMonths[currentMonthIndex - 1] : null;
  const spendingRatio = currentMonthSummary.inc > 0
    ? (currentMonthSummary.exp / currentMonthSummary.inc) * 100
    : (currentMonthSummary.exp > 0 ? 101 : 0);
  const spendingRatioLabel = currentMonthSummary.inc > 0
    ? formatPercent(spendingRatio)
    : (currentMonthSummary.exp > 0 ? ">100%" : "0,0%");
  const spendingProgress = Math.min(100, Math.max(0, spendingRatio));
  const spendingRatioTone = getSpendingRatioTone(spendingRatio);
  const spendingRatioMessage = getSpendingRatioMessage(spendingRatio, currentMonthSummary.inc, currentMonthSummary.exp);
  const incomeChangeText = previousMonthSummary ? formatChangeText("Thu", currentMonthSummary.inc, previousMonthSummary.inc) : null;
  const expenseChangeText = previousMonthSummary ? formatChangeText("Chi", currentMonthSummary.exp, previousMonthSummary.exp) : null;
  const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();

  const openOwe   = debts.filter(d => d.type === "owe"  && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openOwed  = debts.filter(d => d.type === "lend" && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openDebts = debts.filter(d => !d.settled);
  const today = new Date();
  const isCurrentView = today.getMonth() === viewMonth && today.getFullYear() === viewYear;
  const balanceLabel = "Tổng số dư";
  const daysElapsed = isCurrentView ? Math.max(1, Math.min(today.getDate(), daysInMonth)) : daysInMonth;
  const balanceSeries = useMemo(() => {
    const byDay = new Map(dailyFlow.map(f => [f.d, f]));
    let running = openingBalance;
    const pts = [{ d: 0, v: running }];
    for (let day = 1; day <= daysElapsed; day++) {
      const f = byDay.get(day);
      if (f) running += (f.inc || 0) - (f.exp || 0);
      pts.push({ d: day, v: running });
    }
    return pts;
  }, [dailyFlow, openingBalance, daysElapsed]);
  const fixedPaceExpense = transactions
    .filter(t => t.type === "expense" && FIXED_PACE_CATEGORIES.has(t.cat))
    .reduce((s, t) => s + t.amount, 0);
  const variablePaceExpense = Math.max(0, expense - fixedPaceExpense);
  const dailyPace = variablePaceExpense > 0 ? variablePaceExpense / daysElapsed : 0;
  const projectedExpense = expense > 0 ? fixedPaceExpense + dailyPace * daysInMonth : 0;
  const budgetWatch = budgets
    .map(b => {
      const actual = transactions
        .filter(t => t.type === "expense" && t.cat === b.cat)
        .reduce((s, t) => s + t.amount, 0);
      return { ...b, actual, pct: b.cap > 0 ? (actual / b.cap) * 100 : 0 };
    })
    .filter(b => b.pct >= 80)
    .sort((a, b) => b.pct - a.pct)[0];
  const insightTone = remaining < 0 ? "red" : savingsRate >= 20 ? "green" : savingsRate >= 5 ? "blue" : "orange";
  const paceTone = projectedExpense > income && income > 0 ? "orange" : "indigo";
  const budgetTone = budgetWatch?.pct >= 100 ? "red" : budgetWatch ? "orange" : "green";

  const handleAddQuickTx = () => {
    if (!addTxDesc.trim() || addTxAmount <= 0) return;
    if (onAddTransaction) {
      onAddTransaction({
        type: addTxType,
        desc: addTxDesc.trim(),
        amount: addTxAmount,
        cat: addTxType === "expense" ? addTxCat : "Thu nhập",
        date: addTxDate,
      });
    }
    setAddTxDesc("");
    setAddTxAmount(0);
    setAddTxCat(Object.keys(CATEGORIES)[0] || "Ăn uống");
    setAddTxDate(new Date().toISOString().slice(0, 10));
    setShowAddTx(false);
  };

  const handleSaveGoal = (g) => {
    onSaveGoal(g);
    setEditingGoal(null);
  };

  return (
    <div className="page overview-page">
      <div className="overview-hero">
        <section className="hero-balance stagger stagger-1" aria-label={balanceLabel}>
          <div className="hero-bg" aria-hidden="true" />
          <div className="hero-balance-head">
            <button className="hero-balance-nav" onClick={() => onNavigate && onNavigate("transactions")} aria-label="Đến giao dịch">

              <Icons.chevRight size={14} className="hero-nav-chevron" />
            </button>
            {onMonthChange && (
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div className="hero-month-picker">
                  <button onClick={() => onMonthChange(1)} aria-label="Tháng trước"><Icons.chevLeft size={13} /></button>
                  <span className="hero-month-label">{monthLabel}</span>
                  <button onClick={() => onMonthChange(-1)} aria-label="Tháng sau"><Icons.chevRight size={13} /></button>

                <button
                  ref={heroSettingsRef}

                  onClick={handleSettingsToggle}

                </button>
              </div>
            )}
          </div>
          <div className="hero-balance-value num">{fmt(closingBalanceAnim)}</div>
          <div className="hero-balance-sub">
            {finalBalance >= 0 ? "Còn lại sau chi tiêu" : "Đang âm sau chi tiêu"} · {monthLabel}
          </div>
          <div className="hero-chips">
            <div className="hero-chip">
              <span className="hero-chip-label"><Icons.wallet size={12} /> Dư đầu tháng</span>
              <span className="hero-chip-value num">{fmt(openingBalanceAnim)}</span>

            </div>
            <div className="hero-chip">

            </div>
            <div className="hero-chip" role="button" tabIndex={0} style={{ cursor: "pointer" }}

        <div className="overview-insights overview-hero-insights">

        <div onClick={() => onNavigate && onNavigate("budget")} style={{ cursor: "pointer" }}>

        </div>
        </div>
        {noteOpen && (
          <Modal
            title="Ghi chú tháng này"

            footer={
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>

        {showAddTx && (

      <div className="overview-dashboard-grid">

              <div className="debt-card-value num">{fmt(openOwed)}</div>
              <div className="debt-card-sub">{debts.filter(d => d.type === "lend" && !d.settled).length} khoản chưa thu</div>
            </div>
          </div>
          <div className="debt-list overview-debt-list">
            {openDebts.length === 0 ? (
              <Empty icon="check" title="Sạch nợ!" text="Không có khoản nợ nào đang mở" />
            ) : (
              openDebts.map(d => {
                const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
                const color = debtColor(d.id);
                return (
                  <div className="debt-row" key={d.id}>

                    <div className="debt-info">
                      <span className="debt-name">{d.name}</span>
                      <span className="debt-note">{d.note}</span>
                    </div>
                    <span className={"debt-amount num " + (d.type === "owe" ? "owe" : "owed")}>{fmt(d.amount)}</span>
                  </div>
                );
              })
            )}
          </div>
        </div>
      </div>
      {heroSettingsOpen && settingsBtnPos && ReactDOM.createPortal(
        <div
          ref={portalDropdownRef}
          className="settings-dropdown"
          style={{ position: "fixed", top: settingsBtnPos.top, right: settingsBtnPos.right, zIndex: 9999 }}
        >
          <div className="settings-section-label">Giao diện</div>
          <div className="settings-row">
            <button className={"settings-opt-btn" + (theme === "light" ? " active" : "")} onClick={() => onTheme("light")}>

            <button className={"settings-opt-btn" + (theme === "dark" ? " active" : "")} onClick={() => onTheme("dark")}>
              <Icons.moon size={13} /> Tối
            </button>
          </div>
          <div className="settings-divider" />
          <div className="settings-section-label">Ngôn ngữ</div>
          <div className="settings-row">
            <button className={"settings-opt-btn" + (lang === "vi" ? " active" : "")} onClick={() => onLang("vi")}>
              🇻🇳 Tiếng Việt
            </button>
            <button className={"settings-opt-btn" + (lang === "en" ? " active" : "")} onClick={() => onLang("en")}>
              🇺🇸 English
            </button>
          </div>
        </div>,
        document.body
      )}
    </div>
  );

const TX_WEEKDAYS = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
const TX_AMOUNT_STEPS = [10000, 20000, 50000, 100000];

const txLocalIso = (d) =>
  `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

function txDayLabel(iso) {
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  if (iso === txLocalIso(today)) return "Hôm nay";
  if (iso === txLocalIso(yesterday)) return "Hôm qua";
  const d = new Date(iso + "T00:00:00");
  return `${TX_WEEKDAYS[d.getDay()]}, ${fmtDate(iso)}`;
}

// ====== CategoryManagerModal — add / rename / recolor / delete categories ======
function CategoryManagerModal({ usageCounts, onSave, onClose }) {
  const [rows, setRows] = useState(() =>
    Object.values(CATEGORIES).map(c => ({ key: c.name, name: c.name, emoji: c.emoji, color: c.color }))
  );
  const [paletteIdx, setPaletteIdx] = useState(null);
  const [error, setError] = useState("");
  const pendingFocusIdx = useRef(null);
  const lockedSet = new Set(SYSTEM_CATEGORIES);

  useEffect(() => {
    if (pendingFocusIdx.current == null) return;
    const idx = pendingFocusIdx.current;
    requestAnimationFrame(() => {
      const row = document.querySelector(`[data-cat-row="${idx}"]`);
      const input = row?.querySelector(".cat-editor-name");
      if (input) {
        input.focus();
        input.scrollIntoView({ block: "nearest" });
      }
      pendingFocusIdx.current = null;
    });
  }, [rows.length]);

  const updateRow = (idx, patch) => {
    setError("");
    setRows(rs => rs.map((r, i) => (i === idx ? { ...r, ...patch } : r)));
  };
  const addRow = () => {
    setError("");
    pendingFocusIdx.current = rows.length;
    setRows(rs => [...rs, { key: null, name: "", emoji: "📦", color: CAT_PALETTE[rs.length % CAT_PALETTE.length] }]);
  };
  const removeRow = (idx) => {
    setError("");
    setPaletteIdx(null);
    setRows(rs => rs.filter((_, i) => i !== idx));
  };

  const keptKeys = new Set(rows.filter(r => r.key).map(r => r.key));
  const removedInUse = Object.keys(CATEGORIES)
    .filter(name => !keptKeys.has(name) && (usageCounts[name] || 0) > 0);
  const movedCount = removedInUse.reduce((s, name) => s + usageCounts[name], 0);

  const handleSave = () => {
    const cleaned = rows.map(r => ({ ...r, name: r.name.trim() }));
    if (cleaned.some(r => !r.name)) { setError("Tên danh mục không được để trống"); return; }
    const names = cleaned.map(r => r.name);
    if (new Set(names).size !== names.length) { setError("Tên danh mục bị trùng nhau"); return; }
    if (names.includes("Thu nhập")) { setError("“Thu nhập” là tên dành riêng, không dùng cho danh mục chi"); return; }
    const renames = {};
    cleaned.forEach(r => { if (r.key && r.key !== r.name) renames[r.key] = r.name; });
    const removed = Object.keys(CATEGORIES).filter(name => !keptKeys.has(name));
    onSave(cleaned.map(({ name, emoji, color }) => ({ name, emoji: emoji || "📦", color })), renames, removed);
    onClose();
  };

  return (
    <Modal
      title="Sửa danh mục"
      subtitle="Đổi tên, biểu tượng, màu hoặc thêm danh mục mới"
      onClose={onClose}
      headerExtra={
        <button className="quick-template-tool" onClick={addRow}>
          <Icons.plus size={13} /> Thêm
        </button>
      }
      footer={
        <>
          {error && <div className="modal-error">{error}</div>}
          <button className="btn btn-secondary modal-btn" onClick={onClose}>Hủy</button>
          <button className="btn modal-btn" onClick={handleSave}><Icons.check size={14} /> Lưu</button>
        </>
      }
    >
      <div className="cat-editor">
        {rows.map((r, idx) => {
          const locked = r.key && lockedSet.has(r.key);
          const usage = r.key ? usageCounts[r.key] || 0 : 0;
          return (
            <React.Fragment key={r.key || `new-${idx}`}>
              <div className="cat-editor-row" data-cat-row={idx}>
                <input
                  className="input cat-editor-emoji"
                  value={r.emoji}
                  maxLength={4}
                  aria-label="Biểu tượng"
                  onChange={e => updateRow(idx, { emoji: e.target.value })}
                />
                <input
                  className="input cat-editor-name"
                  value={r.name}
                  placeholder="Tên danh mục"
                  disabled={Boolean(locked)}
                  title={locked ? "Danh mục hệ thống — không thể đổi tên" : undefined}
                  onChange={e => updateRow(idx, { name: e.target.value })}
                />
                <button
                  className="cat-editor-color"
                  style={{ background: r.color }}
                  title="Đổi màu"
                  aria-label="Đổi màu"
                  onClick={() => setPaletteIdx(p => (p === idx ? null : idx))}
                />
                <span className="cat-editor-usage num" title={usage > 0 ? `${usage} giao dịch đang dùng` : undefined}>
                  {usage > 0 ? usage : ""}
                </span>
                {locked ? (
                  <span className="cat-editor-lock" title="Danh mục hệ thống — không thể xóa" aria-label="Danh mục hệ thống">🔒</span>
                ) : (
                  <button className="cat-editor-delete" onClick={() => removeRow(idx)} title="Xóa danh mục">
                    <Icons.trash size={13} />
                  </button>
                )}
              </div>
              {paletteIdx === idx && (
                <div className="cat-editor-palette">
                  {CAT_PALETTE.map(c => (
                    <button
                      key={c}
                      className={"cat-swatch" + (r.color === c ? " active" : "")}
                      style={{ background: c }}
                      aria-label={"Màu " + c}
                      onClick={() => { updateRow(idx, { color: c }); setPaletteIdx(null); }}
                    />
                  ))}
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>
      {removedInUse.length > 0 && (
        <div className="cat-editor-warning">
          <Icons.alertTri size={13} />
          <span>
            <b className="num">{movedCount}</b> giao dịch thuộc {removedInUse.map(n => `"${n}"`).join(", ")} sẽ chuyển sang "Khác" khi lưu
          </span>
        </div>
      )}
    </Modal>
  );
}

// ====== QuickTemplateModal — edit quick-entry templates in a dialog ======
function QuickTemplateModal({ templates, normalize, onSave, onClose }) {
  const [rows, setRows] = useState(() => templates.map(t => ({ ...t })));
  const pendingFocusId = useRef(null);

  useEffect(() => {
    if (!pendingFocusId.current) return;
    const id = pendingFocusId.current;
    requestAnimationFrame(() => {
      const row = document.querySelector(`[data-quick-template-id="${id}"]`);
      const input = row?.querySelector(".quick-template-name");
      if (input) {
        input.focus();
        input.select();
        input.scrollIntoView({ block: "nearest" });
      }
      pendingFocusId.current = null;
    });
  }, [rows.length]);

  const updateRow = (id, patch) => {
    setRows(rs => rs.map(r => {
      if (r.id !== id) return r;
      const next = { ...r, ...patch };
      if (patch.label != null && patch.desc == null) next.desc = patch.label;
      if (patch.type === "income") next.cat = "Thu nhập";
      if (patch.type === "expense" && r.type === "income") next.cat = Object.keys(CATEGORIES)[0] || "Khác";
      return next;
    }));
  };
  const addRow = () => {
    const id = `tpl-${Date.now()}`;
    pendingFocusId.current = id;
    setRows(rs => [...rs, { id, label: "", type: "expense", desc: "", amount: 10000, cat: Object.keys(CATEGORIES)[0] || "Khác" }]);
  };
  const removeRow = (id) => setRows(rs => rs.filter(r => r.id !== id));

  const handleSave = () => {
    onSave(rows.map((t, i) => normalize(t, i)));
    onClose();
  };

  return (
    <Modal
      title="Sửa mẫu nhanh"
      subtitle="Mẫu giúp điền sẵn form chỉ với một chạm"
      onClose={onClose}
      headerExtra={
        <button className="quick-template-tool" onClick={addRow}>
          <Icons.plus size={13} /> Thêm
        </button>
      }
      footer={
        <>
          <button className="btn btn-secondary modal-btn" onClick={onClose}>Hủy</button>
          <button className="btn modal-btn" onClick={handleSave}><Icons.check size={14} /> Lưu</button>
        </>
      }
    >
      {rows.length === 0 ? (
        <Empty icon="inbox" title="Chưa có mẫu nào" text="Bấm Thêm để tạo mẫu đầu tiên" />
      ) : (
        <div className="quick-template-editor">
          {rows.map(tpl => (
            <div
              className={"quick-template-edit-row " + tpl.type}
              key={tpl.id}
              data-quick-template-id={tpl.id}
            >
              <input
                className="input quick-template-name"
                value={tpl.label}
                placeholder="Tên mẫu"
                onChange={e => updateRow(tpl.id, { label: e.target.value })}
              />
              <select
                className="select quick-template-type"
                value={tpl.type}
                onChange={e => updateRow(tpl.id, { type: e.target.value })}
              >
                <option value="expense">Chi</option>
                <option value="income">Thu</option>
              </select>
              <MoneyInput
                value={tpl.amount}
                onChange={value => updateRow(tpl.id, { amount: value })}
              />
              {tpl.type === "expense" && (
                <select
                  className="select quick-template-cat"
                  value={tpl.cat}
                  onChange={e => updateRow(tpl.id, { cat: e.target.value })}
                >
                  {Object.values(CATEGORIES).map(c => (
                    <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>
                  ))}
                </select>
              )}
              <button className="quick-template-delete" onClick={() => removeRow(tpl.id)} title="Xóa mẫu">
                <Icons.trash size={13} />
              </button>
            </div>
          ))}
        </div>
      )}
    </Modal>
  );
}

const SORT_OPTIONS = [
  { value: "date-desc", label: "Mới nhất" },
  { value: "date-asc",  label: "Cũ nhất" },
  { value: "amount-desc", label: "Tiền cao" },
  { value: "amount-asc",  label: "Tiền thấp" },
];

function SortDropdown({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [menuPos, setMenuPos] = useState({ top: 0, right: 0 });
  const btnRef = useRef(null);
  const label = SORT_OPTIONS.find(o => o.value === value)?.label ?? "Sắp xếp";

  const openMenu = () => {
    if (btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      setMenuPos({ top: r.bottom + 6, right: window.innerWidth - r.right });
    }
    setOpen(true);
  };

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (btnRef.current && !btnRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const menu = open && ReactDOM.createPortal(
    <div
      className="sort-dropdown-menu"
      style={{ top: menuPos.top, right: menuPos.right }}
      onMouseDown={e => e.stopPropagation()}
    >
      {SORT_OPTIONS.map(o => (
        <button
          key={o.value}
          className={"sort-dropdown-item" + (o.value === value ? " active" : "")}
          onClick={() => { onChange(o.value); setOpen(false); }}
        >
          {o.label}
        </button>
      ))}
    </div>,
    document.body
  );

  return (
    <>
      <button className="sort-dropdown-btn" ref={btnRef} onClick={openMenu}>
        {label} <Icons.chevDown size={11} />
      </button>
      {menu}
    </>
  );
}

function Transactions({ transactions, allTransactions = [], onAddTransaction, onUpdateTransaction, onDeleteTransaction, onSaveCategories, monthLabel }) {
  const [mode, setMode] = useState("expense");
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState(0);
  const [date, setDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [cat, setCat] = useState("Ăn uống");
  const [search, setSearch] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("all");
  const [sortMode, setSortMode] = useState("date-desc");
  const [justAdded, setJustAdded] = useState(false);
  const [btnSuccess, setBtnSuccess] = useState(false);
  const [editingTx, setEditingTx] = useState(null);
  const [showCatModal, setShowCatModal] = useState(false);
  const [showTemplateModal, setShowTemplateModal] = useState(false);
  const formRef = useRef(null);
  const firstExpenseCat = Object.keys(CATEGORIES)[0] || cat;
  const incomeCat = "Thu nhập";

  const incomeList = transactions.filter(t => t.type === "income");
  const expenseList = transactions.filter(t => t.type === "expense");
  const list = mode === "income" ? incomeList : expenseList;
  const categoryCounts = useMemo(() => {
    const counts = {};
    expenseList.forEach(t => {
      if (!t.cat) return;
      counts[t.cat] = (counts[t.cat] || 0) + 1;
    });
    return counts;
  }, [transactions]);
  const categoryOptions = useMemo(() =>
    Object.values(CATEGORIES).filter(c => categoryCounts[c.name]),
  [categoryCounts]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    const byDateDesc = (a, b) => (b.date || "").localeCompare(a.date || "") || String(b.id).localeCompare(String(a.id));
    const byDateAsc = (a, b) => (a.date || "").localeCompare(b.date || "") || String(a.id).localeCompare(String(b.id));
    const next = list.filter(t => {
      const matchesSearch = !q ||
        (t.desc || "").toLowerCase().includes(q) ||
        (t.cat && t.cat.toLowerCase().includes(q));
      const matchesCategory = mode !== "expense" ||
        categoryFilter === "all" ||
        t.cat === categoryFilter;
      return matchesSearch && matchesCategory;
    });

    return [...next].sort((a, b) => {
      if (sortMode === "date-asc") return byDateAsc(a, b);
      if (sortMode === "amount-desc") return (b.amount - a.amount) || byDateDesc(a, b);
      if (sortMode === "amount-asc") return (a.amount - b.amount) || byDateDesc(a, b);
      return byDateDesc(a, b);
    });
  }, [search, list, mode, categoryFilter, sortMode]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(t => {
      const k = t.date;
      g[k] = g[k] || [];
      g[k].push(t);
    });
    return Object.entries(g).sort(([a], [b]) => {
      if (sortMode === "date-asc") {
        if (a > b) return 1;
        if (a < b) return -1;
        return 0;
      }
      if (b > a) return 1;
      if (b < a) return -1;
      return 0;
    });
  }, [filtered, sortMode]);

  const filteredTotal = filtered.reduce((s, t) => s + t.amount, 0);
  const maxDayTotal = useMemo(() =>
    grouped.reduce((max, [, items]) => Math.max(max, items.reduce((s, t) => s + t.amount, 0)), 0),
  [grouped]);
  const hasListFilters = Boolean(search.trim()) ||
    (mode === "expense" && categoryFilter !== "all") ||
    sortMode !== "date-desc";
  const quickTemplateStorageKey = "fintrack-quick-templates-v1";

  const catUsageCounts = useMemo(() => {
    const counts = {};
    allTransactions.forEach(t => {
      if (!t.cat || t.cat === incomeCat) return;
      counts[t.cat] = (counts[t.cat] || 0) + 1;
    });
    return counts;
  }, [allTransactions]);

  // Keep form/filter selections valid after categories are renamed or deleted
  useEffect(() => {
    if (!CATEGORIES[cat]) setCat(Object.keys(CATEGORIES)[0] || "Khác");
    if (categoryFilter !== "all" && !CATEGORIES[categoryFilter]) setCategoryFilter("all");
  });

  const defaultQuickTemplates = useMemo(() => {
    const cats = Object.keys(CATEGORIES);
    return [
      { id: "lunch", label: "Ăn trưa", type: "expense", desc: "Ăn trưa", amount: 35000, cat: cats[0] || firstExpenseCat },
      { id: "water", label: "Nước", type: "expense", desc: "Nước uống", amount: 10000, cat: cats[0] || firstExpenseCat },
      { id: "grab", label: "Grab", type: "expense", desc: "Grab", amount: 25000, cat: cats[1] || firstExpenseCat },
      { id: "badminton", label: "Cầu lông", type: "expense", desc: "Cầu lông", amount: 80000, cat: cats[8] || firstExpenseCat },
      { id: "mom-transfer", label: "Mẹ chuyển", type: "income", desc: "Mẹ chuyển", amount: 1000000, cat: incomeCat },
    ];
  }, [firstExpenseCat, incomeCat]);
  const [savedQuickTemplates, setSavedQuickTemplates] = useState(null);
  const quickTemplates = savedQuickTemplates || defaultQuickTemplates;

  const normalizeQuickTemplate = (tpl, idx = 0, options = {}) => {
    const { allowEmptyLabel = false } = options;
    const type = tpl.type === "income" ? "income" : "expense";
    const rawLabel = String(tpl.label ?? tpl.desc ?? "");
    const label = allowEmptyLabel ? rawLabel : (rawLabel.trim() || "Mẫu mới");
    return {
      id: tpl.id || `${Date.now()}-${idx}`,
      label,
      type,
      desc: String(tpl.desc || label).trim() || label,
      amount: Number(tpl.amount) || 0,
      cat: type === "income" ? incomeCat : (tpl.cat || firstExpenseCat),
    };
  };

  useEffect(() => {
    try {
      const raw = localStorage.getItem(quickTemplateStorageKey);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed)) {
        setSavedQuickTemplates(parsed.map(normalizeQuickTemplate));
      }
    } catch (_) {
      setSavedQuickTemplates(null);
    }
  }, []);

  useEffect(() => {
    if (!savedQuickTemplates) return;
    try {
      localStorage.setItem(quickTemplateStorageKey, JSON.stringify(savedQuickTemplates));
    } catch (_) {}
  }, [savedQuickTemplates]);

  useEffect(() => {
    if (mode === "income" && categoryFilter !== "all") {
      setCategoryFilter("all");
    }
  }, [mode, categoryFilter]);

  const clearDraft = () => {
    setDesc("");
    setAmount(0);
    setDate(new Date().toISOString().slice(0, 10));
    setEditingTx(null);
  };

  const applyTemplate = (tpl) => {
    setEditingTx(null);
    setMode(tpl.type);
    setDesc(tpl.desc || tpl.label || "");
    setAmount(Number(tpl.amount) || 0);
    if (tpl.type === "expense") setCat(tpl.cat || firstExpenseCat);
    setDate(new Date().toISOString().slice(0, 10));
  };

  const startEdit = (tx) => {
    setEditingTx(tx);
    setMode(tx.type || "expense");
    setDesc(tx.desc || "");
    setAmount(tx.amount || 0);
    setCat(tx.type === "expense" ? (tx.cat || firstExpenseCat) : firstExpenseCat);
    setDate(tx.date || new Date().toISOString().slice(0, 10));
    formRef.current?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  };

  const cancelEdit = () => clearDraft();

  const handleSubmit = () => {
    if (!desc.trim() || amount <= 0) return;
    if (editingTx) {
      onUpdateTransaction && onUpdateTransaction(editingTx.id, {
        type: mode,
        desc: desc.trim(),
        amount,
        cat: mode === "expense" ? cat : incomeCat,
        date,
      });
      clearDraft();
      return;
    }
    onAddTransaction({
      type: mode,
      desc: desc.trim(),
      amount,
      cat: mode === "expense" ? cat : incomeCat,
      date,
    });
    setDesc("");
    setAmount(0);
    setJustAdded(true);
    setBtnSuccess(true);
    setTimeout(() => setJustAdded(false), 700);
    setTimeout(() => setBtnSuccess(false), 650);
  };

  const clearListFilters = () => {
    setSearch("");
    setCategoryFilter("all");
    setSortMode("date-desc");
  };

  return (
    <div className="page tx-page fade-in">
      <PageHeader greet={`${monthLabel} · ${transactions.length} giao dịch`} />

      <div className="tx-layout">
        {/* ===== LEFT: form + summary ===== */}
        <aside className="tx-aside">
          <div ref={formRef} className="card tx-form-card stagger stagger-1" style={{ scrollMarginTop: 80 }}>
            <div className="card-header" style={{ marginBottom: 14 }}>
              <div>
                <div className="card-title">{editingTx ? "Sửa giao dịch" : "Thêm giao dịch"}</div>
                <div className="card-subtitle">{editingTx ? "Cập nhật lại thông tin giao dịch" : "Ghi lại ngay để không quên"}</div>
              </div>
              {editingTx && (
                <button className="btn btn-secondary tx-cancel-edit" onClick={cancelEdit}>
                  <Icons.x size={14} /> Hủy
                </button>
              )}
            </div>

            <div className="tx-tabs" style={{ marginBottom: 14, width: "100%" }}>
              <button
                className={"tx-tab" + (mode === "income" ? " active income" : "")}
                onClick={() => setMode("income")}
                style={{ flex: 1, justifyContent: "center" }}
              >
                <Icons.arrowDownLeft size={13} /> Thu nhập
              </button>
              <button
                className={"tx-tab" + (mode === "expense" ? " active expense" : "")}
                onClick={() => setMode("expense")}
                style={{ flex: 1, justifyContent: "center" }}
              >
                <Icons.arrowUpRight size={13} /> Chi tiêu
              </button>
            </div>

            <div className="tx-form-vertical">
              <div className="quick-templates">
                <div className="quick-template-head">
                  <div className="quick-template-label">Mẫu nhanh</div>
                  <div className="quick-template-tools">
                    <button className="quick-template-tool" onClick={() => setShowTemplateModal(true)}>
                      <Icons.pencil size={13} /> Sửa
                    </button>
                  </div>
                </div>
                <div className="quick-template-list">
                  {quickTemplates.map(tpl => (
                    <button
                      key={tpl.id}
                      className={"quick-template-btn " + tpl.type}
                      onClick={() => applyTemplate(tpl)}
                    >
                      <span>{tpl.label || tpl.desc || "Mẫu mới"}</span>
                      <span className="num">{fmtShort(tpl.amount)}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div className="field">
                <span className="field-label">Mô tả</span>
                <input
                  className="input" type="text"
                  placeholder={mode === "income" ? "VD: Lương, mẹ chuyển..." : "VD: Cơm tấm, Grab, sách..."}
                  value={desc}
                  onChange={e => setDesc(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleSubmit()}
                />
              </div>
              <div className="field tx-amount-field">
                <span className="field-label">Số tiền</span>
                <MoneyInput value={amount} onChange={setAmount} />

                    >

                    </button>
                  ))}
                </div>
              </div>
              {mode === "expense" && (

                  <div className="field-label-row">
                    <span className="field-label">Danh mục</span>
                    <button className="quick-template-tool" onClick={() => setShowCatModal(true)}>
                      <Icons.pencil size={12} /> Sửa
                    </button>
                  </div>
                  <div className="cat-grid">
                    {Object.values(CATEGORIES).map(c => (
                      <button

                        className={"cat-grid-chip" + (cat === c.name ? " active" : "")}
                        style={{ "--cat-color": c.color, "--cat-tint": c.color + "26" }}
                        onClick={() => setCat(c.name)}
                      >
                        <span aria-hidden="true">{c.emoji}</span>
                        {c.name}

                  </div>
                </div>

          </div>

          <div className="card tx-list-card stagger stagger-3">

              <Empty icon="inbox" title="Chưa có giao dịch"
                text={`Thêm ${mode === "income" ? "thu nhập" : "chi tiêu"} đầu tiên ở panel bên trái`} />
            ) : filtered.length === 0 ? (
              <Empty icon="search" title="Không tìm thấy" text="Thử từ khóa khác hoặc xóa bộ lọc" />
            ) : (
              grouped.map(([day, items], groupIdx) => {
                const total = items.reduce((s, t) => s + t.amount, 0);
                const barPct = maxDayTotal > 0 ? (total / maxDayTotal) * 100 : 0;
                return (
                  <div key={day}>
                    <div className={"tx-day-head" + (mode === "income" ? " income" : "")}>
                      <div className="tx-day-label">
                        <span className="tx-day-name">{txDayLabel(day)}</span>
                        <span className={"num tx-day-total" + (mode === "income" ? " in" : "")}>
                          {mode === "income" ? "+" : ""}{fmt(total)}
                        </span>
                      </div>
                      <div className="tx-day-bar" aria-hidden="true">
                        <span style={{ width: barPct + "%" }} />
                      </div>
                    </div>
                    <div className="tx-list">
                      {items.map((t, itemIdx) => {
                        const catInfo = t.cat ? CATEGORIES[t.cat] : null;
                        const bg = catInfo ? catInfo.color + "20" : "rgba(52,199,89,0.15)";
                        const fg = catInfo ? catInfo.color : "var(--c-green)";
                        const isNew = justAdded && groupIdx === 0 && itemIdx === 0;
                        const isEditing = editingTx && editingTx.id === t.id;
                        return (
                          <div
                            className={"tx-row" + (isNew ? " tx-row-new" : "") + (isEditing ? " is-editing" : "")}
                            key={t.id}
                            style={{ "--row-tint": catInfo ? catInfo.color + "14" : "rgba(52,199,89,0.10)" }}
                          >
                            <div className="tx-icon" style={{ background: bg, color: fg }}>
                              {catInfo ? catInfo.emoji : "💰"}
                            </div>
                            <div className="tx-info">
                              <span className="tx-desc">{t.desc}</span>
                              <span className="tx-meta">{catInfo ? catInfo.name : "Thu nhập"}</span>
                            </div>
                            <span className={"tx-amount " + (mode === "income" ? "in" : "out")}>
                              {mode === "income" ? "+" : "−"}{fmt(t.amount)}
                            </span>
                            <div className="tx-actions">
                              <button className="tx-edit" title="Sửa"
                                onClick={() => startEdit(t)}>
                                <Icons.pencil size={14} />
                              </button>
                              <button className="tx-delete" title="Xóa"
                                onClick={() => onDeleteTransaction && onDeleteTransaction(t.id)}>
                                <Icons.trash size={14} />
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      </div>

      {showCatModal && (
        <CategoryManagerModal
          usageCounts={catUsageCounts}
          onSave={(list, renames, removed) => onSaveCategories && onSaveCategories(list, renames, removed)}
          onClose={() => setShowCatModal(false)}
        />
      )}
      {showTemplateModal && (
        <QuickTemplateModal
          templates={quickTemplates}
          normalize={normalizeQuickTemplate}
          onSave={setSavedQuickTemplates}
          onClose={() => setShowTemplateModal(false)}
        />
      )}
    </div>
  );
}

function Debts({ debts, onAddDebt, onUpdateDebt, onDeleteDebt, onSettleDebt, onReopenDebt }) {
  const [filter, setFilter] = useState("all");
  const [name, setName] = useState("");
  const [amt, setAmt] = useState(0);
  const [type, setType] = useState("owe");
  const [note, setNote] = useState("");
  const [editingDebt, setEditingDebt] = useState(null);
  const [editName, setEditName] = useState("");
  const [editAmt, setEditAmt] = useState(0);
  const [editType, setEditType] = useState("owe");
  const [editNote, setEditNote] = useState("");

  const filtered = useMemo(() => {
    if (filter === "all")    return debts;
    if (filter === "paid")   return debts.filter(d => d.settled);
    if (filter === "owe")    return debts.filter(d => d.type === "owe"  && !d.settled);
    if (filter === "owed")   return debts.filter(d => d.type === "lend" && !d.settled);
    return debts;
  }, [filter, debts]);

  const openOwe  = debts.filter(d => d.type === "owe"  && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openOwed = debts.filter(d => d.type === "lend" && !d.settled).reduce((s, d) => s + d.amount, 0);
  const paidCount = debts.filter(d => d.settled).length;
  const oweCount  = debts.filter(d => d.type === "owe"  && !d.settled).length;
  const owedCount = debts.filter(d => d.type === "lend" && !d.settled).length;

  const handleAdd = () => {
    if (!name.trim() || amt <= 0) return;
    onAddDebt({ name: name.trim(), amount: amt, type, note: note.trim(), settled: false });
    setName(""); setAmt(0); setNote("");
  };

  const startEdit = (debt) => {
    setEditingDebt(debt);
    setEditName(debt.name || "");
    setEditAmt(debt.amount || 0);
    setEditType(debt.type || "owe");
    setEditNote(debt.note || "");
  };

  const cancelEdit = () => {
    setEditingDebt(null);
    setEditName("");
    setEditAmt(0);
    setEditType("owe");
    setEditNote("");
  };

  const saveEdit = () => {
    if (!editingDebt || !editName.trim() || editAmt <= 0) return;
    onUpdateDebt && onUpdateDebt(editingDebt.id, {
      name: editName.trim(),
      amount: editAmt,
      type: editType,
      note: editNote.trim(),
    });
    cancelEdit();
  };

  return (
    <div className="page">
      <PageHeader greet="Sổ nợ vay với bạn bè & dịch vụ" />

      <div className="stat-grid">
        <div className="stat" style={{ background: "linear-gradient(135deg, #FF3B30, #FF2D55)", color: "#fff", borderColor: "transparent" }}>
          <div className="hero-bg" />
          <div className="stat-label" style={{ color: "rgba(255,255,255,0.85)" }}>
            <Icons.arrowUpRight size={13} /> Bạn đang nợ
          </div>
          <div className="stat-value num">{fmt(openOwe)}</div>
          <div className="stat-sub" style={{ color: "rgba(255,255,255,0.8)" }}>
            {oweCount} khoản cần trả
          </div>
        </div>

        <div className="stat">
          <div className="stat-label" style={{ color: "var(--c-green)" }}>
            <Icons.arrowDownLeft size={13} /> Người khác nợ bạn
          </div>
          <div className="stat-value num">{fmt(openOwed)}</div>
          <div className="stat-sub">{owedCount} khoản chờ thu</div>
        </div>

        <div className="stat">
          <div className="stat-label">
            <Icons.check size={13} /> Đã xong
          </div>
          <div className="stat-value num">{paidCount}</div>
          <div className="stat-sub">khoản trong tháng</div>
        </div>
      </div>

      <div className="card" style={{ marginBottom: 18 }}>
        <div className="card-header">
          <div>
            <div className="card-title">Ghi nhận khoản nợ mới</div>
            <div className="card-subtitle">Theo dõi ai nợ ai để không quên</div>
          </div>
        </div>
        <div className="debt-form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", gap: 10, alignItems: "end" }}>
          <div className="field">
            <span className="field-label">Tên người</span>
            <input className="input" type="text" placeholder="VD: Nam, Hân, Shopee..."
              value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div className="field">
            <span className="field-label">Số tiền</span>
            <MoneyInput value={amt} onChange={setAmt} />
          </div>
          <div className="field">
            <span className="field-label">Loại</span>
            <select className="select" value={type} onChange={e => setType(e.target.value)}>
              <option value="owe">Mình nợ họ</option>
              <option value="lend">Họ nợ mình</option>
            </select>
          </div>
          <div className="field">
            <span className="field-label">Ghi chú</span>
            <input className="input" type="text" placeholder="VD: Tiền ăn hôm qua"
              value={note} onChange={e => setNote(e.target.value)} />
          </div>
          <button className="btn" style={{ height: 41 }} onClick={handleAdd}>
            <Icons.plus size={15} /> Thêm
          </button>
        </div>
      </div>

      <TabBar
        style={{ marginBottom: 14 }}
        active={filter}
        onChange={setFilter}
        tabs={[
          { id: "all",  label: `Tất cả (${debts.length})` },
          { id: "owe",  label: `Mình nợ (${oweCount})` },
          { id: "owed", label: `Họ nợ mình (${owedCount})` },
          { id: "paid", label: `Đã xong (${paidCount})` },
        ]}
      />

      <div className="card" style={{ padding: 14 }}>
        {filtered.length === 0 ? (
          <Empty icon="inbox" title="Không có khoản nợ" text="Tuyệt! Bạn đang sạch nợ." />
        ) : (
          <div className="debt-list">
            {filtered.map(d => {
              const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
              const color = debtColor(d.id);
              const isPaid = !!d.settled;
              const isEditing = editingDebt?.id === d.id;
              if (isEditing) {
                return (
                  <div className="debt-edit-item" key={d.id}>
                    <div className="debt-edit-grid">
                      <input className="input" type="text" value={editName} onChange={e => setEditName(e.target.value)} />
                      <MoneyInput value={editAmt} onChange={setEditAmt} />
                      <select className="select" value={editType} onChange={e => setEditType(e.target.value)}>
                        <option value="owe">Mình nợ họ</option>
                        <option value="lend">Họ nợ mình</option>
                      </select>
                      <input className="input" type="text" value={editNote} onChange={e => setEditNote(e.target.value)} placeholder="Ghi chú" />
                      <div className="debt-actions">
                        <button className="btn" style={{ padding: "8px 12px", fontSize: 12 }} onClick={saveEdit}>Lưu</button>
                        <button className="btn-secondary btn" style={{ padding: "8px 12px", fontSize: 12 }} onClick={cancelEdit}>Hủy</button>
                      </div>
                    </div>
                  </div>
                );
              }
              return (
                <div className={"debt-row" + (isPaid ? " paid" : "")} key={d.id}>
                  <div className="debt-avatar" style={{ background: color, opacity: isPaid ? 0.5 : 1 }}>
                    {initials}
                  </div>
                  <div className="debt-info">
                    <span className="debt-name">{d.name}</span>
                    <span className="debt-note">{d.note}</span>
                  </div>
                  <span className={"debt-amount num " + (d.type === "owe" ? "owe" : "owed")}>
                    {isPaid ? null : (d.type === "owe" ? "−" : "+")}{fmt(d.amount)}
                  </span>
                  {isPaid ? (
                    <div className="debt-actions">
                      <span className="debt-status-pill paid">
                        <Icons.check size={10} style={{ verticalAlign: "middle" }} /> Xong
                      </span>
                      <button className="btn-secondary btn debt-small-btn" onClick={() => onReopenDebt && onReopenDebt(d.id)}>
                        Mở lại
                      </button>
                      <button className="debt-icon-btn" title="Sửa" onClick={() => startEdit(d)}>
                        <Icons.pencil size={13} />
                      </button>
                    </div>
                  ) : (
                    <div className="debt-actions">
                      <button className="btn-secondary btn debt-small-btn" onClick={() => onSettleDebt && onSettleDebt(d.id)}>
                        {d.type === "owe" ? "Trả" : "Thu"}
                      </button>
                      <button className="debt-icon-btn" title="Sửa" onClick={() => startEdit(d)}>
                        <Icons.pencil size={13} />
                      </button>
                      <button className="tx-delete" title="Xóa"
                        onClick={() => onDeleteDebt && onDeleteDebt(d.id)}
                        style={{ opacity: 1, width: 28, height: 28 }}>
                        <Icons.trash size={13} />
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {openOwe > openOwed && openOwe > 0 && (
        <div style={{ marginTop: 18 }}>
          <Insight tone="orange" icon="alertTri" title="Bạn đang nợ nhiều hơn người khác nợ bạn">
            Khoản nợ ròng <b>{fmt(openOwe - openOwed)}</b>. Cân nhắc dành dụm để trả sớm nhé.
          </Insight>
        </div>
      )}
    </div>
  );
}

function Budget({ budgets, transactions, onSaveBudget, onDeleteBudget, viewMonth, viewYear }) {
  const [editingCat, setEditingCat] = useState(null);
  const [editCat, setEditCat] = useState(Object.keys(CATEGORIES)[0]);
  const [editAmt, setEditAmt] = useState(800000);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const formRef = useRef(null);
  const today = new Date();
  const safeViewMonth = Number.isInteger(viewMonth) ? viewMonth : today.getMonth();
  const safeViewYear = Number.isInteger(viewYear) ? viewYear : today.getFullYear();
  const daysInViewedMonth = new Date(safeViewYear, safeViewMonth + 1, 0).getDate();
  const isCurrentView = today.getMonth() === safeViewMonth && today.getFullYear() === safeViewYear;
  const averageDayCount = Math.max(1, isCurrentView ? today.getDate() : daysInViewedMonth);

  const rows = budgets.map(b => {
    const actual = transactions
      .filter(t => t.type === "expense" && t.cat === b.cat)
      .reduce((s, t) => s + t.amount, 0);
    const pct = b.cap > 0 ? (actual / b.cap) * 100 : 0;
    const benchmark = CAT_BENCHMARKS[b.cat] || Math.round(b.cap * 0.9);
    const benchPct = b.cap > 0 ? (benchmark / b.cap) * 100 : 0;
    let level = "ok";
    if (pct >= 100) level = "danger";
    else if (pct >= 80) level = "warn";
    return {
      ...b,
      ...(CATEGORIES[b.cat] || { name: b.cat, emoji: "📦", color: "#8E8E93" }),
      actual,
      remaining: b.cap - actual,
      pct,
      benchPct,
      level,
      averageDaily: Math.round(actual / averageDayCount),
      averageWeekly: Math.round(actual / (averageDayCount / 7)),
      vsBench: actual - benchmark,
      benchmark,
    };
  });

  const totalCap   = rows.reduce((s, r) => s + r.cap, 0);
  const totalSpent = rows.reduce((s, r) => s + r.actual, 0);

  const handleStartEdit = (b) => {
    setEditingCat(b.cat);
    setEditCat(b.cat);
    setEditAmt(b.cap);
    formRef.current?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  };

  const handleCancel = () => {
    setEditingCat(null);
    setEditCat(Object.keys(CATEGORIES)[0]);
    setEditAmt(800000);
  };

  const handleSave = () => {
    if (editAmt <= 0) return;
    onSaveBudget(editCat, editAmt);
    handleCancel();
  };

  const handleDelete = (cat) => {
    onDeleteBudget(cat);
    setConfirmDelete(null);
    if (editingCat === cat) handleCancel();
  };

  return (
    <div className="page">
      <PageHeader greet="Đặt giới hạn — sống trong khả năng">
        <button className="btn" onClick={() => { handleCancel(); formRef.current?.scrollIntoView({ behavior: "smooth" }); }}>
          <Icons.plus size={15} /> Tạo ngân sách
        </button>
      </PageHeader>

      <div className="budget-stats">
        <div className="stat">
          <div className="stat-label"><Icons.wallet size={13} /> Tổng ngân sách</div>
          <div className="stat-value num">{fmt(totalCap)}</div>
          <div className="stat-sub">{rows.length} danh mục</div>
        </div>
        <div className="stat">
          <div className="stat-label" style={{ color: "var(--c-red)" }}>
            <Icons.arrowUpRight size={13} /> Đã chi
          </div>
          <div className="stat-value num">{fmt(totalSpent)}</div>
          <div className="stat-sub">
            <span className="num">{totalCap > 0 ? ((totalSpent / totalCap) * 100).toFixed(0) : 0}%</span> ngân sách
          </div>
        </div>
        <div className="stat">
          <div className="stat-label" style={{ color: totalCap - totalSpent >= 0 ? "var(--c-green)" : "var(--c-red)" }}>
            <Icons.flag size={13} /> Còn lại
          </div>
          <div className="stat-value num" style={{ color: totalCap - totalSpent >= 0 ? "inherit" : "var(--c-red)" }}>
            {fmt(Math.abs(totalCap - totalSpent))}
          </div>
          <div className="stat-sub">{totalCap - totalSpent >= 0 ? "chưa chi" : "vượt mức"}</div>
        </div>
      </div>

      <div ref={formRef} className="card" style={{ marginBottom: 18, scrollMarginTop: 80 }}>
        <div className="card-header">
          <div>
            <div className="card-title">
              {editingCat ? "Sửa hạn mức" : "Thêm / Cập nhật hạn mức"}
            </div>
            <div className="card-subtitle">
              {editingCat
                ? `Đang sửa: ${CATEGORIES[editingCat]?.emoji} ${editingCat}`
                : "Đặt mức chi tối đa hàng tháng cho từng danh mục"}
            </div>
          </div>
          {editingCat && (
            <button className="btn btn-secondary" onClick={handleCancel}>
              <Icons.x size={14} /> Hủy
            </button>
          )}
        </div>
        <div className="budget-form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 10, alignItems: "end" }}>
          <div className="field">
            <span className="field-label">Danh mục</span>
            <select className="select" value={editCat} onChange={e => setEditCat(e.target.value)}>
              {Object.values(CATEGORIES).map(c => (
                <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <span className="field-label">Hạn mức / tháng</span>
            <MoneyInput value={editAmt} onChange={setEditAmt} />
          </div>
          <button className="btn" style={{ height: 41 }} onClick={handleSave}>
            <Icons.check size={15} /> {editingCat ? "Lưu thay đổi" : "Lưu ngân sách"}
          </button>
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <h2 style={{ fontSize: 18, fontWeight: 600 }}>Ngân sách tháng này</h2>
        <span style={{ fontSize: 12, color: "var(--text-3)", display: "inline-flex", alignItems: "center", gap: 6 }}>
          <Icons.users size={12} /> Có so sánh với SV cùng nhóm
        </span>
      </div>

      {rows.length === 0 ? (
        <div className="card">
          <Empty icon="wallet" title="Chưa có ngân sách nào"
            text="Thêm danh mục đầu tiên ở phía trên để bắt đầu kiểm soát chi tiêu" />
        </div>
      ) : (
        <div className="budget-list">
          {rows.map(r => (
            <div className={"budget-row" + (editingCat === r.cat ? " editing" : "")} key={r.cat}>
              <div className="budget-head">
                <div className="budget-cat">
                  <div className="budget-emoji" style={{ background: r.color + "20", color: r.color }}>
                    {r.emoji}
                  </div>
                  <div>
                    <div className="budget-name">{r.name}</div>
                    <div className="budget-sub">
                      {r.level === "danger" ? (
                        <span style={{ color: "var(--c-red)" }}>
                          <Icons.alertTri size={11} style={{ verticalAlign: "middle" }} /> Vượt {fmt(r.actual - r.cap)}
                        </span>
                      ) : r.level === "warn" ? (
                        <span style={{ color: "var(--c-orange)" }}>Còn lại {fmt(r.remaining)}</span>
                      ) : (
                        <span>Còn lại {fmt(r.remaining)}</span>
                      )}
                    </div>
                  </div>
                </div>
                <div className="budget-right">
                  <div className="budget-amount" style={{ textAlign: "right" }}>
                    <span className="num">{fmt(r.actual)}</span>{" "}
                    <span className="total num">/ {fmt(r.cap)}</span>
                  </div>
                  <div className="budget-actions">
                    <button className="budget-action-btn" title="Sửa" onClick={() => handleStartEdit(r)}>
                      <Icons.pencil size={14} />
                    </button>
                    <button className="budget-action-btn danger" title="Xóa"
                      onClick={() => setConfirmDelete(r.cat)}>
                      <Icons.trash size={14} />
                    </button>
                  </div>
                </div>
              </div>

              <div className="budget-track">
                <div className={"budget-fill " + r.level} style={{ width: Math.min(100, r.pct) + "%" }} />
                <div style={{
                  position: "absolute", top: -4, bottom: -4,
                  left: `calc(${Math.min(100, r.benchPct)}% - 1px)`,
                  width: 2, background: "var(--text-2)", borderRadius: 2, pointerEvents: "none",
                }} title={`Trung bình SV cùng nhóm: ${fmt(r.benchmark)}`} />
              </div>

              <div className="budget-foot">
                <span><span className="num">{r.pct.toFixed(0)}%</span> đã dùng</span>
                <span className="budget-benchmark lower"
                  title={`Trung bình đã chi: ${fmt(r.averageDaily)}/ngày, ${fmt(r.averageWeekly)}/tuần`}>
                  <Icons.calendar size={11} />
                  TB{" "}
                  <span className="num">{fmt(r.averageDaily)}</span>/ngày
                  <span aria-hidden="true">·</span>
                  <span className="num">{fmt(r.averageWeekly)}</span>/tuần
                </span>
              </div>

              {confirmDelete === r.cat && (
                <div className="budget-confirm">
                  <span>Xóa ngân sách <b>{r.name}</b>?</span>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="btn btn-secondary" style={{ padding: "6px 12px", fontSize: 12 }}
                      onClick={() => setConfirmDelete(null)}>Hủy</button>
                    <button className="btn" style={{ padding: "6px 12px", fontSize: 12, background: "var(--c-red)" }}
                      onClick={() => handleDelete(r.cat)}>Xóa</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Notes({ notes = "", onSaveNotes }) {
  const [draft, setDraft] = useState(notes || "");
  const [savedAt, setSavedAt] = useState(null);

  useEffect(() => {
    setDraft(notes || "");
  }, [notes]);

  useEffect(() => {
    const next = draft || "";
    if (next === (notes || "")) return;

    const timer = setTimeout(() => {
      onSaveNotes(next);
      setSavedAt(new Date());
    }, 650);

    return () => clearTimeout(timer);
  }, [draft, notes, onSaveNotes]);

  const noteLength = draft.trim().length;
  const savedLabel = savedAt
    ? `Đã lưu ${savedAt.toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" })}`
    : "Tự lưu khi bạn nhập";

  return (
    <div className="page fade-in notes-page">
      <PageHeader greet="Note" title="Ghi chú tài chính">
        <span className="note-save-status">{savedLabel}</span>
      </PageHeader>

      <section className="note-editor card">
        <textarea
          className="note-textarea"
          value={draft}
          onChange={e => setDraft(e.target.value)}
          placeholder="Ghi lại những việc cần nhớ: tiền trọ, khoản sắp phải trả, quyết định chi tiêu, mục tiêu tiết kiệm..."
          spellCheck={false}
        />
        <div className="note-footer">
          <span>{noteLength} ký tự</span>
          <span>Được lưu cùng dữ liệu tài chính của bạn</span>
        </div>
      </section>
    </div>
  );
}

const LOCAL_DATA_KEY = "fintrack-local-data-v1";

function seedData() {
  return {
    transactions: _SEED.transactions,
    debts: _SEED.debts,
    budgets: [],
    goals: DEFAULT_GOALS,
    notes: "",
  };
