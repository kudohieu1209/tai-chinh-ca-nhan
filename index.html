// Custom SVG charts — Apple Health/Stocks aesthetic, no Chart.js

const { useMemo: useMemoC } = React;

function FlowChart({ data, daysInMonth = 31 }) {
  const t = useT();
  // Y-axis labels live in a fixed CSS gutter outside this viewBox, so the
  // horizontal padding stays small and never collides with them when the
  // SVG stretches (preserveAspectRatio="none").
  const W = 600, H = 220, PAD_L = 8, PAD_R = 10, PAD_T = 14, PAD_B = 28;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;
  const [hoverDay, setHoverDay] = React.useState(null);

  const series = useMemoC(() => {
    const arr = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const m = data.find(x => x.d === d);
      arr.push({ d, inc: m?.inc || 0, exp: m?.exp || 0 });
    }
    return arr;
  }, [data, daysInMonth]);

  const maxV = Math.max(...series.map(s => s.exp), 100);
  const niceMax = Math.ceil(maxV / 500000) * 500000;

  const xOf = (i) => PAD_L + innerW * i / (daysInMonth - 1);
  const yOf = (v) => PAD_T + innerH - innerH * v / niceMax;

  const smooth = (pts) => {
    if (!pts.length) return '';
    let path = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) {
      const p0 = pts[i - 1], p1 = pts[i];
      const cx = (p0.x + p1.x) / 2;
      path += ` C ${cx} ${p0.y}, ${cx} ${p1.y}, ${p1.x} ${p1.y}`;
    }
    return path;
  };

  const expPts = series.map((s, i) => ({ x: xOf(i), y: yOf(s.exp) }));
  const expArea = smooth(expPts) + ` L ${xOf(daysInMonth - 1)} ${yOf(0)} L ${xOf(0)} ${yOf(0)} Z`;
  const xTicks = [1, 7, 14, 21, 28, daysInMonth];

  const handleHoverMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width * W;
    const idx = Math.round((px - PAD_L) / innerW * (daysInMonth - 1));
    setHoverDay(Math.max(0, Math.min(daysInMonth - 1, idx)));
  };
  const hovered = hoverDay != null ? series[hoverDay] : null;

  return (
    <>
      <div className="flow-chart-wrap">
        <div className="flow-y-labels" aria-hidden="true">
          {Array.from({ length: 5 }, (_, i) => {
            const y = PAD_T + innerH * i / 4;
            const v = niceMax * (1 - i / 4);
            return <span key={i} style={{ top: `${y / H * 100}%` }}>{formatAxisValue(v)}</span>;
          })}
        </div>
        <div className="flow-plot">
        <svg viewBox={`0 0 ${W} ${H}`} className="flow-chart" preserveAspectRatio="none"
          onMouseMove={handleHoverMove} onMouseLeave={() => setHoverDay(null)}>
          <defs>
            <linearGradient id="gradDark" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#E84040" stopOpacity="0.35" />
              <stop offset="100%" stopColor="#E84040" stopOpacity="0" />
            </linearGradient>
          </defs>
          <g className="flow-grid">
            {Array.from({ length: 5 }, (_, i) => {
              const y = PAD_T + innerH * i / 4;
              return (
                <g key={i}>
                  <line x1={PAD_L} y1={y} x2={W - PAD_R} y2={y} />
                </g>
              );
            })}
          </g>
          <path d={expArea} className="flow-area-expense" />
          <path d={smooth(expPts)} className="flow-line-expense" />
          {hovered && (
            <g className="flow-hover" aria-hidden="true">
              <line className="flow-hover-line" x1={xOf(hoverDay)} y1={PAD_T} x2={xOf(hoverDay)} y2={PAD_T + innerH} />
              <circle cx={xOf(hoverDay)} cy={yOf(hovered.exp)} r="4.5" className="flow-dot-expense" />
            </g>
          )}
        </svg>
        <div className="flow-x-labels" aria-hidden="true">
          {xTicks.map(d => (
            <span key={d} style={{ left: `${xOf(d - 1) / W * 100}%` }}>{d}</span>
          ))}
        </div>
        {hovered && (
          <div
            className={"flow-tooltip" + (hoverDay > (daysInMonth - 1) * 0.62 ? " flip" : "")}
            style={{ left: `${xOf(hoverDay) / W * 100}%` }}
          >
            <div className="flow-tooltip-day">{t("Ngày", "Day")} {hovered.d}</div>
            <div className="flow-tooltip-row expense"><span />{t("Chi", "Out")} <b className="num">{fmt(hovered.exp)}</b></div>
          </div>
        )}
        </div>
      </div>
    </>
  );
}

function formatCurrency(value) {
  const n = Number.isFinite(value) ? value : 0;
  return new Intl.NumberFormat('vi-VN').format(Math.round(n)) + 'đ';
}

function formatPercent(value) {
  const n = Number.isFinite(value) ? value : 0;
  return n.toLocaleString('vi-VN', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '%';
}

function formatAxisValue(value) {
  const n = Number.isFinite(value) ? value : 0;
  if (n === 0) return '0';
  if (n >= 1e6) {
    const m = n / 1e6;
    return (Number.isInteger(m) ? String(m) : m.toFixed(1).replace(/\.0$/, '')) + 'M';
  }
  if (n >= 1e3) return Math.round(n / 1e3) + 'K';
  return String(Math.round(n));
}

function calculateChangePercent(current, previous) {
  if (!Number.isFinite(current) || !Number.isFinite(previous) || previous === 0) return null;
  return ((current - previous) / previous) * 100;
}

function formatChangeText(label, current, previous, tr = (vi) => vi) {
  const change = calculateChangePercent(current, previous);
  if (change == null) return null;
  if (Math.abs(change) < 0.05) return tr(`${label} không đổi so với tháng trước`, `${label} unchanged vs last month`);
  const pct = formatPercent(Math.abs(change));
  return tr(`${label} ${change > 0 ? 'tăng' : 'giảm'} ${pct} so với tháng trước`, `${label} ${change > 0 ? 'up' : 'down'} ${pct} vs last month`);
}

function getSpendingRatioMessage(ratio, income, expense, tr = (vi) => vi) {
  if (income <= 0 && expense > 0) return tr('Chi tiêu đã vượt thu nhập tháng này.', 'Spending has exceeded income this month.');
  if (ratio <= 50) return tr('Bạn đang sử dụng dưới một nửa thu nhập trong tháng này.', "You're using under half your income this month.");
  if (ratio <= 70) return tr('Chi tiêu đang ở mức ổn so với thu nhập tháng này.', 'Spending is comfortable relative to income this month.');
  if (ratio <= 90) return tr('Chi tiêu chiếm phần lớn thu nhập tháng này.', 'Spending takes up most of your income this month.');
  if (ratio <= 100) return tr('Chi tiêu gần bằng thu nhập tháng này.', 'Spending is nearly equal to income this month.');
  return tr('Chi tiêu đã vượt thu nhập tháng này.', 'Spending has exceeded income this month.');
}

function getSpendingRatioTone(ratio) {
  if (ratio <= 50) return "low";
  if (ratio <= 70) return "medium";
  if (ratio <= 90) return "high";
  if (ratio <= 100) return "near";
  return "over";
}

function SixMonthBars({ data, currentLabel }) {
  const t = useT();
  const tip = (m, inc, exp) => `${m.label} · ${t("Thu", "In")} ${formatCurrency(inc)} · ${t("Chi", "Out")} ${formatCurrency(exp)}`;
  const values = data.flatMap(m => [m.inc || 0, m.exp || 0]);
  const maxV = Math.max(...values, 0);
  const step = maxV > 0 ? Math.max(1000000, Math.ceil(maxV / 4 / 1000000) * 1000000) : 1000000;
  const niceMax = step * 4;
  const ticks = Array.from({ length: 5 }, (_, i) => niceMax - step * i);

  return (
    <div className="month-chart">
      <div className="month-y-axis" aria-hidden="true">
        {ticks.map((tick, i) => (
          <span key={tick} style={{ top: `${i / (ticks.length - 1) * 100}%` }}>{formatAxisValue(tick)}</span>
        ))}
      </div>
      <div className="month-plot">
        <div className="month-grid" aria-hidden="true">
          {ticks.map((tick, i) => (
            <span key={tick} style={{ top: `${i / (ticks.length - 1) * 100}%` }} />
          ))}
        </div>
        <div className="month-bars">
          {data.map(m => {
            const isCurrent = m.label === currentLabel;
            const inc = m.inc || 0;
            const exp = m.exp || 0;
            const incH = niceMax > 0 ? inc / niceMax * 100 : 0;
            const expH = niceMax > 0 ? exp / niceMax * 100 : 0;
            const hasData = inc > 0 || exp > 0;
            return (
              <div
                className={"mb-col" + (hasData ? " has-data" : " is-empty")}
                key={m.label}
                data-tooltip={tip(m, inc, exp)}
              >
                <div className="mb-bars-inner">
                  {inc > 0 && (
                    <div className={"mb-bar income" + (isCurrent ? " current" : "")}
                      style={{ height: incH + "%" }} title={tip(m, inc, exp)} />
                  )}
                  {exp > 0 && (
                    <div className={"mb-bar expense" + (isCurrent ? " current" : "")}
                      style={{ height: expH + "%" }} title={tip(m, inc, exp)} />
                  )}
                </div>
                <span className={"mb-label" + (isCurrent ? " current" : "")}>{m.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BenchmarkBar({ value, benchmark, max }) {
  const mePct = Math.min(100, value / max * 100);
  const avgPct = Math.min(100, benchmark / max * 100);
  return (
    <div className="benchmark-bar">
      <div className="me" style={{ width: mePct + "%" }} />
      <div className="avg" style={{ left: `calc(${avgPct}% - 1px)` }}
        title={"TB sinh viên: " + fmt(benchmark)} />
    </div>
  );
}

// ====== BalanceSparkline — cumulative balance line inside the hero card ======
function BalanceSparkline({ points, totalDays = 31, className = "hero-sparkline" }) {
  if (!points || points.length < 2) return null;
  const W = 600, H = 150, PAD = 12;
  const vals = points.map(p => p.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const flat = max === min;
  const xOf = (p) => W * p.d / totalDays;
  const yOf = (v) => flat ? H * 0.55 : PAD + (H - PAD * 2) * (1 - (v - min) / (max - min));
  const pts = points.map(p => ({ x: xOf(p), y: yOf(p.v) }));
  let line = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[i - 1], p1 = pts[i];
    const cx = (p0.x + p1.x) / 2;
    line += ` C ${cx} ${p0.y}, ${cx} ${p1.y}, ${p1.x} ${p1.y}`;
  }
  const last = pts[pts.length - 1];
  const area = line + ` L ${last.x} ${H} L ${pts[0].x} ${H} Z`;
  return (
    <svg className={className} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="heroSparkFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.14" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#heroSparkFill)" />
      <path d={line} fill="none" stroke="var(--accent)" strokeOpacity="0.55" strokeWidth="2"

// ====== CategoryDonut — spending share ring for the overview category card ======
function CategoryDonut({ data, total, activeId, onHover, onSelect }) {
  const t = useT();
  const SIZE = 200, R = 78, STROKE = 24, STROKE_ACTIVE = 30;
  const C = 2 * Math.PI * R;
  const GAP = data.length > 1 ? 5 : 0;

  // Clamp tiny slices to a visible/hoverable arc, then rescale the rest
  const segments = useMemoC(() => {
    if (!data.length || total <= 0) return [];
    const MIN_LEN = 7;
    const usable = C - GAP * data.length;
    const raw = data.map(c => Math.max(MIN_LEN, usable * c.amount / total));
    const scale = usable / raw.reduce((s, v) => s + v, 0);
    let start = 0;
    return data.map((c, i) => {
      const len = raw[i] * scale;
      const seg = { ...c, len, start };
      start += len + GAP;
      return seg;
    });
  }, [data, total]);

  const active = activeId != null ? data.find(c => c.id === activeId) : null;

  return (
    <div className="cat-donut">
      <svg viewBox={`0 0 ${SIZE} ${SIZE}`} role="img" aria-label={t("Tỷ trọng chi tiêu theo danh mục", "Spending share by category")}>
        <g transform={`rotate(-90 ${SIZE / 2} ${SIZE / 2})`}>
          {segments.map(s => (
            <circle
              key={s.id}
              className={"cat-donut-seg" + (activeId == null ? "" : activeId === s.id ? " is-active" : " is-dimmed")}
              cx={SIZE / 2} cy={SIZE / 2} r={R}
              fill="none"
              stroke={s.color}
              strokeWidth={activeId === s.id ? STROKE_ACTIVE : STROKE}
              strokeDasharray={`${s.len} ${C - s.len}`}
              strokeDashoffset={-s.start}
              tabIndex={0}
              aria-label={`${s.name} · ${s.pct.toFixed(0)}%`}
              onMouseEnter={() => onHover && onHover(s.id)}
              onMouseLeave={() => onHover && onHover(null)}
              onFocus={() => onHover && onHover(s.id)}
              onBlur={() => onHover && onHover(null)}
              onClick={() => onSelect && onSelect(s.id)}
              onKeyDown={e => {
                if (e.key === "Enter" || e.key === " ") {
                  e.preventDefault();
                  onSelect && onSelect(s.id);
                }
              }}
            >
              <title>{`${s.name} · ${s.pct.toFixed(0)}%`}</title>
            </circle>
          ))}
        </g>
      </svg>
      <div className="cat-donut-center" aria-hidden="true">
        {active ? (
          <>
            <span className="cat-donut-center-label">{active.emoji} {active.name}</span>
            <span className="cat-donut-center-value num" style={{ color: active.color }}>{fmtShort(active.amount)}</span>
            <span className="cat-donut-center-sub">{active.pct.toFixed(0)}% {t("tổng chi", "of spending")}</span>
          </>
        ) : (
          <>
            <span className="cat-donut-center-label">{t("Tổng chi", "Total spent")}</span>
            <span className="cat-donut-center-value num">{fmtShort(total)}</span>
            <span className="cat-donut-center-sub">{data.length} {t("danh mục", "categories")}</span>
          </>
        )}
      </div>
    </div>
  );
}

const { useState, useEffect, useMemo, useRef, useCallback } = React;

const LangContext = React.createContext("vi");
function useT() {
  const lang = React.useContext(LangContext);
  const t = useCallback((vi, en) => (lang === "en" ? en : vi), [lang]);
  t.lang = lang;
  return t;
}
const MONTHS_EN = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function useCountup(target, duration = 850) {
  const [value, setValue] = useState(0);
  const rafRef  = useRef(null);
  const fromRef = useRef(0);

  useEffect(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    const from  = fromRef.current;
    const start = performance.now();
    const tick  = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const cur = Math.round(from + (target - from) * eased);
      setValue(cur);
      if (t < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        fromRef.current = target;
      }
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [target, duration]);

  return value;
}

// ====== Modal — centered dialog with overlay, Escape/backdrop close ======
// Rendered through a portal: page-level entrance animations keep a transform
// (fill-mode: forwards), which would otherwise trap position:fixed inside the page.
function Modal({ title, subtitle, onClose, children, footer, headerExtra, sidePanel, width = 560 }) {
  const t = useT();
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);

  return ReactDOM.createPortal(
    <div className="modal-overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ maxWidth: width }} role="dialog" aria-modal="true" aria-label={title}>
        <div className="modal-head">
          <div className="modal-head-text">
            <div className="modal-title">{title}</div>
            {subtitle && <div className="modal-subtitle">{subtitle}</div>}

              <Icons.x size={15} />
            </button>
          </div>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
        {sidePanel}
      </div>
    </div>,
    document.body
  );
}

          <span className="field-label">{t("Tên mục tiêu", "Goal name")}</span>
          <input className="input" type="text" placeholder={t("VD: MacBook, Du lịch Nhật...", "e.g. MacBook, Japan trip...")}
            value={name} onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleSave()} />
        </div>
      </div>

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {GOAL_EMOJIS.map(e => (
          <button key={e} onClick={() => setEmoji(e)} style={{
            width: 30, height: 30, borderRadius: 8, fontSize: 16,
            background: emoji === e ? "var(--accent-tint)" : "var(--surface-2)",
            border: emoji === e ? "1.5px solid var(--accent)" : "0.5px solid var(--border)",
          }}>{e}</button>
        ))}
      </div>

      <div>
        <div className="field-label" style={{ marginBottom: 6 }}>{t("Màu", "Color")}</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {GOAL_COLORS.map(c => (
            <button key={c} onClick={() => setColor(c)} style={{
              width: 26, height: 26, borderRadius: "50%", background: c,
              border: color === c ? "2.5px solid var(--text)" : "2px solid transparent",
              outline: color === c ? "2px solid var(--surface-solid)" : "none",
              outlineOffset: 1,
            }} />
          ))}
        </div>
      </div>

      <div className="goal-form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
        <div className="field">
          <span className="field-label">{t("Đã có", "Saved")}</span>
          <MoneyInput value={current} onChange={setCurrent} />
        </div>
        <div className="field">
          <span className="field-label">{t("Mục tiêu", "Target")}</span>
          <MoneyInput value={target} onChange={setTarget} />
        </div>
        <div className="field">
          <span className="field-label">{t("Tiết kiệm/tháng", "Save/month")}</span>
          <MoneyInput value={monthly} onChange={setMonthly} />
        </div>
      </div>

      {target > 0 && monthly > 0 && (
        <div style={{ fontSize: 12, color: "var(--text-3)" }}>
          {t(<>Ước tính còn <b style={{ color: "var(--text-2)" }}>~{Math.ceil(Math.max(0, target - current) / monthly)} tháng</b> nữa để đạt mục tiêu</>, <>About <b style={{ color: "var(--text-2)" }}>~{Math.ceil(Math.max(0, target - current) / monthly)} months</b> left to reach the goal</>)}
        </div>
      )}

      <div style={{ display: "flex", gap: 8 }}>
        <button className="btn" style={{ flex: 1, height: 38 }} onClick={handleSave}>
          <Icons.check size={14} /> {goal ? t("Lưu thay đổi", "Save changes") : t("Thêm mục tiêu", "Add goal")}
        </button>
        <button className="btn btn-secondary" style={{ height: 38, padding: "0 14px" }} onClick={onCancel}>
          <Icons.x size={14} />
        </button>
      </div>
    </div>
  );
}

function GoalRow({ goal, onEdit, onDelete }) {
  const t = useT();
  const { emoji, color, name, current, target, monthly } = goal;
  const pct       = Math.min(100, current / target * 100);
  const remaining = Math.max(0, target - current);
  const etaMonths = monthly > 0 ? Math.ceil(remaining / monthly) : null;
  const R = 22, C = 2 * Math.PI * R;
  return (
    <div className="goal" style={{ position: "relative" }}>
      <div className="goal-ring">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r={R} stroke="var(--surface-2)" strokeWidth="5" fill="none" />
          <circle cx="28" cy="28" r={R} stroke={color} strokeWidth="5" fill="none"
            strokeLinecap="round" strokeDasharray={C}
            strokeDashoffset={C * (1 - pct / 100)}
            transform="rotate(-90 28 28)"
            style={{ transition: "stroke-dashoffset 0.6s ease" }} />
        </svg>
        <div className="goal-emoji">{emoji}</div>
      </div>
      <div className="goal-body">
        <div className="goal-head">
          <span className="goal-name">{name}</span>
          <span className="goal-pct num" style={{ color }}>{pct.toFixed(0)}%</span>
        </div>
        <div className="goal-meta">
          <span className="num">{fmt(current)}</span>
          <span className="goal-sep">·</span>
          <span>{t("còn", "left")} <span className="num">{fmt(remaining)}</span></span>
          {etaMonths != null && (
            <>
              <span className="goal-sep">·</span>
              <span>{t(`~${etaMonths} tháng nữa`, `~${etaMonths} months left`)}</span>
            </>
          )}
        </div>
      </div>
      <div className="goal-actions">
        <button className="goal-action-btn" onClick={() => onEdit(goal)} title={t("Sửa", "Edit")}>
          <Icons.pencil size={13} />
        </button>
        <button className="goal-action-btn danger" onClick={() => onDelete(goal.id)} title={t("Xóa", "Delete")}>
          <Icons.trash size={13} />
        </button>
      </div>
    </div>
  );
}

function Overview({ transactions, allTransactions, debts, budgets = [], goals, notes = "", onSaveNotes, viewMonth, viewYear, monthLabel, onMonthChange, openingBalance = 0, periodBalance, closingBalance, onNavigate, onAddTransaction, onUpdateTransaction, onDeleteTransaction, onSaveBudget, onSaveGoal, onDeleteGoal, theme, onTheme, lang, onLang }) {
  const tr = (vi, en) => (lang === "en" ? en : vi);
  const [editingGoal, setEditingGoal] = useState(null);
  const [hoverCat, setHoverCat] = useState(null);
  const [pinnedCat, setPinnedCat] = useState(null);
  const [hoverDebt, setHoverDebt] = useState(null);
  const [debtView, setDebtView] = useState("owe");
  const [editTx, setEditTx] = useState(null);
  const [editDesc, setEditDesc] = useState("");
  const [editAmount, setEditAmount] = useState(0);
  const [editCat, setEditCat] = useState("");
  const [editDate, setEditDate] = useState("");
  const [chartView, setChartView] = useState("day");
  const [noteOpen, setNoteOpen] = useState(false);
  const [debtModalOpen, setDebtModalOpen] = useState(false);
  const [noteText, setNoteText] = useState(notes);
  const [showAddTx, setShowAddTx] = useState(false);
  const [addTxType, setAddTxType] = useState("expense");
  const [addTxDesc, setAddTxDesc] = useState("");
  const [addTxAmount, setAddTxAmount] = useState(0);
  const [addTxCat, setAddTxCat] = useState(() => Object.keys(CATEGORIES)[0] || "Ăn uống");
  const [addTxDate, setAddTxDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [showIncome, setShowIncome] = useState(false);
  const [incDesc, setIncDesc] = useState("");
  const [incAmount, setIncAmount] = useState(0);
  const [incDate, setIncDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [incomeTab, setIncomeTab] = useState("add");
  const [expenseTab, setExpenseTab] = useState("add");
  const [selectedCat, setSelectedCat] = useState(null);
  const [budgetModalOpen, setBudgetModalOpen] = useState(false);
  const [addingBudget, setAddingBudget] = useState(false);
  const [newBudgetCat, setNewBudgetCat] = useState("");
  const [newBudgetCap, setNewBudgetCap] = useState(0);
  const [quickTemplates, setQuickTemplates] = useState(() => {
    try {
      const raw = localStorage.getItem("fintrack-quick-templates-v1");
      return raw ? JSON.parse(raw) : [
        { desc: "Ăn trưa", amount: 35000, cat: "Ăn uống" },
        { desc: "Nước", amount: 10000, cat: "Ăn uống" },
        { desc: "Bánh mỳ", amount: 15000, cat: "Ăn uống" },
      ];
    } catch { return []; }
  });
  const [editingTemplates, setEditingTemplates] = useState(false);
  const [newTplDesc, setNewTplDesc] = useState("");
  const [newTplAmount, setNewTplAmount] = useState(0);
  const activeCat = hoverCat ?? pinnedCat;
  const togglePinnedCat = (id) => setPinnedCat(p => (p === id ? null : id));
  const saveQuickTemplates = (tpls) => {
    setQuickTemplates(tpls);
    try { localStorage.setItem("fintrack-quick-templates-v1", JSON.stringify(tpls)); } catch (_) {}
  };

  useEffect(() => {
    setHoverCat(null);
    setPinnedCat(null);
  }, [viewMonth, viewYear]);

  const income = useMemo(() =>
    transactions.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0),
    [transactions]
  );
  const expense = useMemo(() =>
    transactions.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0),
    [transactions]
  );
  const remaining = periodBalance ?? (income - expense);
  const finalBalance = closingBalance ?? (openingBalance + remaining);
  const savingsRate = income > 0 ? Math.round((remaining / income) * 100) : 0;
  const incomeCount = transactions.filter(t => t.type === "income").length;
  const expenseCount = transactions.filter(t => t.type === "expense").length;

  const openingBalanceAnim = useCountup(openingBalance);
  const incomeAnim    = useCountup(income);
  const expenseAnim   = useCountup(expense);
  const closingBalanceAnim = useCountup(finalBalance);

  const catRows = useMemo(() => {
    const spend = {};
    transactions.filter(t => t.type === "expense").forEach(t => {
      spend[t.cat] = (spend[t.cat] || 0) + t.amount;
    });
    return Object.entries(spend)
      .map(([cat, amount]) => ({
        id: cat, name: cat,
        color: CATEGORIES[cat]?.color || "#8E8E93",
        emoji: CATEGORIES[cat]?.emoji || "📦",
        amount,
        pct: expense > 0 ? (amount / expense) * 100 : 0,
      }))
      .sort((a, b) => b.amount - a.amount);
  }, [transactions, expense]);

  const dailyFlow = useMemo(() => {
    const flow = {};
    transactions.forEach(t => {
      const day = new Date(t.date + 'T00:00:00').getDate();
      if (!flow[day]) flow[day] = { d: day, inc: 0, exp: 0 };
      if (t.type === "income") flow[day].inc += t.amount;
      else flow[day].exp += t.amount;
    });
    return Object.values(flow).sort((a, b) => a.d - b.d);
  }, [transactions]);

  const sixMonths = useMemo(() => {
    return Array.from({ length: 6 }, (_, i) => {
      const d = new Date(viewYear, viewMonth - (5 - i), 1);
      const m = d.getMonth();
      const y = d.getFullYear();
      const label = `T${m + 1}/${String(y).slice(2)}`;
      const txns = allTransactions.filter(t => {
        const td = new Date(t.date + 'T00:00:00');
        return td.getMonth() === m && td.getFullYear() === y;
      });
      return {
        label,
        inc: txns.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0),
        exp: txns.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0),
      };
    });
  }, [allTransactions, viewMonth, viewYear]);

  const currentLabel = `T${viewMonth + 1}/${String(viewYear).slice(2)}`;
  const currentMonthIndex = sixMonths.findIndex(m => m.label === currentLabel);
  const currentMonthSummary = sixMonths.find(m => m.label === currentLabel) || { inc: 0, exp: 0 };
  const previousMonthSummary = currentMonthIndex > 0 ? sixMonths[currentMonthIndex - 1] : null;
  const spendingRatio = currentMonthSummary.inc > 0
    ? (currentMonthSummary.exp / currentMonthSummary.inc) * 100
    : (currentMonthSummary.exp > 0 ? 101 : 0);
  const spendingRatioLabel = currentMonthSummary.inc > 0
    ? formatPercent(spendingRatio)
    : (currentMonthSummary.exp > 0 ? ">100%" : "0,0%");
  const spendingProgress = Math.min(100, Math.max(0, spendingRatio));
  const spendingRatioTone = getSpendingRatioTone(spendingRatio);
  const spendingRatioMessage = getSpendingRatioMessage(spendingRatio, currentMonthSummary.inc, currentMonthSummary.exp, tr);
  const incomeChangeText = previousMonthSummary ? formatChangeText(tr("Thu", "Income"), currentMonthSummary.inc, previousMonthSummary.inc, tr) : null;
  const expenseChangeText = previousMonthSummary ? formatChangeText(tr("Chi", "Spending"), currentMonthSummary.exp, previousMonthSummary.exp, tr) : null;
  const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();

  const openOwe   = debts.filter(d => d.type === "owe"  && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openOwed  = debts.filter(d => d.type === "lend" && !d.settled).reduce((s, d) => s + d.amount, 0);
  const openDebts = debts.filter(d => !d.settled);
  // Each ring shows ONE honest direction. "owe" (what you owe) and "lend"
  // (what others owe you) are opposites — mixing them into one total
  // double-counts and misleads, so the segmented control flips between them
  // instead. Group by counterparty so three Shopee instalments read as one
  // "Shopee Easy · 3 khoản" slice. Individual debts stay listed in the modal.
  const groupDebts = (type) => {
    const open = debts.filter(d => d.type === type && !d.settled && d.amount > 0);
    const total = open.reduce((s, d) => s + d.amount, 0);
    // One meaningful hue per direction (red = you owe, green = owed to you);
    // slices are shades of that hue, not unrelated colours. Largest = strongest.
    const base = type === "lend" ? "var(--c-green)" : "var(--c-red)";
    const byName = new Map();
    open.forEach(d => {
      const g = byName.get(d.name) || { name: d.name, type, amount: 0, count: 0 };
      g.amount += d.amount;
      g.count += 1;
      byName.set(d.name, g);
    });
    const rows = [...byName.values()]
      .sort((a, b) => b.amount - a.amount)
      .map((g, i) => ({
        id: type + "-" + g.name + "-" + i,
        name: g.name,
        type,
        color: base,
        shade: Math.max(0.4, 1 - i * 0.2),
        amount: g.amount,
        count: g.count,
        pct: total > 0 ? g.amount / total * 100 : 0,
      }));
    return { rows, total, accountCount: open.length };
  };
  const oweGroup  = useMemo(() => groupDebts("owe"),  [debts]);
  const lendGroup = useMemo(() => groupDebts("lend"), [debts]);
  const activeDebtView = debtView === "lend" && lendGroup.rows.length > 0 ? "lend"
    : (oweGroup.rows.length > 0 ? "owe" : (lendGroup.rows.length > 0 ? "lend" : "owe"));
  const activeGroup = activeDebtView === "lend" ? lendGroup : oweGroup;
  const debtRows = activeGroup.rows;
  const debtTotal = activeGroup.total;
  const debtAccountCount = activeGroup.accountCount;
  const debtCenterLabel = activeDebtView === "lend" ? tr("Người khác nợ bạn", "Owed to you") : tr("Bạn đang nợ", "You owe");
  const debtAmountColor = activeDebtView === "lend" ? "var(--c-green)" : "var(--c-red)";
  const debtAmountSign  = activeDebtView === "lend" ? "+" : "−";
  const today = new Date();
  const isCurrentView = today.getMonth() === viewMonth && today.getFullYear() === viewYear;
  const balanceLabel = isCurrentView ? tr("Số dư hiện tại", "Current balance") : tr("Số dư cuối tháng", "End-of-month balance");
  const daysElapsed = isCurrentView ? Math.max(1, Math.min(today.getDate(), daysInMonth)) : daysInMonth;
  const balanceSeries = useMemo(() => {
    const byDay = new Map(dailyFlow.map(f => [f.d, f]));
    let running = openingBalance;
    const pts = [{ d: 0, v: running }];
    for (let day = 1; day <= daysElapsed; day++) {
      const f = byDay.get(day);
      if (f) running += (f.inc || 0) - (f.exp || 0);
      pts.push({ d: day, v: running });
    }
    return pts;
  }, [dailyFlow, openingBalance, daysElapsed]);
  const fixedPaceExpense = transactions
    .filter(t => t.type === "expense" && FIXED_PACE_CATEGORIES.has(t.cat))
    .reduce((s, t) => s + t.amount, 0);
  const variablePaceExpense = Math.max(0, expense - fixedPaceExpense);
  const dailyPace = variablePaceExpense > 0 ? variablePaceExpense / daysElapsed : 0;
  const projectedExpense = expense > 0 ? fixedPaceExpense + dailyPace * daysInMonth : 0;
  const budgetWatch = budgets
    .map(b => {
      const actual = transactions
        .filter(t => t.type === "expense" && t.cat === b.cat)
        .reduce((s, t) => s + t.amount, 0);
      return { ...b, actual, pct: b.cap > 0 ? (actual / b.cap) * 100 : 0 };
    })
    .filter(b => b.pct >= 80)
    .sort((a, b) => b.pct - a.pct)[0];
  const insightTone = remaining < 0 ? "red" : savingsRate >= 20 ? "green" : savingsRate >= 5 ? "blue" : "orange";
  const paceTone = projectedExpense > income && income > 0 ? "orange" : "indigo";
  const budgetTone = budgetWatch?.pct >= 100 ? "red" : budgetWatch ? "orange" : "green";

  // Balance-card insight rows — fills the lower half of the hero balance card
  const avgDailySpend = daysElapsed > 0 ? expense / daysElapsed : 0;
  const expenseMoM = previousMonthSummary && previousMonthSummary.exp > 0
    ? (currentMonthSummary.exp - previousMonthSummary.exp) / previousMonthSummary.exp * 100
    : null;
  const balanceInsights = [
    { key: "avg", icon: "clock", label: tr("TB chi mỗi ngày", "Avg spend/day"), value: fmtShort(avgDailySpend), tone: "plain" },
    isCurrentView
      ? { key: "proj", icon: "sparkle", label: tr("Dự chi cuối tháng", "Projected month-end spend"), value: fmtShort(projectedExpense), tone: projectedExpense > income && income > 0 ? "orange" : "plain" }
      : { key: "final", icon: "wallet", label: tr("Số dư cuối tháng", "End-of-month balance"), value: fmtShort(finalBalance), tone: finalBalance < 0 ? "red" : "plain" },
    expenseMoM != null && { key: "mom", icon: expenseMoM >= 0 ? "arrowUp" : "arrowDown", label: tr("Chi so tháng trước", "Spend vs last month"), value: `${expenseMoM >= 0 ? "+" : ""}${expenseMoM.toFixed(0)}%`, tone: expenseMoM > 0 ? "red" : "green" },
  ].filter(Boolean);

  const handleAddQuickTx = () => {
    if (!addTxDesc.trim() || addTxAmount <= 0) return;
    if (onAddTransaction) {
      onAddTransaction({
        type: addTxType,
        desc: addTxDesc.trim(),
        amount: addTxAmount,
        cat: addTxType === "expense" ? addTxCat : "Thu nhập",
        date: addTxDate,
      });
    }
    setAddTxDesc("");
    setAddTxAmount(0);
    setAddTxCat(Object.keys(CATEGORIES)[0] || "Ăn uống");
    setAddTxDate(new Date().toISOString().slice(0, 10));
    setShowAddTx(false);
  };

  const incomeTxns = useMemo(() =>
    transactions
      .filter(t => t.type === "income")
      .slice()
      .sort((a, b) => (b.date || "").localeCompare(a.date || "") || String(b.id).localeCompare(String(a.id))),
    [transactions]
  );

  const expenseTxns = useMemo(() =>
    transactions
      .filter(t => t.type === "expense")
      .slice()
      .sort((a, b) => (b.date || "").localeCompare(a.date || "") || String(b.id).localeCompare(String(a.id))),
    [transactions]
  );

  const handleAddIncome = () => {
    if (!incDesc.trim() || incAmount <= 0) return;
    if (onAddTransaction) {
      onAddTransaction({
        type: "income",
        desc: incDesc.trim(),
        amount: incAmount,
        cat: "Thu nhập",
        date: incDate,
      });
    }
    setIncDesc("");
    setIncAmount(0);
    setIncDate(new Date().toISOString().slice(0, 10));
  };

  const handleSaveGoal = (g) => {
    onSaveGoal(g);
    setEditingGoal(null);
  };

  // ── Inline edit of a history transaction (floating panel beside the modal) ──
  const openEditTx = (t) => {
    setEditTx(t);
    setEditDesc(t.desc || "");
    setEditAmount(t.amount || 0);
    setEditCat(t.cat || "");
    setEditDate(t.date || new Date().toISOString().slice(0, 10));
  };
  const closeEditTx = () => setEditTx(null);
  const saveEditTx = () => {
    if (!editTx || !editDesc.trim() || editAmount <= 0) return;
    onUpdateTransaction && onUpdateTransaction(editTx.id, {
      desc: editDesc.trim(),
      amount: editAmount,
      cat: editTx.type === "expense" ? editCat : "Thu nhập",
      date: editDate,
    });
    closeEditTx();
  };
  const deleteEditTx = () => {
    if (!editTx) return;
    onDeleteTransaction && onDeleteTransaction(editTx.id);
    closeEditTx();
  };
  const editTxPanel = editTx ? (
    <div className="tx-edit-panel" role="dialog" aria-label={tr("Sửa giao dịch", "Edit transaction")}>
      <div className="tx-edit-panel-head">
        <div className="tx-edit-panel-title">
          {editTx.type === "expense" ? tr("Sửa chi tiêu", "Edit expense") : tr("Sửa thu nhập", "Edit income")}
        </div>
        <button className="modal-close" onClick={closeEditTx} aria-label={tr("Đóng", "Close")} title={tr("Đóng", "Close")}>
          <Icons.x size={14} />
        </button>
      </div>
      <div className="tx-edit-panel-body">
        <div className="field">
          <span className="field-label">{tr("MÔ TẢ", "DESCRIPTION")}</span>
          <input
            className="input" type="text" value={editDesc}
            onChange={e => setEditDesc(e.target.value)}
            onKeyDown={e => e.key === "Enter" && saveEditTx()}
            autoFocus
          />
        </div>
        <div className="field">
          <span className="field-label">{tr("SỐ TIỀN", "AMOUNT")}</span>
          <MoneyInput value={editAmount} onChange={setEditAmount} />
        </div>
        {editTx.type === "expense" && (
          <div>
            <div style={{ marginBottom: 8 }}><span className="field-label">{tr("DANH MỤC", "CATEGORY")}</span></div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {Object.values(CATEGORIES).map(c => (
                <button
                  key={c.name}
                  onClick={() => setEditCat(c.name)}
                  style={{
                    padding: "6px 12px", borderRadius: 99, fontSize: 13,
                    background: editCat === c.name ? c.color + "22" : "var(--surface-2)",
                    color: editCat === c.name ? c.color : "var(--text)",
                    border: editCat === c.name ? `1.5px solid ${c.color}` : "0.5px solid var(--border)",
                    cursor: "pointer", fontWeight: editCat === c.name ? 600 : 400, whiteSpace: "nowrap",
                  }}
                >
                  {c.emoji} {c.name}
                </button>
              ))}
            </div>
          </div>
        )}
        <div className="field">
          <span className="field-label">{tr("NGÀY", "DATE")}</span>
          <input className="input" type="date" value={editDate} onChange={e => setEditDate(e.target.value)} />
        </div>
      </div>
      <div className="tx-edit-panel-foot">
        <button className="btn btn-secondary tx-edit-delete" onClick={deleteEditTx}>
          <Icons.trash size={14} /> {tr("Xóa", "Delete")}
        </button>
        <button className="btn" onClick={saveEditTx} disabled={!editDesc.trim() || editAmount <= 0}>
          {tr("Lưu thay đổi", "Save changes")}
        </button>
      </div>
    </div>
  ) : null;

  return (
    <div className="page overview-page">
      <div className="overview-hero">
        <section className="hero-balance stagger stagger-1" aria-label={balanceLabel}>

                    color: incomeTab === "add" ? "var(--text)" : "var(--text-2)",
                    fontWeight: incomeTab === "add" ? 600 : 400,
                    fontSize: 14, cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                    boxShadow: incomeTab === "add" ? "0 1px 3px rgba(0,0,0,0.12)" : "none",
                    transition: "all 0.15s",
                  }}
                >
                  <Icons.arrowDownLeft size={13} /> {tr("Thu nhập", "Income")}
                </button>
                <button
                  onClick={() => setIncomeTab("history")}
                  style={{
                    flex: 1, height: 36, borderRadius: 8, border: "none",
                    background: incomeTab === "history" ? "var(--surface)" : "transparent",
                    color: incomeTab === "history" ? "var(--text)" : "var(--text-2)",
                    fontWeight: incomeTab === "history" ? 600 : 400,
                    fontSize: 14, cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                    boxShadow: incomeTab === "history" ? "0 1px 3px rgba(0,0,0,0.12)" : "none",
                    transition: "all 0.15s",
                  }}
                >
                  <Icons.clock size={13} /> {tr("Lịch sử", "History")}
                </button>
              </div>

              {incomeTab === "add" ? (
                <>
                  {/* MẪU NHANH */}
                  <div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                      <span className="field-label">{tr("MẪU NHANH", "QUICK TEMPLATES")}</span>
                      <button
                        className="btn btn-secondary"
                        style={{ height: 26, padding: "0 10px", fontSize: 12, gap: 4, minWidth: 0 }}
                        onClick={() => { setEditingTemplates(e => !e); setNewTplDesc(""); setNewTplAmount(0); }}
                      >
                        <Icons.pencil size={11} /> {editingTemplates ? tr("Xong", "Done") : tr("Sửa", "Edit")}
                      </button>
                    </div>
                    {editingTemplates ? (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {quickTemplates.map((tpl, i) => (
                          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: "var(--r-md)" }}>
                            <span style={{ flex: 1, fontSize: 13, color: "var(--text)" }}>
                              {tpl.desc} · <span className="num">{fmtShort(tpl.amount)}</span>
                            </span>
                            <button className="goal-action-btn danger" title={tr("Xóa", "Delete")} onClick={() => saveQuickTemplates(quickTemplates.filter((_, j) => j !== i))}>
                              <Icons.trash size={12} />
                            </button>
                          </div>
                        ))}
                        <div style={{ display: "flex", gap: 8 }}>
                          <input
                            className="input"
                            type="text"
                            placeholder={tr("Tên mẫu…", "Template name…")}
                            value={newTplDesc}
                            onChange={e => setNewTplDesc(e.target.value)}
                            style={{ flex: 2 }}
                            onKeyDown={e => {
                              if (e.key === "Enter" && newTplDesc.trim() && newTplAmount > 0) {
                                saveQuickTemplates([...quickTemplates, { desc: newTplDesc.trim(), amount: newTplAmount }]);
                                setNewTplDesc(""); setNewTplAmount(0);
                              }
                            }}
                          />
                          <div style={{ flex: 1 }}>
                            <MoneyInput value={newTplAmount} onChange={setNewTplAmount} />
                          </div>
                          <button
                            className="btn"
                            style={{ height: 38, padding: "0 12px", flexShrink: 0 }}
                            disabled={!newTplDesc.trim() || newTplAmount <= 0}
                            onClick={() => {
                              if (!newTplDesc.trim() || newTplAmount <= 0) return;
                              saveQuickTemplates([...quickTemplates, { desc: newTplDesc.trim(), amount: newTplAmount }]);
                              setNewTplDesc(""); setNewTplAmount(0);
                            }}
                          >
                            <Icons.plus size={13} />
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        {quickTemplates.length === 0 ? (
                          <span style={{ fontSize: 13, color: "var(--text-3)" }}>{tr("Nhấn Sửa để thêm mẫu nhanh.", "Tap Edit to add quick templates.")}</span>
                        ) : quickTemplates.map((tpl, i) => (
                          <button
                            key={i}
                            onClick={() => { setIncDesc(tpl.desc); setIncAmount(tpl.amount); }}
                            style={{
                              padding: "6px 12px", borderRadius: 99, fontSize: 13,
                              background: "var(--surface-2)", color: "var(--text)",
                              border: "0.5px solid var(--border)", cursor: "pointer", whiteSpace: "nowrap",
                            }}
                          >
                            {tpl.desc} <span className="num" style={{ color: "var(--text-2)" }}>{fmtShort(tpl.amount)}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* MÔ TẢ */}
                  <div className="field">
                    <span className="field-label">{tr("MÔ TẢ", "DESCRIPTION")}</span>
                    <input
                      className="input"
                      type="text"
                      placeholder={tr("VD: Lương, mẹ chuyển…", "e.g. Salary, transfer…")}
                      value={incDesc}
                      onChange={e => setIncDesc(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && handleAddIncome()}
                      autoFocus
                    />
                  </div>

                  {/* SỐ TIỀN */}
                  <div className="field">
                    <span className="field-label">{tr("SỐ TIỀN", "AMOUNT")}</span>
                    <MoneyInput value={incAmount} onChange={setIncAmount} />
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginTop: 8 }}>
                      {[10000, 20000, 50000, 100000].map(amt => (
                        <button key={amt} className="btn btn-secondary" style={{ height: 34, fontSize: 13 }}
                          onClick={() => setIncAmount(v => (v || 0) + amt)}>
                          +{fmtShort(amt)}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* NGÀY */}
                  <div className="field">
                    <span className="field-label">{tr("NGÀY", "DATE")}</span>
                    <input
                      className="input"
                      type="date"
                      value={incDate}
                      onChange={e => setIncDate(e.target.value)}
                    />
                  </div>

                  {/* Submit */}
                  <button
                    className="btn"
                    onClick={handleAddIncome}
                    disabled={!incDesc.trim() || incAmount <= 0}
                    style={{ height: 50, fontSize: 16, fontWeight: 700, opacity: (!incDesc.trim() || incAmount <= 0) ? 0.5 : 1 }}
                  >
                    <Icons.plus size={16} /> {tr("Thêm giao dịch", "Add transaction")}
                  </button>
                </>
              ) : (
                /* Lịch sử tab */
                <div>
                  {incomeTxns.length === 0 ? (
                    <Empty icon="inbox" title={tr("Chưa có thu nhập", "No income yet")} text={tr("Thêm khoản thu đầu tiên của tháng", "Add your first income this month")} />
                  ) : (() => {
                    const todayStr = new Date().toISOString().slice(0, 10);
                    const yest = new Date(); yest.setDate(yest.getDate() - 1);
                    const yestStr = yest.toISOString().slice(0, 10);
                    const dayLabel = (d) => {
                      if (d === todayStr) return tr("HÔM NAY", "TODAY");
                      if (d === yestStr) return tr("HÔM QUA", "YESTERDAY");
                      const dt = new Date(d + "T00:00:00");
                      return (lang === "en" ? TX_WEEKDAYS_EN : TX_WEEKDAYS)[dt.getDay()] + ", " + dt.getDate() + "/" + (dt.getMonth()+1);
                    };
                    const groups = {};
                    incomeTxns.forEach(t => { const d = t.date || todayStr; if (!groups[d]) groups[d] = []; groups[d].push(t); });
                    return (
                      <div style={{ maxHeight: 400, overflowY: "auto" }}>
                        {Object.keys(groups).sort((a,b) => b.localeCompare(a)).map(d => {
                          const txs = groups[d];
                          const dayTotal = txs.reduce((s,t) => s + t.amount, 0);
                          return (
                            <div key={d} style={{ marginBottom: 10 }}>
                              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingBottom: 6, marginBottom: 6, borderBottom: "1px solid var(--border)" }}>
                                <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", letterSpacing: "0.04em" }}>{dayLabel(d)}</span>
                                <span className="num" style={{ fontSize: 11, color: "var(--text-3)" }}>{fmtShort(dayTotal)}</span>
                              </div>
                              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                                {txs.map(t => (
                                  <div key={t.id}
                                    className={"tx-history-row" + (editTx && editTx.id === t.id ? " is-active" : "")}
                                    role="button" tabIndex={0}
                                    onClick={() => openEditTx(t)}
                                    onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openEditTx(t); } }}
                                    style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 10px", background:"var(--surface-2)", border:"0.5px solid var(--border)", borderRadius:"var(--r-md)" }}>
                                    <span style={{ display:"flex", alignItems:"center", justifyContent:"center", width:28, height:28, flexShrink:0, borderRadius:"50%", background:"rgba(52,199,89,0.14)", color:"var(--c-green)" }}>
                                      <Icons.arrowDownLeft size={13} />
                                    </span>
                                    <div style={{ flex:1, minWidth:0 }}>
                                      <div style={{ fontSize:13, fontWeight:500, color:"var(--text)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.desc||tr("Thu nhập", "Income")}</div>
                                      <div style={{ fontSize:11, color:"var(--text-2)" }}>{tr("Thu nhập", "Income")}</div>
                                    </div>
                                    <div className="num" style={{ fontSize:13, fontWeight:600, color:"var(--c-green)" }}>+{fmtShort(t.amount)}</div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>
              )}
            </div>
          </Modal>
        )}
        {selectedCat && (() => {
          const catTxns = transactions
            .filter(t => t.type === "expense" && t.cat === selectedCat.id)
            .slice()
            .sort((a, b) => (b.date || "").localeCompare(a.date || "") || String(b.id).localeCompare(String(a.id)));
          return (
            <Modal
              title={`${selectedCat.emoji} ${selectedCat.name}`}
              subtitle={`${catTxns.length} ${tr("giao dịch", "transactions")} · ${fmt(selectedCat.amount)}`}
              onClose={() => setSelectedCat(null)}
              width={440}
            >
              {catTxns.length === 0 ? (
                <Empty icon="inbox" title={tr("Chưa có giao dịch", "No transactions")} text={tr("Không có giao dịch nào trong danh mục này", "No transactions in this category")} />
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 420, overflowY: "auto" }}>
                  {catTxns.map(t => (
                    <div
                      key={t.id}
                      style={{
                        display: "flex", alignItems: "center", gap: 10,
                        padding: "10px 12px",
                        background: "var(--surface-2)", border: "0.5px solid var(--border)",
                        borderRadius: "var(--r-md)",
                      }}
                    >
                      <span style={{
                        display: "flex", alignItems: "center", justifyContent: "center",
                        width: 30, height: 30, flexShrink: 0, fontSize: 15,
                        borderRadius: "50%", background: selectedCat.color + "26",
                      }}>
                        {selectedCat.emoji}
                      </span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 500, color: "var(--text)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                          {t.desc || t.cat || tr("Chi tiêu", "Expense")}
                        </div>
                        <div style={{ fontSize: 12, color: "var(--text-2)" }}>
                          {new Date(t.date + "T00:00:00").toLocaleDateString(lang === "en" ? "en-US" : "vi-VN", { day: "2-digit", month: "2-digit", year: "numeric" })}
                        </div>
                      </div>
                      <div className="num" style={{ fontSize: 14, fontWeight: 600, color: "var(--text)" }}>
                        -{fmt(t.amount)}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </Modal>
          );
        })()}
      {budgetModalOpen && (() => {
        const allBudgetRows = budgets.map(b => {
          const actual = transactions
            .filter(t => t.type === "expense" && t.cat === b.cat)
            .reduce((s, t) => s + t.amount, 0);
          const pct = b.cap > 0 ? (actual / b.cap) * 100 : 0;
          const isFixed = FIXED_PACE_CATEGORIES.has(b.cat);
          const dailyAvg = !isFixed && daysElapsed > 0 && actual > 0 ? actual / daysElapsed : null;
          const weeklyAvg = dailyAvg != null ? dailyAvg * 7 : null;
          return { ...b, actual, pct, isFixed, dailyAvg, weeklyAvg };
        }).sort((a, b) => b.pct - a.pct);
        const budgetedCats = new Set(budgets.map(b => b.cat));
        const availableCats = Object.values(CATEGORIES).filter(c => !budgetedCats.has(c.name) && c.name !== "Trả nợ");
        return (
          <Modal
            title={tr("Ngân sách", "Budget")}
            subtitle={monthLabel}
            onClose={() => { setBudgetModalOpen(false); setAddingBudget(false); setNewBudgetCap(0); }}
            width={480}
            headerExtra={
              <button
                className="btn btn-secondary"
                style={{ height: 30, padding: "0 12px", fontSize: 13, gap: 4 }}
                onClick={() => {
                  setAddingBudget(a => !a);
                  setNewBudgetCap(0);
                  if (availableCats.length > 0) setNewBudgetCat(availableCats[0].name);
                }}
                title={tr("Thêm ngân sách", "Add budget")}
              >
                <Icons.plus size={13} /> {tr("Thêm", "Add")}
              </button>
            }
          >
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {addingBudget && (
                <div style={{ padding: "14px 16px", background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: "var(--r-lg)", display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{tr("Thêm ngân sách mới", "Add new budget")}</div>
                  {availableCats.length === 0 ? (
                    <div style={{ fontSize: 13, color: "var(--text-3)" }}>{tr("Tất cả danh mục đã có ngân sách.", "All categories already have a budget.")}</div>
                  ) : (
                    <>
                      <div style={{ display: "flex", gap: 10 }}>
                        <div className="field" style={{ flex: 1 }}>
                          <span className="field-label">{tr("Danh mục", "Category")}</span>
                          <select className="input" value={newBudgetCat} onChange={e => setNewBudgetCat(e.target.value)} style={{ cursor: "pointer" }}>
                            {availableCats.map(c => (
                              <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>
                            ))}
                          </select>
                        </div>
                        <div className="field" style={{ flex: 1 }}>
                          <span className="field-label">{tr("Hạn mức / tháng", "Limit / month")}</span>
                          <MoneyInput value={newBudgetCap} onChange={setNewBudgetCap} />
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button className="btn" style={{ flex: 1, height: 38 }}
                          disabled={!newBudgetCat || newBudgetCap <= 0}
                          onClick={() => {
                            if (!newBudgetCat || newBudgetCap <= 0) return;
                            onSaveBudget && onSaveBudget(newBudgetCat, newBudgetCap);
                            setAddingBudget(false);
                            setNewBudgetCap(0);
                          }}>
                          <Icons.check size={14} /> {tr("Lưu", "Save")}
                        </button>
                        <button className="btn btn-secondary" style={{ height: 38, padding: "0 14px" }} onClick={() => setAddingBudget(false)}>
                          <Icons.x size={14} />
                        </button>
                      </div>
                    </>
                  )}
                </div>
              )}
              {allBudgetRows.length === 0 ? (
                <Empty icon="inbox" title={tr("Chưa có ngân sách", "No budgets")} text={tr("Nhấn + Thêm để đặt hạn mức chi tiêu", "Tap + Add to set spending limits")} />
              ) : (
                allBudgetRows.map(b => {
                  const cat = CATEGORIES[b.cat];
                  const color = cat?.color || "#8E8E93";
                  const barColor = b.pct >= 100 ? "var(--c-red)" : b.pct >= 80 ? "var(--c-orange)" : "var(--c-green)";
                  const barWidth = Math.min(100, b.pct);
                  return (
                    <div key={b.cat} style={{ padding: "16px 18px", background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: "var(--r-lg)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                        <span style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 42, height: 42, flexShrink: 0, fontSize: 20, borderRadius: "50%", background: color + "26" }}>
                          {cat?.emoji || "📦"}
                        </span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text)", marginBottom: 2 }}>{b.cat}</div>
                          <div style={{ fontSize: 12, color: "var(--text-2)" }}>
                            <span className="num">{fmt(b.actual)}</span> / <span className="num">{fmt(b.cap)}</span>
                          </div>
                        </div>
                        <div className="num" style={{ fontSize: 20, fontWeight: 700, color: b.pct >= 100 ? "var(--c-red)" : b.pct >= 80 ? "var(--c-orange)" : "var(--text-2)" }}>
                          {b.pct.toFixed(0)}%
                        </div>
                      </div>
                      <div style={{ height: 8, borderRadius: 99, background: "var(--surface-3, var(--border))", overflow: "hidden", marginBottom: 8 }}>
                        <div style={{ height: "100%", width: barWidth + "%", background: barColor, borderRadius: 99, transition: "width 0.4s ease" }} />
                      </div>
                      {b.pct >= 80 && (
                        <div style={{ fontSize: 12, color: b.pct >= 100 ? "var(--c-red)" : "var(--c-orange)", marginBottom: b.dailyAvg != null ? 6 : 0 }}>
                          {b.pct >= 100 ? tr(`Vượt hạn mức ${fmt(b.actual - b.cap)}`, `Over by ${fmt(b.actual - b.cap)}`) : tr(`Còn ${fmt(b.cap - b.actual)} trước hạn mức`, `${fmt(b.cap - b.actual)} left before the cap`)}
                        </div>
                      )}
                      {b.dailyAvg != null && (
                        <div style={{ display: "flex", gap: 16, marginTop: b.pct < 80 ? 4 : 0 }}>
                          <span style={{ fontSize: 12, color: "var(--text-3)" }}>
                            {tr("TB/ngày", "Avg/day")}: <b className="num" style={{ color: "var(--text-2)" }}>{fmtShort(Math.round(b.dailyAvg))}</b>
                          </span>
                          <span style={{ fontSize: 12, color: "var(--text-3)" }}>
                            {tr("TB/tuần", "Avg/week")}: <b className="num" style={{ color: "var(--text-2)" }}>{fmtShort(Math.round(b.weeklyAvg))}</b>
                          </span>
                        </div>
                      )}
                    </div>
                  );
                })
              )}
            </div>
          </Modal>
        );
      })()}
      </div>

      <div className="overview-dashboard-grid">
        <div className="card category-card overview-area-category stagger stagger-4">
          <div className="card-header">
            <div>
              <div className="card-title">{tr("Chi tiêu theo danh mục", "Spending by category")}</div>
              <div className="card-subtitle">{fmt(expense)} · {expenseCount} {tr("giao dịch", "transactions")}</div>
            </div>
            <button className="card-action" onClick={() => setBudgetModalOpen(true)} style={{ display: "flex", alignItems: "center", gap: 3, color: "var(--text)" }}>
              {tr("Ngân sách", "Budget")} <Icons.chevRight size={12} />
            </button>
          </div>
          {catRows.length === 0 ? (
            <Empty icon="inbox" title={tr("Chưa có chi tiêu", "No spending yet")} text={tr("Thêm giao dịch để xem phân tích", "Add transactions to see analysis")} />
          ) : (
            <div className="cat-donut-layout">
              <CategoryDonut
                data={catRows}
                total={expense}
                activeId={activeCat}
                onHover={setHoverCat}
                onSelect={togglePinnedCat}
              />
              <div className="cat-list">
                {catRows.map(c => (
                  <div
                    className={"cat-row" + (activeCat == null ? "" : activeCat === c.id ? " is-active" : " is-dimmed")}
                    key={c.id}
                    style={{ "--cat-color": c.color, "--cat-tint": c.color + "26" }}
                    role="button"
                    tabIndex={0}
                    onMouseEnter={() => setHoverCat(c.id)}
                    onMouseLeave={() => setHoverCat(null)}
                    onFocus={() => setHoverCat(c.id)}
                    onBlur={() => setHoverCat(null)}
                    onClick={() => setSelectedCat(c)}
                    onKeyDown={e => {
                      if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        setSelectedCat(c);
                      }
                    }}
                  >
                    <span className="cat-chip" aria-hidden="true">{c.emoji}</span>
                    <div className="cat-name-text">{c.name}</div>
                    <div className="cat-pct">{c.pct.toFixed(0)}%</div>
                    <div className="cat-amount num">{fmt(c.amount)}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="card overview-area-charts stagger stagger-5">
          <div className="card-header">
            <div>
              <div className="card-title">
                {chartView === "day" ? tr("Chi tiêu theo ngày", "Spending by day") : tr("Chi tiêu theo tháng", "Spending by month")}
              </div>
              <div className="card-subtitle">
                {chartView === "day"
                  ? `${monthLabel} · ${incomeCount + expenseCount} ${tr("giao dịch", "transactions")}`
                  : tr("6 tháng gần nhất", "Last 6 months")}
              </div>
            </div>
            <div className="chart-view-toggle">
              <button
                className={"chart-toggle-btn" + (chartView === "day" ? " active" : "")}
                onClick={() => setChartView("day")}
              >{tr("Ngày", "Day")}</button>
              <button
                className={"chart-toggle-btn" + (chartView === "month" ? " active" : "")}
                onClick={() => setChartView("month")}
              >{tr("Tháng", "Month")}</button>
            </div>
          </div>
          {chartView === "day" ? (
            dailyFlow.length === 0 ? (
              <Empty icon="trendUp" title={tr("Chưa có dữ liệu", "No data yet")} text={tr("Thêm giao dịch để xem dòng tiền", "Add transactions to see cash flow")} />
            ) : (
              <FlowChart data={dailyFlow} daysInMonth={daysInMonth} />
            )
          ) : (
            <SixMonthBars data={sixMonths} currentLabel={currentLabel} />
          )}
        </div>

      </div>
    </div>
  );
}

window.Overview = Overview;
